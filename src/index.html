<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>SVG App — Text + Preview (Light Theme)</title>
	<style>

	:root {
		color-scheme: light dark;

		/* user editable */
		--zoom:			1.0;
		--lineheight:	1.4;
		--fontsize:		1.1;
		--fill:			Canvas;
		--text:			CanvasText;
		--bold:			400;
		--fontfamily:				system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
		--fontfamily-texteditor:	ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

		/* calculated */
		--px-base-unit:		12px;
		--px-line-height:	calc(var(--px-base-unit) * var(--zoom) * var(--lineheight));
		--px-font-size:		calc(var(--px-base-unit) * var(--zoom) * var(--fontsize));

		/* will be overwritten in code by updateCssFromLookupConstants */
		--px-line-height-svg:	20px;
		--px-font-size-svg:		16px;
		--px-header-height-svg:	50px;
		--count-lines-svg:		4;

		/* other */
		--ms-transition: 0.4s;
		--ms-transition-quick: 0.15s;

		--px-sidebar-size: 500px;
		--px-sidebar-min: 200px;
	}


	:root.theme-dark {
		color-scheme: dark;

		--fill-section-odd-chapter-rect-fill:  #80808026;
		--fill-section-even-chapter-rect-fill: #8080801f;
		--fill-chapter-rect-stroke: var(--fill);

		--rect-opacity: 1;
		--fill-fallback: #888888;	/* nb: must be without alpha! used in color-mix in .tagblock-label-rect */
		--fill-tagblock-bg-rect-stroke: #52525280;
		--fill-tagblock-label-stroke: #52525280;
		--fill-tagblock-label-text-fill: #ffffff;

		--fill-part-rect-stroke: #787878;
		--fill-part-rect-stroke-hover: #ffffff;
		--fill-part-rect-fill-mix: #656565;
		/* --fill-tagblock-part-rect-drop-shadow: #97aebd88; */
	}

	:root.theme-light {
		color-scheme: light;

		--fill-section-odd-chapter-rect-fill:  #8080802b;
		--fill-section-even-chapter-rect-fill: #8080801f;
		--fill-chapter-rect-stroke: var(--fill);

		--rect-opacity: 1;
		--fill-fallback: #cccccc;	/* nb: must be without alpha! used in color-mix in .tagblock-label-rect */
		--fill-tagblock-bg-rect-stroke: #aaaaaa80;
		--fill-tagblock-label-stroke: #52525280;
		--fill-tagblock-label-text-fill: #000000;

		--fill-part-rect-stroke: #a1a1a1;
		--fill-part-rect-stroke-hover: #3a3a3a;
		--fill-part-rect-fill-mix: #ffffff;
		/* --fill-tagblock-part-rect-drop-shadow: #97aebd88; */ 
	}

	:root.theme-dark #workspace {--XXXfill: #333333; /* default tag bg color */ }

	:root.theme-light #workspace {--XXXfill: #ffffff; /* default tag bg color */ }



	html, body {height: 100%; margin: 0; overflow: hidden; background: var(--fill);  font-family: var(--fontfamily); font-size: var(--px-font-size); font-weight: var(--bold); color: var(--text); }

	body.no-select, body.no-select * {user-select: none; -webkit-user-select: none; }
	body.no-select .texteditor {pointer-events: none; }


/* app */
	#app {display: grid; grid-template-rows: auto 1fr; height: 100vh; }

	/* Existing 3-column layout lives here */
	#layout {display: grid; height:100vh;  min-height: 0; /* important for overflow handling */ }

	/* Optional: allow workspace/sidebar to scroll correctly */
	.sidebar,
	.workspace {min-height: 0; }

	#app.sidebar-layout-left 	#layout {grid-template-columns:	minmax(var(--px-sidebar-min), var(--px-sidebar-size)) 6px 1fr; grid-template-areas: "sidebar splitter workspace"; }
	#app.sidebar-layout-right 	#layout {grid-template-columns:	1fr 6px minmax(var(--px-sidebar-min), var(--px-sidebar-size)); grid-template-areas: "workspace splitter sidebar"; }
	#app.sidebar-layout-top 	#layout {grid-template-rows:	minmax(var(--px-sidebar-min), var(--px-sidebar-size)) 6px 1fr; grid-template-areas: "sidebar" "splitter" "workspace"; }
	#app.sidebar-layout-bottom 	#layout {grid-template-rows:	1fr 6px minmax(var(--px-sidebar-min), var(--px-sidebar-size)); grid-template-areas: "workspace" "splitter" "sidebar"; }

	#app.sidebar-visible-no 	#layout {grid-template-columns: 1fr !important; grid-template-rows: 1fr !important; grid-template-areas: "workspace" !important; }	/* Force single-pane layout regardless of current side */
	
/* layout - sidebar */
							.sidebar {grid-area: sidebar; position: relative; overflow: hidden; display: flex; flex-direction: column; }
	#app.sidebar-visible-no .sidebar {display: none; }

		/* sidebar - sidebar__main */
		.sidebar__main {flex: 1 1 auto; overflow: auto; display: flex; flex-direction: column;   padding-top: var(--px-header-height-svg); }

			/* sidebar__main - textarea */
			.texteditor {flex: 1 1 50%; display:inline-flex; box-sizing: border-box; width: 100%; height: 100%; resize: none; padding: 8px; font-family: var(--fontfamily-texteditor); font-size: var(--px-font-size); font-weight: var(--bold); line-height: var(--px-line-height);  outline: none; /* white-space: pre;*/ tab-size: 3; border: none;  caret-color: #1976d2; overflow: auto;  background: color-mix(in srgb, var(--fill) 97%, var(--text)); color: color-mix(in srgb, var(--text) 90%, var(--fill)); }

/* layout - splitter */
								.splitter {grid-area: splitter; position: relative; cursor: col-resize; z-index: 10; }
	#app.sidebar-visible-no		.splitter {display: none; }
	#app.sidebar-layout-top 	.splitter,
	#app.sidebar-layout-bottom	.splitter {cursor: row-resize; }

/* layout - workspace */

	#workspace {grid-area: workspace; position: relative; overflow: hidden; display: flex; flex-direction: column; }


/* Prevent selection in the workspace */
#workspace * {
  user-select: none;
  -webkit-user-select: none;
}




/* toolbar */
						.toolbar 		{position: relative; overflow: auto hidden; }
						.toolbarTags 	{--bold-button: var(--bold); /* --bold-button is a 'hack' to use toolbarTags's (aka :root) --bold, so buttons don't use individual tag's --bold */ height: calc(var(--px-line-height) + 7px); max-width: calc(100% - (var(--px-line-height) + 60px)); padding: 7px; margin-top: calc((var(--px-line-height) + 34px) * -1); margin-left: 10px; background: #eee; border: 1px solid #ccc; border-radius: 5px; }
	.toolbar-visible-no	.toolbarTags 	{display: none; }

		.toolbar__button 	{position: absolute; transform: translateX(var(--pxX)); border: 1px solid var(--fill-part-rect-stroke); border-radius: 5px; font-family: var(--fontfamily); font-size: var(--px-font-size); line-height: var(--px-line-height); color: var(--text); white-space: nowrap; cursor: pointer; transition: opacity 120ms ease; }
		.button--inactive	{opacity: 0.33; }
		.button-draggable 	{cursor: grab; touch-action: none; }

		.toolbarTags 	.toolbar__button 			{background: color-mix(in srgb, var(--fill) 30%, var(--fill-part-rect-fill-mix)); font-weight: var(--bold-button); }
		.toolbarTags 	.toolbar__button.is-hover 	{background: color-mix(in srgb, var(--fill) 15%, var(--fill-part-rect-fill-mix)); outline: 1.5px solid black; z-index: 2; border-width: 0px; }


		.popup-btn {
			position: absolute;
			right: 10px;
			margin-top: calc((var(--px-line-height) + 34px) * -1);
			width: calc(var(--px-line-height) + 7px);
			height: calc(var(--px-line-height) + 7px);
			border-radius: 5px;
			border: 1px solid color-mix(in srgb, var(--text) 18%, transparent);
			background: color-mix(in srgb, var(--fill) 92%, black);
			color: var(--text);
			cursor: pointer;
			box-sizing: content-box;
			font-size: calc(var(--px-font-size) * 2);
			line-height: 0.15;
			padding: 0px; 
		}

		.popup-btn:hover{
			background: color-mix(in srgb, var(--fill) 86%, white); 
		}


/* workspace-main */

	.workspace__main {		/* class used here, not id, since font-width logic with hidden dom-elements use this class too */
		--fill-header-section-text-fill: color-mix(in srgb, var(--text) 40%, transparent);
		--fill-header-chapter-text-fill: color-mix(in srgb, var(--text) 60%, transparent);

		flex: 1 1 auto;
		overflow: auto;
		line-height: var(--px-line-height-svg);		/* probably not used - but for completeness */
		font-size: var(--px-font-size-svg);
		font-family: var(--fontfamily);
		font-weight: var(--bold);
		background: var(--fill);
		fill: var(--text);
	}


	/* workspace-panel */
	#workspace-panel	{position: relative; flex: 0 0 auto; height: 0px; /* NB: height 0px is part of making the toolbar float, while maintaining the structure (could be setting at some point) */ }






/*** svg#stage (svg from here) ***/

	svg#stage {display: block;  user-select: none; }

	/* header */
	.header							{}

	.header__rect					{fill: transparent; stroke-width: 0; }
	.header__rect:hover				{fill: color-mix(in srgb, var(--fill) 30%, #eee); } 
	.header__text					{pointer-events: none; dominant-baseline: middle; }

	.header__rect--section			{y: 0; height: calc(var(--px-line-height-svg) * 1.5); }
	.header__text--section			{transform: translate(5px, calc(var(--px-line-height-svg) * 1.0)); fill: var(--fill-header-section-text-fill); font-size: calc(var(--px-font-size-svg) * 1.25); font-weight: var(--bold); }

	.header__rect--chapter			{y: calc(var(--px-line-height-svg) * 1.5); height: var(--px-line-height-svg); }
	.header__text--chapter			{transform: translate(5px, calc(var(--px-line-height-svg) * 2)); fill: var(--fill-header-chapter-text-fill); font-size: calc(var(--px-font-size-svg) * 1.00); font-weight: var(--bold); }

	/* chapter */
	.chapter__rect					{stroke: var(--fill-chapter-rect-stroke); stroke-width: 1; }
	.chapter__rect--section-odd  	{fill: var(--fill-section-odd-chapter-rect-fill); }
	.chapter__rect--section-even 	{fill: var(--fill-section-even-chapter-rect-fill); }

	/* tagblock */
	.tagblocks			{}

					.tagblock			{--fill: Canvas; transition: transform var(--ms-transition) ease-out, opacity var(--ms-transition-quick) ease-out; }
	.chart-viewb	.tagblock			{transform: translate(0px, var(--yb)) }
	.chart-viewa	.tagblock			{transform: translate(0px, var(--ya)) }
					.tagblock--inactive	{opacity: 0.33; }

	/* tagblock - bg rect */
											.tagblock__bg-rect {fill: color-mix(in srgb, var(--fill) 5%, transparent); vector-effect: non-scaling-stroke; pointer-events: none; transition: opacity var(--ms-transition) ease-out, height var(--ms-transition) ease-out }
	.chart-viewa       						.tagblock__bg-rect {height: 0px; opacity: 0; pointer-events: none; /* needed since pointer-events are still active in the not-scaled area. this is an error in the browser-engine */ }
	.chart-viewb  		.tagblock--active   .tagblock__bg-rect {height: calc((var(--px-line-height-svg) * var(--count-lines)) + 10px); }
	.chart-viewb  		.tagblock--inactive	.tagblock__bg-rect {height: calc((var(--px-line-height-svg) * 1) + 10px); }
						.tagblock.is-hover	.tagblock__bg-rect {fill: color-mix(in srgb, var(--fill) 10%, #fff3); stroke: #77777730; }

	/* part */
	.tagblock__parts	{}
										.tagblock__part, 
										.tb-part 	{transition: var(--ms-transition) ease-out; } 
	.chart-viewa						.tb-part 	{transform: translate(var(--x), var(--ya)) }
	.chart-viewb						.tb-part 	{transform: translate(var(--x), var(--yb)) }
	.chart-viewb	.tagblock--inactive	.tb-part 	{transform: translate(var(--x), 5px); }

					.tb-part__rect	{opacity: var(--rect-opacity); fill: color-mix(in srgb, var(--fill) 30%, var(--fill-part-rect-fill-mix)); stroke: var(--fill-part-rect-stroke); stroke-width: 1; rx: 4px; /* filter: drop-shadow(3px 4px 6px var(--fill-tagblock-part-rect-drop-shadow));*/ }
	.chart-viewa 	.tb-part__rect	{height: var(--px-line-height-svg); transform: scaleY(var(--count-lines-svg)); transition: transform var(--ms-transition) ease-out; vector-effect: non-scaling-stroke; }
	.chart-viewb 	.tb-part__rect	{height: var(--px-line-height-svg); /*?transition: transform var(--ms-transition) ease-out;*/ vector-effect: non-scaling-stroke; }

					.tb-part__text						{font-size: var(--px-font-size-svg);  pointer-events: none; transform: scaleY(1); opacity: 1; transition: transform var(--ms-transition) ease-out, opacity var(--ms-transition) ease-out; }
					.tb-part__text--chart-viewa tspan	{dominant-baseline: middle; fill: var(--text); font-weight: var(--bold); }
					.tb-part__text--chart-viewb			{dominant-baseline: middle; fill: var(--text); font-weight: var(--bold); } 

	.chart-viewa	.tb-part__text--chart-viewb	{transform: scaleY(0); opacity: 0; }
	.chart-viewb	.tb-part__text--chart-viewa	{transform: scaleY(0); opacity: 0; }

	.chart-viewa	.tb-part--special	.line1 {font-size: 75%; fill: #777; }
	.chart-viewa	.tb-part--special	.line2 {font-size: 150%; }

					.tb-part__symbol	{text-anchor: end; transition: var(--ms-transition) ease-out; }
	.chart-viewa	.tb-part__symbol	{transform: translate(var(--x), var(--y));  					font-size: calc(var(--px-line-height-svg) * 1.5);	dominant-baseline: auto;  }
	.chart-viewb	.tb-part__symbol	{transform: translate(10px, calc(var(--px-line-height-svg) * 0.5)); font-size: calc(var(--px-line-height-svg) * 1.0); 	dominant-baseline: central; }

	/* hover tagblock--active */
	.chart-viewa	.tagblock--active.is-hover .tb-part {/* transform: translate(calc(var(--x) - 8px), calc(var(--ya) - 4px)) scale(1.127); */ }
					.tagblock--active.is-hover .tb-part__rect	{fill: color-mix(in srgb, var(--fill) 20%, var(--fill-part-rect-fill-mix)); stroke: #333; stroke-width: 1.5; }

					.tagblock--active.is-hover .tagblock-circle,
					.tagblock--active.is-hover .tagblock-polyline {stroke-width: 2px !important; }

	/* hover tb-part */
					.tagblock--active 	.tb-part.is-hover 	.tb-part__rect {fill: color-mix(in srgb, var(--fill) 5%, #fff) !important; }

	/* hover circle */
					.tagblock--active 	.tagblock-circle.is-hover 			{fill: color-mix(in srgb, var(--fill) 10%, #fff) !important; r: 12px;}

	/* graphs */
											.tagblock-graphs 	{opacity: 1;	transition: opacity var(--ms-transition-quick) ease-out; }
	.chart-viewa	.tagblock--inactive		.tagblock-graphs 	{opacity: 0.4;	pointer-events: none; }
	.chart-viewb	.tagblock--inactive		.tagblock-graphs 	{opacity: 0;	pointer-events: none; }

	.tagblock-polyline		{fill: none; stroke: color-mix(in srgb, var(--fill) 70%, #000); stroke-width: 1.25; /* filter: url(#glow); */ pointer-events: none; }
	.tagblock-circle 		{fill: color-mix(in srgb, var(--fill) 25%, #fff); stroke: color-mix(in srgb, var(--fill) 70%, #000); stroke-width: 1.5; /* filter: url(#glow); */ }
	
	.tagblock-circle-text 			{opacity: 0; transform: translate(16px, 1px); pointer-events: none;  dominant-baseline: middle; }
	.tagblock-circle-text.is-hover 	{opacity: 1; }

	/* .tagblock--inactive		.graph	{opacity: 0.5; pointer-events: none; } */

	.tagblock-circle		{transition: r var(--ms-transition) ease-out, opacity var(--ms-transition-quick) ease-out; }
	.tagblock-circle-text	{transition: opacity var(--ms-transition-quick) ease-out; }

	</style>

	<style>


	/* css for popup */
	:root {
		color-scheme: light dark;
		--bg: var(--fill);
		--fg: var(--text);
		--border: color-mix(in srgb, var(--text) 14%, transparent);
		--popup-bg: color-mix(in srgb, var(--fill) 92%, black);
		--shadow: 0 18px 50px rgba(0,0,0,.25);
		--btn-bg: color-mix(in srgb, var(--fill) 92%, black);
		--btn-hover: color-mix(in srgb, var(--fill) 86%, black);
		--radius: 14px;
		--focus: color-mix(in srgb, Highlight 55%, transparent);
	}
	:root.theme-light {color-scheme: light; }
	:root.theme-dark { color-scheme: dark;  }

	button.btn, button.pill, button.tablist__btn, button.close__btn, button.unpin__btn {font-family: var(--fontfamily); font-size: var(--px-font-size); font-weight: var(--bold); }
	
	.popup-overlay {position: fixed; inset:0; background: rgba(0,0,0,.28); display:flex; align-items:center; justify-content:center; padding:18px; z-index: 10; overscroll-behavior: contain; touch-action: none; }
	
	.popup {width: min(780px, 100%); max-height: min(78vh, 760px); background: var(--popup-bg); border:1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; display:flex; flex-direction: column; touch-action: auto; }
	
	.popup__panel {display:flex; align-items:center; justify-content: space-between; gap: 10px; padding: 10px 12px; border-bottom:1px solid var(--border); }
	.popup__title {font-weight:650; letter-spacing:.2px; white-space: nowrap; }
	.close__btn {border:1px solid var(--border); background: transparent; color: var(--fg); border-radius: 10px; padding: 6px 10px; cursor:pointer; flex: 0 0 auto; }
	.close__btn:hover {background: color-mix(in srgb, var(--text) 7%, transparent); }
	
	.popup__tablist {margin-left: auto; display:flex; border:1px solid var(--border); border-radius: 999px; overflow: hidden; background: color-mix(in srgb, var(--text) 6%, transparent); }
	.tablist__btn {border:0; background: transparent; color: var(--fg); padding: 7px 12px; cursor:pointer; user-select:none; -webkit-user-select:none; display:flex; gap:8px; align-items:center; font-weight: 600; }
	.tablist__btn:hover {background: color-mix(in srgb, var(--text) 8%, transparent); }
	.tablist__btn-selected {background: color-mix(in srgb, Highlight 18%, transparent); box-shadow: inset 0 0 0 1px color-mix(in srgb, Highlight 45%, transparent); }
	
	.popup__main {padding: 14px; overflow: auto; min-height: 0; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; touch-action: pan-y; }

	.main__content {display: grid; gap: 14px; }
	
	.kbd {font-size: 12px; border: 1px solid var(--border); border-bottom-width: 2px; padding: 1px 6px; border-radius: 8px; opacity: .85; white-space: nowrap; }
	.kbd.is-label {pointer-events:none; }
	
	.content__section {border:1px solid var(--border); border-radius: 12px; overflow:hidden; background: color-mix(in srgb, var(--text) 5%, transparent); }
	.section__head {padding: 10px 12px; font-weight: 600; display:flex; align-items:center; justify-content: space-between; border-bottom: 1px solid var(--border); }
	.section__body {padding: 10px 12px; display:grid; gap: 10px; }
	.hint {opacity:.75; font-size: 12px; }
	
	.pillbar {display:flex; gap: 8px; flex-wrap: wrap; }
	.pill {border: 1px solid var(--border); background: transparent; color: var(--fg); border-radius: 999px; padding: 7px 10px; cursor:pointer; user-select:none; -webkit-user-select:none; display:inline-flex; align-items:center; gap:8px; }
	.pill:hover 	 {background: color-mix(in srgb, var(--text) 7%, transparent); }
	.pill-selected 	 {border-color: color-mix(in srgb, Highlight 55%, var(--border)); background: color-mix(in srgb, Highlight 18%, transparent); }
	
	.body__item {display:grid; grid-template-columns: auto 1fr auto; align-items:center; column-gap: 12px; border: 1px solid var(--border); background: var(--btn-bg); border-radius: 12px; padding: 10px 12px; cursor: pointer; user-select:none; -webkit-user-select:none; touch-action: none; }
	.body__item:hover {background: var(--btn-hover); }
	.item__meta {display:grid; gap:2px; min-width:0; }
	.item__name {font-weight:600; white-space:nowrap; overflow:hidden; text-overflow: ellipsis; }
	.item__desc {opacity:.72; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow: ellipsis; }
	.item__right {display:inline-flex; align-items:center; gap:10px; justify-self:end; }

	.body__itemP {}
	.item__header {display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px;}
	.header__title {font-weight: 600;}

	.switch {width:44px; height:26px; border-radius: 999px; border:1px solid var(--border); background: color-mix(in srgb, var(--text) 10%, transparent); position: relative; cursor:pointer; }
	.switch::after {content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius: 999px; background: var(--bg); border:1px solid var(--border); transition: transform 120ms ease; }

	.toggle-on .switch {background: color-mix(in srgb, Highlight 35%, transparent); border-color: color-mix(in srgb, Highlight 55%, var(--border)); }
	.toggle-on .switch::after {transform: translateX(18px); }
	.switch:focus-visible {outline: 2px solid var(--focus); outline-offset: 2px; }
	
	.draggable-list.is-reordering .body__item:hover {background: var(--btn-bg); }
	
	.unpin__btn {border:1px solid var(--border); background: transparent; color: var(--fg); border-radius: 10px; padding: 6px 8px; cursor:pointer; }
	.unpin__btn:hover {background: color-mix(in srgb, var(--text) 7%, transparent); }
	
	.body__item.is-active {border-color: color-mix(in srgb, Highlight 45%, var(--border)); background: color-mix(in srgb, Highlight 12%, var(--btn-bg)); box-shadow: inset 4px 0 0 0 Highlight; }
	.body__item.is-active .item__name {font-weight:700; }
	.body__item.is-dragging {opacity: 0; }
	
	.ghost {position: fixed; left:0; top:0; z-index: 9999; pointer-events: none; border: 1px solid color-mix(in srgb, Highlight 50%, var(--border)); background: color-mix(in srgb, Highlight 14%, var(--btn-bg)); border-radius: 12px; box-shadow: 0 12px 28px rgba(0,0,0,.28); padding: 10px 10px; width: var(--ghost-w, 320px); }

	.content__actions {display:flex; gap:10px; flex-wrap: wrap; }
	.btn {border: 1px solid var(--border); background: var(--btn-bg); color: var(--fg); border-radius: 12px; padding: 10px 12px; cursor:pointer; user-select:none; -webkit-user-select:none; display:inline-flex; align-items:center; gap:10px; }
	.btn:hover {background: var(--btn-hover); }

	.texteditor-globalcss {width: 100%; min-height: 320px; border-radius: 10px; }

	</style>

	<style id="style-from-settings"></style>
	<style id="style-from-doc"></style>
</head>

<body>
	<div id="app" class="toolbar-visible-yes sidebar-visible-yes sidebar-layout-left chart-viewa">

		<div id="layout" class="layout">

			<aside id="sidebar" class="sidebar">
				<div id="sidebar-main" class="sidebar__main">

				</div>

	//:::
	//:::	🔹 extractFirstCssBlockFromText
	extractFirstCssBlockFromText(args) {
		if (LOGGING) console.group('%c CModel %c extractFirstCssBlockFromText', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		const text = String(args.text ?? "");
		const re = /(?:^|\n)```css[^\n]*\n([\s\S]*?)\n```/i;
		const m = text.match(re);
		
		if (LOGGING) console.groupEnd();
		return m ? m[1] : "";
	},

	//:::	🔹 buildDocdataFromText
	buildDocdataFromText(args) {
		if (LOGGING) console.group('%c CModel %c buildDocdataFromText', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		const NOTAG = 'notag';
		const txtMarkdown = args.text;

		// :		(→ ☐ countLeadingTabs)
		const countLeadingTabs = (line) => {
			let count = 0;
			while (count < line.length && line[count] === '\t') count += 1;
			return count;
		};

		// :		(→ ☐ stripBulletPrefix)
		const stripBulletPrefix = (text) => text.replace(/^\s*-\s*/, '');

		// :		(→ ☐ parseTagAndCaption)
		const parseTagAndCaption = (text) => {
			const trimmed = text.trim();
			const match = trimmed.match(/^#([A-Za-z0-9_-]+)(.*)$/);
			if (!match){
				return { tag: null, caption: trimmed };
			}
			const [, tag, rest] = match;
			return {
				tag,
				caption: rest.replace(/^\s+/, '')
			};
		};

		// :		(→ ☐ ensureTagblock)
		const ensureTagblock = (map, tagId) => {
			if (!map.has(tagId)){
				map.set(tagId, { id: tagId, arrPart: [], isActive: true});
			}
			return map.get(tagId);
		};

		const sections = [];
		const arrChapter = [];
		const tagblockMap = new Map();
		const partOrderByChapter = new Map();

		let currentSectionIdx = -1;
		let currentChapterIdx = -1;
		let idxTextareaLine = -1;

		let inYamlFrontMatter = false;
		let yamlDone = false;          // only allow YAML block at top
		let inFence = false;

		const linesParsed = txtMarkdown.split(/\r?\n/);

		for (const rawLine of linesParsed) {
			idxTextareaLine++;


			const lineTrim = rawLine.trim();

			// --- YAML FRONT MATTER (only allowed at very top) ---
			if (!yamlDone && idxTextareaLine === 0 && lineTrim === '---') {
				inYamlFrontMatter = true;
				continue;
			}

			if (inYamlFrontMatter) {
				if (lineTrim === '---') {
					inYamlFrontMatter = false;
					yamlDone = true;
				}
				continue; // skip parsing but keep line count
			}

			// --- FENCED CODE BLOCKS (``` … ```) ---
			if (lineTrim.startsWith('```')) {
				inFence = !inFence;

				continue; // skip fence lines themselves
			}

			if (inFence) continue; // skip fenced content



			if (!rawLine.trim()) continue;

			const depth = countLeadingTabs(rawLine);
			if (depth >= 3) continue;

			const contentAfterTabs = rawLine.slice(depth);
			const stripped = stripBulletPrefix(contentAfterTabs);
			if (!stripped.trim()) continue;

			const { tag: tagRaw, caption } = parseTagAndCaption(stripped);
			const tagNormalized = tagRaw ? tagRaw.toLowerCase() : null;
			const trimmedCaption = caption.trim();
			const trimmedContent = stripped.trim();

			if (depth === 0){
				const captionValue = trimmedCaption || (tagRaw ? tagRaw : trimmedContent);
				const sectionTag = tagNormalized || NOTAG;
				currentSectionIdx = sections.length;
				sections.push({
					caption: captionValue,
					tag: sectionTag,
					chapterIndices: [],
					idxTextareaLine
				});
				currentChapterIdx = -1;
				continue;
			}

			if (depth === 1){
				if (currentSectionIdx === -1){
					currentSectionIdx = sections.length;
					sections.push({
						caption: 'Untitled section',
						tag: NOTAG,
						chapterIndices: []
					});
				}

				const captionValue = trimmedCaption || (tagRaw ? tagRaw : trimmedContent);
				const chapterTag = tagNormalized || NOTAG;
				currentChapterIdx = arrChapter.length;

				arrChapter.push({
					caption: captionValue,
					idxSection: currentSectionIdx,
					tag: chapterTag,
					idxTextareaLine
				});

				sections[currentSectionIdx].chapterIndices.push(currentChapterIdx);
				partOrderByChapter.set(currentChapterIdx, 0);
				continue;
			}

			if (depth === 2) {
				if (currentChapterIdx === -1 || currentSectionIdx === -1) continue;

				const partTag = tagNormalized || NOTAG;
				const partCaption = trimmedCaption;
				const idxOrder = partOrderByChapter.get(currentChapterIdx) || 0;

				const part = {
					idxTextareaLine,
					idxSection: currentSectionIdx,
					idxChapter: currentChapterIdx,
					idxOrderInChapter: idxOrder,
					caption: partCaption.split(' //')[0].trim(),  // strip metadata block
				};

				//: 		→ this: getPartMetadataFromTextline
				part.metadata = this.getPartMetadataFromTextline({trimmedContent});
				
				partOrderByChapter.set(currentChapterIdx, idxOrder + 1);

				const tagblock = ensureTagblock(tagblockMap, partTag);
				tagblock.arrPart.push(part);
			}
		}

		const sectionIndexMap = new Map();
		const arrSection = [];

		sections.forEach((section, originalIdx) => {
			const { chapterIndices } = section;
			if (!chapterIndices.length) return;

			const newIdx = arrSection.length;
			sectionIndexMap.set(originalIdx, newIdx);

			arrSection.push({
				caption: section.caption,
				rangeChapters: [chapterIndices[0], chapterIndices[chapterIndices.length - 1]],
				tag: section.tag,
				idxTextareaLine: section.idxTextareaLine
			});
		});

		arrChapter.forEach((chapter) => {
			const mappedIdx = sectionIndexMap.get(chapter.idxSection);
			if (mappedIdx != null) chapter.idxSection = mappedIdx;
		});

		tagblockMap.forEach((tagblock) => {
			tagblock.arrPart.forEach((part) => {
				const mappedIdx = sectionIndexMap.get(part.idxSection);
				if (mappedIdx != null) part.idxSection = mappedIdx;
			});
		});

		const arrTagblock = Array.from(tagblockMap.values()).sort((a, b) => {
			if (a.id === NOTAG && b.id !== NOTAG) return -1;
			if (b.id === NOTAG && a.id !== NOTAG) return 1;
			return a.id.localeCompare(b.id);
		});

		arrTagblock.forEach((tagblock) => {
			let idxRowCurrent = -1;
			let idxSectionCurrent = -1;

			tagblock.arrPart.forEach((part) => {

				// Set idxRow on each part, resetting to 0 for each new section
				if (part.idxSection !== idxSectionCurrent) {
					idxSectionCurrent = part.idxSection;
					idxRowCurrent = 0;
				}
				part.idxRow = idxRowCurrent;
				idxRowCurrent++;

				// --- NEW GRAPH LOGIC USING part.metadata ---
				const metadata = part.metadata;
				if (!metadata) return;

				// Extract numeric metadata keys
				const numericEntries = Object.entries(metadata)
					.filter(([key, value]) => typeof value === 'number');

				if (!numericEntries.length) return;

				if (!tagblock.graphtags) tagblock.graphtags = {};

				numericEntries.forEach(([key, value]) => {
					if (!tagblock.graphtags[key]) {
						tagblock.graphtags[key] = [];
					}
					tagblock.graphtags[key].push({
						idxChapter: part.idxChapter,
						value,
						idxTextareaLine: part.idxTextareaLine,
					});
				});
			});

			const countRowsRequiredForParts = Math.max(...tagblock.arrPart.map(p => p.idxRow)) + 1;
			const countRowsRequiredForGraph = tagblock.graphtags ? COUNT_ROWS_FOR_GRAPH_HEIGHT : 0;

			tagblock.countRows = Math.max(countRowsRequiredForParts, countRowsRequiredForGraph);
		});

		this.docdata = {
			arrChapter,
			arrSection,
			arrTagblock,
		};

		if (LOGGING) console.groupEnd();
	},

	// Parses inline metadata like:
	// "@weight 65.5kg", "@bmi: 21,", "@color #ff0", "@code🥇", "@code:🥇"
	//:::	🔹	getPartMetadataFromTextline
	getPartMetadataFromTextline(args) {
		if (LOGGING) console.log('%c CModel %c getPartMetadataFromTextline', LOG_GREY, LOG_BLUE);

		const metadata = {};
		
		// Matches:
		//   @key value
		//   @key: value
		//   @key:value
		//   @keyvalue   (no separator)  -> optional support (for @code🥇)
		//
		// key:  [A-Za-z0-9_-]+
		// value: next non-space token (one "word")
		//
		// Group 1 = key
		// Group 2 = value (if separated by space/colon)
		// Group 3 = value (if immediately attached: @code🥇)
		const re = /@([A-Za-z0-9_-]+)(?:(?:\s*:\s*|\s+)(\S+)|(\S+))/g;
		
		let m;
		while ((m = re.exec(args.trimmedContent)) !== null) {
			const key = m[1];
			const rawToken = (m[2] ?? m[3] ?? "").trim();
			if (!key || !rawToken) continue;
			
			// Strip common trailing punctuation from the token (so "21," -> "21")
			const token = rawToken.replace(/[),.;!?]+$/g, "");
			
			// If token begins with a number, parse that numeric prefix.
			// Supports:
			//   65
			//   65.5
			//   65,5   (decimal comma)
			//   -3.2
			//   65.5kg
			//   21%
			const numMatch = token.match(/^-?\d+(?:[.,]\d+)?/);
			if (numMatch) {
				const numStr = numMatch[0].replace(",", ".");
				metadata[key] = Number(numStr);
			}
			else {
				metadata[key] = token;
			}
		}
		
		return metadata;
	},

	//:::	🔹 setTagblockMetadataFromCss
	setTagblockMetadataFromCss(args) {
		if (LOGGING) console.group('%c CModel %c setTagblockMetadataFromCss', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		// add metadata for each tagblock
		for (const tagblock of this.docdata.arrTagblock) {
			const selector = '.' + tagblock.id;			// eg. '.gitte'

			//: 		→ this: getTagblockMetadataFromCss * 2
			const metadataForSelectorFromGlobalCss		= this.getTagblockMetadataFromCss({txtCss: args.txtGlobalCss,   selector: selector}, 'global');
			const metadataForSelectorFromDocumentCss	= this.getTagblockMetadataFromCss({txtCss: args.txtDocumentCss, selector: selector}, 'doc');

			tagblock.metadata = {
				...metadataForSelectorFromGlobalCss,
				...metadataForSelectorFromDocumentCss,	// overrides keys set from ...globalDefinitions with same name
			};
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	getTagblockMetadataFromCss
	getTagblockMetadataFromCss(args, info) {
		if (LOGGING) console.log('%c CModel %c getTagblockMetadataFromCss %c (' + args.selector + ', ' + info + ')', LOG_GREY, LOG_BLUE, LOG_GREEN);
		//if (LOGARGS) console.log(args);
		
		const escapedSelector = args.selector.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');	// Escape selector for use in RegExp (e.g. ".gitte" → "\.gitte")
		const re = new RegExp(`^\\s*${escapedSelector}\\s*\\{([^}]*)\\}`, 'm');		// Match: optional spaces + selector + optional spaces + { ... }. // [^}]* grabs everything until the first closing brace (including newlines)
		const match = args.txtCss.match(re);
		if (!match) return {};

		const inside = match[1].trim();
		if (!inside) return {};

		const obj = {};

		inside.split(';').forEach(entry => {
			const pair = entry.trim();
			if (!pair) return;

			const [rawKey, rawVal] = pair.split(':').map(s => s.trim());
			if (!rawKey || rawVal === undefined) return;

			if (!rawKey.startsWith('--')) return;		// Only care about CSS custom properties, e.g. --fill

			const key = rawKey.slice(2);		// Remove leading "--"
			const camelKey = key.replace(/-([a-z])/g, (_, letter) => letter.toUpperCase());		// kebab-case → camelCase (color-tag → colorTag)

			let value = rawVal;

			if (rawVal === 'true') {		// Convert booleans
				value = true;
			} else if (rawVal === 'false') {
				value = false;
			}
			
			else if (/^-?\d+(\.\d+)?$/.test(rawVal)) {		// Convert numbers (integer or float)
				value = Number(rawVal);
			}
			// Else keep as string

			obj[camelKey] = value;
		});

		return obj;
	},

	//:::	🔹 setDocdataDefinitionsFromCss
	setDocdataDefinitionsFromCss(args) {
		if (LOGGING) console.group('%c CModel %c setDocdataDefinitionsFromCss', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		//: 		→ this: getDocdataDefinitionsFromCss * 2
		const globalDefinitions = this.getDocdataDefinitionsFromCss({txtCss: args.txtGlobalCss},	'(globalDefinitions)');
		const docDefinitions    = this.getDocdataDefinitionsFromCss({txtCss: args.txtDocumentCss},	'(docDefinitions)');

		this.docdata.definitions = {
			...globalDefinitions,
			...docDefinitions   		// overrides keys set from ...globalDefinitions with same name
		};
	
		if (LOGGING) console.groupEnd();
	},

	/**
	 * Parse "#def {key: ...; unit: ...; min: ...; max: ...; target: ...}" lines
	 * from a settings text blob (optionally containing a ```css fenced block).
	 *
	 * Returns an object like:
	 * {
	 *   weight: { unit: 'kg', min: 40, max: 140, target: 65 },
	 *   bmi:    { unit: 'bmi', min: 15, max: 30, target: 21 }
	 * }
	 */
	//:::	🔹	getDocdataDefinitionsFromCss
	getDocdataDefinitionsFromCss(args, info) {
		if (LOGGING) console.group('%c CModel %c getDocdataDefinitionsFromCss %c' + info, LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		const defs = {};
		
		// 1) If a ```css (or any) fenced block exists, parse only inside it.
		//    Otherwise, parse the whole text.
		const fenceMatch = args.txtCss.match(/```(?:css|obx|txt)?\s*\n([\s\S]*?)\n```/i);
		const src = fenceMatch ? fenceMatch[1] : args.txtCss;
		
		// 2) Find all #def { ... } lines (tolerant with whitespace)
		//    Works even if there are multiple defs per file.
		const defMatches = src.matchAll(/^\s*#def\s*\{([^}]*)\}\s*;?\s*$/gmi);
		
		for (const m of defMatches) {
			const inside = (m[1] || "").trim();
			if (!inside) continue;
			
			// Split on semicolons into "key: value" tokens
			const pairs = inside
				.split(";")
				.map(s => s.trim())
				.filter(Boolean);
			
			const obj = {};
			for (const pair of pairs) {
				// allow "key: value" with arbitrary whitespace
				const mm = pair.match(/^([a-zA-Z_][\w-]*)\s*:\s*(.+)$/);
				if (!mm) continue;
				
				const k = mm[1];
				let v = mm[2].trim();
				
				// Strip optional trailing comma (user might type it)
				v = v.replace(/,\s*$/, "");
				
				// Strip optional wrapping quotes (single or double)
				if (
				(v.startsWith('"') && v.endsWith('"')) ||
				(v.startsWith("'") && v.endsWith("'"))
				) {
					v = v.slice(1, -1);
				}
				
				// Convert numeric values when they look like numbers
				// (supports ints and decimals, incl. negative)
				if (/^-?\d+(?:\.\d+)?$/.test(v)) {
					obj[k] = Number(v);
				} else {
					obj[k] = v;
				}
			}
			
			// Require a "key" field to register the definition
			const defKey = typeof obj.key === "string" ? obj.key.trim() : "";
			if (!defKey) continue;
			
			// Remove "key" from stored fields
			delete obj.key;
			
			// Store: later defs with same key override earlier ones
			defs[defKey] = obj;
		}
		
		if (LOGGING) console.groupEnd();
		return defs;
	},

	//:::	🔹 reapplyDocstate
	reapplyDocstate() {
		if (LOGGING) console.group('%c CModel %c reapplyDocstate', LOG_GREY, LOG_BLUE, LOG_GREEN);

		if (LOGARGS) console.log(this.docstate);

		// set isActive on each tagblock
		for (const tagblock of this.docdata.arrTagblock) {
			tagblock.isActive = this.docstate.oTagblockState[tagblock.id]?.isActive ?? tagblock.isActive;
		}

		// reorder tagblocks
		this.docdata.arrTagblock.sort((a, b) => this.docstate.arrTagOrder.indexOf(a.id) - this.docstate.arrTagOrder.indexOf(b.id));
		if (LOGGING) console.groupEnd();
	},
};

//:::📙 const CWrapper
const CWrapper = {
	reloadTimer: null,		// debounce bursty save events (VS Code / Obsidian often save in quick bursts)
	msTimestampWriteFileContent: 0,

	//:::	🔹 init()
	init() {
		if (LOGGING) console.group('%c CWrapper %c init', LOG_GREY, LOG_RED);

		// listen for menu events from Rust
		window.__TAURI__.event.listen('menu', (e) => {
			if (LOGGING) console.group('%c CWrapper %c window.__TAURI__.event.listen(menu)', LOG_GREY, LOG_BLUE, LOG_GREEN);
			if (LOGARGS) console.log(e);

			this.onMenuEvent(e);
			if (LOGGING) console.groupEnd();
		});

		// listen for file-changed events from Rust
		window.__TAURI__.event.listen('file-changed', (e) => {
			if (LOGGING) console.group('%c CWrapper %c window.__TAURI__.event.listen(file-changed)', LOG_GREY, LOG_BLUE, LOG_GREEN);
			if (LOGARGS) console.log(e);

			this.onFileChangedEvent(e);
			if (LOGGING) console.groupEnd();
		});		

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onMenuEvent
	onMenuEvent: (e) => {
		if (LOGGING) console.group('%c CWrapper %c onMenuEvent %c [type: ' + e.payload + ']', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		const sender = 'CWrapper: onMenuEvent: ' + e.payload;

		// menu: App (Mac only)
		//::		🔻 app.settings
		//:			→ App: dispatch:				popup.settings.open
		if (e.payload === 'app.settings') 			App.dispatch({type: 'popup.settings.open', sender});
		//::		🔻 app.exit
		//:			→ App: dispatch:				COMING...
		if (e.payload === 'app.exit') 				App.dispatch({type: 'COMING...', sender});

		// menu: File
		//::		🔻 file.new
		//:			→ App: dispatch:				COMING...
		if (e.payload === 'file.new') 				App.dispatch({type: 'COMING...', sender});
		//::		🔻 file.open
		//:			→ App: dispatch:				wrapper.dialog.open.show
		if (e.payload === 'file.open') 				App.dispatch({type: 'wrapper.dialog.open.show', sender});
		//::		🔻 file.saveas
		//:			→ App: dispatch:				COMING...
		if (e.payload === 'file.saveas') 			App.dispatch({type: 'COMING...', sender});
		//::		🔻 file.pincurrent
		//:			→ App: dispatch:				model.filepath.pin
		if (e.payload === 'file.pincurrent') 		App.dispatch({type: 'model.filepath.pin', sender});
		//::		🔻 file.settings
		//:			→ App: dispatch:				popup.settings.open
		if (e.payload === 'file.settings') 			App.dispatch({type: 'popup.settings.open', sender});
		//::		🔻 file.exit
		//:			→ App: dispatch:				COMING...
		if (e.payload === 'file.exit') 				App.dispatch({type: 'COMING...', sender});

		// menu: View
		//::		🔻 view.sidebar.toggle
		//:			→ App: dispatch:				framework.sidebar.visibility.set:	!isSidebarVisible
		if (e.payload === 'view.sidebar.toggle')	App.dispatch({type: 'framework.sidebar.visibility.set', isSidebarVisible: !CModel.appstate.isSidebarVisible, sender});
		//::		🔻 view.toolbar.toggle
		//:			→ App: dispatch:				framework.toolbar.visibility.set	!isToolbarVisible
		if (e.payload === 'view.toolbar.toggle')	App.dispatch({type: 'framework.toolbar.visibility.set', isToolbarVisible: !CModel.appstate.isToolbarVisible, sender});

		//::		🔻 view.chart.viewa
		//:			→ App: dispatch:				chart.view.select:				idxView: VIEWA
		if (e.payload === 'view.chart.viewa')		App.dispatch({type: 'chart.view.select', idxView: VIEWA, sender});
		//::		🔻 view.chart.viewb
		//:			→ App: dispatch:				chart.view.select				idxView: VIEWB
		if (e.payload === 'view.chart.viewb')		App.dispatch({type: 'chart.view.select', idxView: VIEWB, sender});

		//::		🔻 view.zoom.normal.in
		//:			→ App: dispatch:				chart.zoom:					typeZoom: 0, isIn
		if (e.payload === 'view.zoom.normal.in')	App.dispatch({type: 'chart.zoom', typeZoom: 0, isIn: true, isOut:  false, isReset: false, sender});
		//::		🔻 view.zoom.normal.out
		//:			→ App: dispatch:				chart.zoom:					typeZoom: 0, isOut
		if (e.payload === 'view.zoom.normal.out')	App.dispatch({type: 'chart.zoom', typeZoom: 0, isIn: false, isOut: true,  isReset: false, sender});
		//::		🔻 view.zoom.normal.reset
		//:			→ App: dispatch:				chart.zoom:					typeZoom: 0, isReset
		if (e.payload === 'view.zoom.normal.reset')	App.dispatch({type: 'chart.zoom', typeZoom: 0, isIn: false, isOut: false, isReset: true, sender});		// jk: delete ?

		//::		🔻 view.zoom.width.in
		//:			→ App: dispatch:				chart.zoom:					typeZoom: 1, isIn
		if (e.payload === 'view.zoom.width.in')		App.dispatch({type: 'chart.zoom', typeZoom: 1, isIn: true, isOut:  false, isReset: false, sender});
		//::		🔻 view.zoom.width.out
		//:			→ App: dispatch:				chart.zoom:					typeZoom: 1, isOut
		if (e.payload === 'view.zoom.width.out')	App.dispatch({type: 'chart.zoom', typeZoom: 1, isIn: false, isOut: true,  isReset: false, sender});

		//::		🔻 view.zoom.lines.in
		//:			→ App: dispatch:				chart.zoom:					typeZoom: 2, isIn
		if (e.payload === 'view.zoom.lines.in')		App.dispatch({type: 'chart.zoom', typeZoom: 2, isIn: true, isOut:  false, isReset: false, sender});
		//::		🔻 view.zoom.lines.out
		//:			→ App: dispatch:				chart.zoom:					typeZoom: 2, isOut
		if (e.payload === 'view.zoom.lines.out')	App.dispatch({type: 'chart.zoom', typeZoom: 2, isIn: false, isOut: true,  isReset: false, sender});

		//::		🔻 view.sidebar.layout.left
		//:			→ App: dispatch:				framework.sidebar.layout.set:	sidebar-layout-left
		if (e.payload === 'view.sidebar.layout.left')	App.dispatch({type: 'framework.sidebar.layout.set', idSidebarLayout: 'sidebar-layout-left' , sender});
		//::		🔻 view.sidebar.layout.right
		//:			→ App: dispatch:				framework.sidebar.layout.set:	sidebar-layout-right
		if (e.payload === 'view.sidebar.layout.right')	App.dispatch({type: 'framework.sidebar.layout.set', idSidebarLayout: 'sidebar-layout-right' , sender});
		//::		🔻 view.sidebar.layout.top
		//:			→ App: dispatch:				framework.sidebar.layout.set:	sidebar-layout-top
		if (e.payload === 'view.sidebar.layout.top')	App.dispatch({type: 'framework.sidebar.layout.set', idSidebarLayout: 'sidebar-layout-top' , sender});
		//::		🔻 view.sidebar.layout.bottom
		//:			→ App: dispatch:				framework.sidebar.layout.set:	sidebar-layout-bottom
		if (e.payload === 'view.sidebar.layout.bottom') App.dispatch({type: 'framework.sidebar.layout.set', idSidebarLayout: 'sidebar-layout-bottom' , sender});

		//::		🔻 view.theme.system
		//:			→ App: dispatch:				wrapper.theme.set:			system
		if (e.payload === 'view.theme.system')		App.dispatch({type: 'wrapper.theme.set', idTheme: 'system', sender});
		//::		🔻 view.theme.light
		//:			→ App: dispatch:				wrapper.theme.set:			light
		if (e.payload === 'view.theme.light')		App.dispatch({type: 'wrapper.theme.set', idTheme: 'light', sender});
		//::		🔻 view.theme.dark
		//:			→ App: dispatch:				wrapper.theme.set:			dark
		if (e.payload === 'view.theme.dark')		App.dispatch({type: 'wrapper.theme.set', idTheme: 'dark', sender});

		//::		🔻 help.docs
		//:			→ App: dispatch:				COMING...
		if (e.payload === 'help.docs') 				App.dispatch({type: 'COMING...', sender});
		//::		🔻 help.website
		//:			→ App: dispatch:				COMING...
		if (e.payload === 'help.website') 			App.dispatch({type: 'COMING...', sender});


		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onFileChangedEvent
	onFileChangedEvent(e) {
		if (LOGGING) console.group('%c CWrapper %c onFileChangedEvent', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		const msBufferToPreventOpen = 400;
		const msTimestampFileChanged = Date.now();
		const msSinceWriteFileContent = msTimestampFileChanged - CWrapper.msTimestampWriteFileContent;
		const isFileShouldReload = msSinceWriteFileContent > msBufferToPreventOpen;
		if (LOGGING) console.group('%c CModel %c onFileChangedEvent %c (Reload: ' + (isFileShouldReload ? 'YES: ' : 'NO: ') + msSinceWriteFileContent + ' ms)', LOG_GREY, LOG_BLUE, LOG_GREEN);
		
		if (isFileShouldReload) {
			const changedPath = e.payload;
			if (!CModel.appstate.pathFileOpen || changedPath !== CModel.appstate.pathFileOpen) return;
			
			// debounce and add a small delay (helps with atomic saves: replace-then-write)
			if (CWrapper.reloadTimer) clearTimeout(CWrapper.reloadTimer);
			CWrapper.reloadTimer = setTimeout(() => {
				if (LOGGING) console.group('%c CModel %c window.__TAURI__.event.listen: setTimeout: call App.dispatch(type: model.filepath.open)', LOG_GREY, LOG_BLUE, LOG_GREEN);

				//:		→ App: dispatch:					model.filepath.open
				App.dispatch({type: 'model.filepath.open', path: CModel.appstate.pathFileOpen, caller: 'window.__TAURI__.event.listen(file-changed)'});
				if (LOGGING) console.groupEnd();
			}, 100);
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 selectFileUsingSystemDialog()
	async selectFileUsingSystemDialog() {
		if (LOGGING) console.group('%c CWrapper %c selectFileUsingSystemDialog', LOG_GREY, LOG_BLUE, LOG_GREEN);
		
		//: 		→ window.__TAURI__.dialog:			open
		const path = await window.__TAURI__.dialog.open({
			multiple: false,
			directory: false,
			filters: [{ name: "Text", extensions: ["md", "txt", "json"] }],
		});

		const resFileDialog = {
			path: path,
			isCancelled: path === null
		};

		if (LOGGING) console.groupEnd();
		return resFileDialog;
	},

	//:::	🔹 loadFileText
	async loadFileText(args) {
		if (LOGGING) console.group('%c CWrapper %c loadFileText', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		if (STANDALONE) {
			if (LOGGING) console.groupEnd();
			return {text: TEXT_STANDALONE, err: null};
		}
		
		// retry a couple of times to survive "atomic save" moments where the file is briefly unavailable (common in editors)
		let lastErr = null;
		for (let attempt = 0; attempt < 3; attempt++) {
			try {
				//: 		→ window.__TAURI__.fs:			readTextFile
				const text = await window.__TAURI__.fs.readTextFile(args.path);
				
				if (LOGGING) console.groupEnd();
				return {text: text, err: null};
			}
			catch (err) {
				lastErr = err;
				await new Promise((r) => setTimeout(r, 60));
			}
		}

		// jk: warn user somehow - system dialog using Tauri?
		if (LOGGING) console.log('ERR: loadFileText:', lastErr);
		if (LOGGING) console.groupEnd();
		return {err: lastErr};
	},

	//:::	🔹 saveFileText
	async saveFileText(args) {
		if (LOGGING) console.group('%c CWrapper %c saveFileText', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);
		
		try {
			//: 		→ window.__TAURI__.fs:			writeTextFile
			await window.__TAURI__.fs.writeTextFile(args.path, args.text);

			CWrapper.msTimestampWriteFileContent = Date.now();
			if (LOGGING) console.groupEnd();
			return {err: null};
		}
		catch (err) {
			if (LOGGING) console.log("ERR: saveFileText:", err);
			if (LOGGING) console.groupEnd();
			return {err};
		}
	},

	//:::	🔹 set_menu_checks(args)
	set_menu_checks: async (args) => {
		if (LOGGING) console.group('%c CWrapper %c set_menu_checks', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		// args.arrUpdate example:
		//	[
		//		['view.theme.system',	args.idTheme === 'system'],
		//		['view.theme.light',	args.idTheme === 'light'],
		//		['view.theme.dark',		args.idTheme === 'dark'],

		await window.__TAURI__.core.invoke('set_menu_checks', {updates: args.arrUpdate});

	//:::	🔹 startWatchFile(args)
	startWatchFile: async (args) => {

		await window.__TAURI__.core.invoke("start_watch_file", {path: CModel.appstate.pathFileOpen});

		if (LOGGING) console.groupEnd();
