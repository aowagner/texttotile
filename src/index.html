<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>SVG App — Text + Preview (Light Theme)</title>
	<style>

	:root {
		color-scheme: light dark;

		--fill:			Canvas;
		--text:			CanvasText;

		--fill-header:	#888;
		--fill-grey:	#888;
		--fill-bg:		var(--fill);

		--bold:			400;
		--fontfamily:				system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", Ubuntu, sans-serif;
		--fontfamily-texteditor:	ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", "DejaVu Sans Mono", monospace;

		/* will be overwritten in code by updateCssFromLookupConstants */
		--px-base-unit:		0px;
		--px-line-height:	0px;
		--px-font-size:		0px;
		--px-header-height:	0px;
		--count-part-lines:	0;

		/* other */
		--ms-transition: 0.4s;
		--ms-transition-quick: 0.15s;

		--px-sidebar-size: 500px;
		--px-sidebar-min: 200px;
	}

	:root.theme-light {
		color-scheme: light;

		--saturation-header: 10;
		--saturation-tags: 25;
	}

	:root.theme-dark {
		color-scheme: dark;

		--saturation-header: 30;
		--saturation-tags: 60;
	}

	html, body {height: 100%; margin: 0; overflow: hidden; /*? background: var(--fill); */  font-family: var(--fontfamily); font-size: var(--px-font-size); font-weight: var(--bold); color: var(--text); }

	body.no-select, body.no-select * {user-select: none; -webkit-user-select: none; }
	body.no-select .texteditor {pointer-events: none; }


	.workspace__panel	{--saturation: var(--saturation-tags); }
	.header				{--saturation: var(--saturation-header);	--fill: CanvasText; }
	.tagblocks--parts	{--saturation: var(--saturation-tags); 		--fill: #fff; }
	.tagblocks--graphs	{--saturation: var(--saturation-tags); 		--fill: #fff; }



/* app */
	#app {display: grid; grid-template-rows: auto 1fr; height: 100vh; }

	/* Existing 3-column layout lives here */
	#layout {display: grid; height:100vh;  min-height: 0; /* important for overflow handling */ }

	/* Optional: allow workspace/sidebar to scroll correctly */
	.sidebar,
	.workspace {min-height: 0; }

	#app.sidebar-position-left 		#layout {grid-template-columns:	minmax(var(--px-sidebar-min), var(--px-sidebar-size)) 6px 1fr; grid-template-areas: "sidebar splitter workspace"; }
	#app.sidebar-position-right 	#layout {grid-template-columns:	1fr 6px minmax(var(--px-sidebar-min), var(--px-sidebar-size)); grid-template-areas: "workspace splitter sidebar"; }
	#app.sidebar-position-top 		#layout {grid-template-rows:	minmax(var(--px-sidebar-min), var(--px-sidebar-size)) 6px 1fr; grid-template-areas: "sidebar" "splitter" "workspace"; }
	#app.sidebar-position-bottom 	#layout {grid-template-rows:	1fr 6px minmax(var(--px-sidebar-min), var(--px-sidebar-size)); grid-template-areas: "workspace" "splitter" "sidebar"; }

	#app.sidebar-visible-no 		#layout {grid-template-columns: 1fr !important; grid-template-rows: 1fr !important; grid-template-areas: "workspace" !important; }	/* Force single-pane layout regardless of current side */
	
/* layout - sidebar */
							.sidebar	{grid-area: sidebar; position: relative; overflow: hidden; display: flex; flex-direction: column; }
	#app.sidebar-visible-no .sidebar	{display: none; }

		/* sidebar - sidebar__main */
		.sidebar__main {flex: 1 1 auto; overflow: auto; display: flex; flex-direction: column; background-color: var(--text); }

			/* sidebar__main - textarea */
			.texteditor {flex: 1 1 50%; display:inline-flex; box-sizing: border-box; width: 100%; height: 100%; resize: none; padding: 8px; font-family: var(--fontfamily-texteditor); font-size: var(--px-font-size); font-weight: var(--bold); line-height: var(--px-line-height);  outline: none; /* white-space: pre;*/ tab-size: 3; border: none;  caret-color: #1976d2; overflow: auto; background: var(--fill); opacity: 0.97; color: var(--text); }

/* layout - splitter */
								.splitter {grid-area: splitter; position: relative; background: var(--fill-bg); cursor: col-resize; z-index: 10; }
	#app.sidebar-visible-no		.splitter {display: none; }
	#app.sidebar-position-top 		.splitter,
	#app.sidebar-position-bottom	.splitter {cursor: row-resize; }

/* layout - workspace */

	#workspace {grid-area: workspace; position: relative; overflow: hidden; display: flex; flex-direction: column; }

/* prevent selection in the workspace */
#workspace * {user-select: none; -webkit-user-select: none; }


/* toolbar */
						.toolbar 		{position: absolute; overflow: auto hidden; background: var(--fill); border: 1px solid var(--fill-grey); border-radius: 5px; }
						.toolbarTags 	{--bold-button: var(--bold); /* --bold-button is a 'hack' to use toolbarTags's (aka :root) --bold, so buttons don't use individual tag's --bold */ height: calc(var(--px-line-height) + 18px); margin-left: 10px; max-width: calc(100% - 34px); padding: 7px; margin-top: calc((var(--px-line-height) + 48px) * -1); }
	.toolbar-visible-no	.toolbarTags	{display: none; }

		.toolbar__button 	{position: absolute; transform: translateX(var(--pxX)); border: 1px solid var(--fill-grey); border-radius: 5px; font-family: var(--fontfamily); font-size: var(--px-font-size); line-height: var(--px-line-height); color: var(--text); white-space: nowrap; cursor: pointer; transition: opacity 120ms ease; }
		.button--inactive	{opacity: 0.33; }
		.button-draggable 	{cursor: grab; touch-action: none; }

		.toolbarTags	.button-draggable.is-dragging 	{background: CanvasText !important; color: Canvas; }

		.toolbarTags 	.toolbar__button 			{background: rgba(var(--fillrgb), calc(var(--saturation) / 100)); font-weight: var(--bold-button); }
		.toolbarTags 	.toolbar__button.is-hover 	{background: rgba(var(--fillrgb), calc(var(--saturation) / 80)); z-index: 2; border: 1px solid CanvasText; }

		.toolbarTags	.button-settings:hover		{border: 1px solid CanvasText; }

/* workspace-main */

	.workspace__main {		/* class used here, not id, since font-width logic with hidden dom-elements use this class too */
		flex: 1 1 auto;
		overflow: auto;
		background: var(--fill);
			/*? line-height: var(--px-line-height);
			font-size: var(--px-font-size);
			font-family: var(--fontfamily);
			font-weight: var(--bold);
			fill: var(--text); */
	}

	/* workspace-panel */
	#workspace-panel	{position: relative; flex: 0 0 auto; height: 0px; /* NB: height 0px is part of making the toolbar float, while maintaining the structure (could be setting at some point) */ }


/*** svg#stage (svg from here) ***/

	svg#stage {display: block;  user-select: none; }

	/* header */
	.header							{--fill: var(--fill-header); }

	.header__rect--section			{height: 100%; fill: var(--fill); }
	.header__rect--section-odd		{opacity: calc(var(--saturation) / 100); }
	.header__rect--section-even		{opacity: calc(var(--saturation) / 150); }	/* nb: will only produce opacity between 0 and 0.8. This is to 'interchange' the background between odd and even sections */
	.header__text--section			{fill: var(--text); font-size: calc(var(--px-font-size) * 1.25); font-weight: var(--bold); pointer-events: none; dominant-baseline: middle; }

	.header__rect--chapter			{height: calc(100% - ((var(--px-line-height) * 2))); fill: var(--fill); opacity: calc(var(--saturation) / 100); stroke: Canvas; stroke-width: 1; }
	.header__text--chapter			{fill: var(--text); font-size: calc(var(--px-font-size) * 1.00); font-weight: var(--bold); pointer-events: none; dominant-baseline: middle; }

						.graphs-bg-rect {transform: translateY(var(--px-header-height)); fill: CanvasText; opacity: 0.1; pointer-events: none; }
		.chart-viewb	.graphs-bg-rect {display: none; }

	/* tagblock */
	.tagblocks			{}



					.tagblock			{transition: transform var(--ms-transition) ease-out, opacity var(--ms-transition-quick) ease-out; }
	.chart-viewb	.tagblock			{transform: translate(0px, var(--yb)) }
	.chart-viewa	.tagblock			{transform: translate(0px, var(--ya)) }
					.tagblock--inactive	{opacity: 0.2; }


	/* tagblock - bg rect */
											.tagblock__bg-rect {fill: rgba(var(--fillrgb), 0.04); stroke: var(--fill-bg); stroke-width: calc(var(--px-base-unit) * 0.15); vector-effect: non-scaling-stroke; pointer-events: none; transition: opacity var(--ms-transition) ease-out, height var(--ms-transition) ease-out }
	.chart-viewa       						.tagblock__bg-rect {height: 0px; opacity: 0; pointer-events: none; /* needed since pointer-events are still active in the not-scaled area. this is an error in the browser-engine */ }
	.chart-viewb							.tagblock__bg-rect {}
	.chart-viewb  		.tagblock--active   .tagblock__bg-rect {height: calc((var(--px-line-height) * var(--count-rows)) + 10px); }
	.chart-viewb  		.tagblock--inactive	.tagblock__bg-rect {height: calc((var(--px-line-height) * 1) + 10px); }

	.chart-viewb  		.tagblock-odd		.tagblock__bg-rect { }
	.chart-viewb  		.tagblock-even		.tagblock__bg-rect { }

												.tagblock-separator {stroke: Canvas; pointer-events: none; transition: opacity var(--ms-transition-quick) ease-out; }
	.chart-viewa       							.tagblock-separator {opacity: 0; }
	.chart-viewb       							.tagblock-separator {opacity: 0.75; }
	.chart-viewb  		.tagblock--inactive		.tagblock-separator {opacity: 1; }


	/* part */	
										.tb-part 	{transition: transform var(--ms-transition) ease-out; } 
	.chart-viewa						.tb-part 	{transform: translate(var(--x), var(--ya)) }
	.chart-viewb						.tb-part 	{transform: translate(var(--x), var(--yb)) }
	.chart-viewb	.tagblock--inactive	.tb-part 	{transform: translate(var(--x), 5px); }


					.tb-part__rect-bg	{fill: Canvas !important; opacity: 1.0 !important; }

					.tb-part__rect	{/*--fill: rgba(var(--fillrgb), calc(var(--saturation) / 100));-*/  fill: var(--fill); opacity: calc(var(--saturation) / 100);  stroke-width: 1; stroke: var(--fill-grey); }
					.tb-part__rect	{transition: transform var(--ms-transition) ease-out; vector-effect: non-scaling-stroke; }
	.chart-viewa 	.tb-part__rect	{height: var(--px-line-height); transform: scaleY(var(--count-part-lines)); }
	.chart-viewb 	.tb-part__rect	{height: calc(var(--px-line-height) - 2px); transform: scaleY(1); }

					.tb-part__text-viewb,
					.tb-part__text-viewa tspan	{dominant-baseline: middle; fill: var(--text); font-weight: var(--bold); font-size: var(--px-font-size); transform: scaleY(1); opacity: 1; transition: fill calc(var(--ms-transition) * 1) ease-out; }

	.chart-viewa	.tb-part__text-viewb,
	.chart-viewb	.tb-part__text-viewa tspan	{fill: transparent; pointer-events: none; }


	.chart-viewa	.tb-part--special	.line1 {font-size: 75%; /* fill: #777; */ opacity: 0.5; }
	.chart-viewa	.tb-part--special	.line2 {font-size: 175%; font-weight: 600; fill: var(--text); }

					.tb-part__symbol	{transition: transform var(--ms-transition) ease-out; }
	.chart-viewa	.tb-part__symbol	{transform: translate(var(--x), var(--y)); }
	.chart-viewb	.tb-part__symbol	{transform: translate(10px, calc(var(--px-line-height) * 0.5)); }

	.chart-viewa	.tb-part__symbol	text	{font-size: calc(var(--px-line-height) * 1.5);	dominant-baseline: auto;    text-anchor: end; }
	.chart-viewb	.tb-part__symbol	text	{font-size: calc(var(--px-line-height) * 1.0); 	dominant-baseline: central; text-anchor: end; }



	/* hover tagblock--active */
	.chart-viewa	.tagblock--active.is-hover .tb-part {}

					.tagblock--active.is-hover .tagblock-circle,
					.tagblock--active.is-hover .tagblock-polyline {stroke-width: 1.5 !important; }

	/* hover tb-part */
					.tagblock--active 	.tb-part.is-hover 	.tb-part__rect {stroke: CanvasText; opacity: calc(var(--saturation) / 150); }

	/* hover circle */
					.tagblock--active 	.tagblock-circle.is-hover 			{fill: rgba(var(--fillrgb), calc(var(--saturation) / 150)); r: calc(var(--px-base-unit) / 1.7); }

	/* graphs */
	.tagblocks--graphs	{}

					/*? .tagblocks--graphs	.tagblocks-graphs 		{opacity: 1;	transition: opacity var(--ms-transition-quick) ease-out; } */
	.chart-viewa	.tagblocks--graphs	.tagblock--inactive		{opacity: 0.1;	pointer-events: none; }
	.chart-viewb	.tagblocks--graphs	.tagblock--inactive		{opacity: 0;	pointer-events: none; }

	.tagblock-polyline		{fill: none; stroke: var(--stroke); stroke-width: 1.0; pointer-events: none; }
	.tagblock-circle 		{r: calc(var(--px-base-unit) / 2); fill: rgba(var(--fillrgb), calc(var(--saturation) / 100));  stroke: var(--stroke);  stroke-width: 1.0; }
	.tagblock-circle-bg 	{r: calc((var(--px-base-unit) / 2)); fill: white !important;  stroke: white !important; stroke-width: 1; }
	
						.tagblock-circle-text 			{opacity: 0; transform: translate(16px, 1px); pointer-events: none;  dominant-baseline: middle; }
	.tagblock--active	.tagblock-circle-text.is-hover 	{opacity: 1; }

	/* .tagblock--inactive		.graph	{opacity: 0.5; pointer-events: none; } */

	.tagblock-circle		{transition: r var(--ms-transition) ease-out, opacity var(--ms-transition-quick) ease-out; }
	.tagblock-circle-text	{transition: opacity var(--ms-transition-quick) ease-out; }

	</style>


	<style>
/* Popup */

:root.theme-light {
	--col-back: 255, 255, 255;
	--col-front: 0, 0, 0;
	--col-hilite: #5588ff29;
}

:root.theme-dark {
	--col-back: 96, 96, 96;
	--col-front: 255, 255, 255;
	--col-hilite: #5588ff38;
}

:root {
	--popup-bg:         var(--fill-bg);
	--popup-fg:         var(--text);

	--col-border:       rgba(var(--col-front), 0.15);

	--popup-panel-bg:   rgba(var(--col-back), 0.5);
	--col-button:       rgba(var(--col-back), 0.15);
	--col-hover:        rgba(var(--col-back), 1);
}


/* layered tint */

.popup::after,
.tablist__btn-selected::after {
	content: '';
	position: absolute;
	inset: 0;
	background: rgba(var(--col-front), 0.1);
	pointer-events: none;
	border-radius: inherit;
}

/*-.tablist__btn:hover::after {
	background: transparent;
}-*/


/* Shared button typography */

button.btn,
button.pill,
button.tablist__btn,
button.close__btn,
button.unpin__btn {
	font-family: var(--fontfamily);
	font-size: var(--px-font-size);
	font-weight: var(--bold);
}


/* Popup overlay and shell */

.popup-overlay {
	position: fixed;
	inset: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 18px;
	background: rgba(0,0,0,.28);
	z-index: 10;
	overscroll-behavior: contain;
	touch-action: none;
}

.popup {
	position: relative;
	display: flex;
	flex-direction: column;
	width: min(780px, 100%);
	height: 63vh;
	max-height: min(78vh, 760px);
	min-height: 0;
	background: var(--popup-bg);
	border: 1px solid var(--col-border);
	border-radius: 12px;
	box-shadow: 0 12px 40px rgba(0,0,0,.18);
	overflow: hidden;
	touch-action: auto;
}


/* Popup header / tab row */

.popup__panel {
	display: flex;
	flex: 0 0 auto;
	z-index: 1;
	align-items: center;
	justify-content: space-between;
	gap: 10px;
	padding: 12px 16px 0 16px;
	background: var(--popup-panel-bg);
	border-bottom: none;
	min-height: 0;
}

.panel__tablist {
	display: flex;
	align-items: flex-end;
	overflow: hidden;
	background: transparent;
}

.tablist__btn {
	position: relative;
	display: flex;
	flex: 0 0 auto;
	align-items: center;
	gap: 8px;
	padding: 8px 60px;
	margin: 0px;
	background: transparent;
	border: 0;
	border-radius: 10px 10px 0 0;
	color: var(--popup-fg);
	cursor: pointer;
	user-select: none;
	-webkit-user-select: none;
}

.tablist__btn:hover {
	background: var(--col-hover);
}

.tablist__btn-selected {
	background: var(--popup-bg);
}

.close__btn {
	flex: 0 0 auto;
	padding: 6px 10px;
	background: transparent;
	border: none;
	border-radius: 10px;
	color: var(--popup-fg);
	cursor: pointer;
	opacity: 0.5;
}

.close__btn:hover {
	background: var(--col-hover);
	opacity: 1;
}


/* Popup content area - default for file/view tabs */

.popup__main {
	z-index: 2;
	flex: 1 1 auto;
	min-height: 0;
	padding: 18px;
	overflow: auto;
	overscroll-behavior: contain;
	-webkit-overflow-scrolling: touch;
	touch-action: pan-y;
}

.main__content {
	display: grid;
	gap: 30px;
	align-content: start;
	min-height: 0;
}


/* Generic content sections. Default: natural height */

.content__section {
	background: transparent;
	border: none;
	overflow: visible;
}

.section__head {
	display: flex;
	flex: 0 0 auto;
	align-items: center;
	gap: 8px;
	min-height: 2rem;
	margin-bottom: 4px;
	font-weight: 600;
}

.section__body {
	display: grid;
	gap: 6px;
	padding: 0;
}

.hint {
	padding-left: 6px;
	font-size: 0.8em;
	font-weight: 400;
	opacity: 0.5;
}


/* Editor-style tabs: Style + Status */

.popup.tab-style .popup__main,
.popup.tab-status .popup__main {
	display: flex;
	flex-direction: column;
	overflow: hidden;
}

.popup.tab-style .main__content,
.popup.tab-status .main__content {
	display: flex;
	flex-direction: column;
	flex: 1 1 auto;
	min-height: 0;
	gap: 30px;
}

.popup.tab-style .content__section,
.popup.tab-status .content__section {
	display: flex;
	flex-direction: column;
	flex: 1 1 auto;
	min-height: 0;
	overflow: hidden;
}

.popup.tab-style .section__body,
.popup.tab-status .section__body {
	display: flex;
	flex-direction: column;
	flex: 1 1 auto;
	min-height: 0;
}


/* Keyboard shortcut labels */

.kbd {
	padding: 1px 5px;
	border: 1px solid var(--col-border);
	border-bottom-width: 2px;
	border-radius: 8px;
	white-space: nowrap;
	opacity: 0.5;
	font-size: 0.8em;
}

.kbd.is-label {
	display: inline-block;
	justify-self: start;
	width: fit-content;
	pointer-events: none;
}


/* Action buttons and segmented/pill controls */

.content__actions {
	display: flex;
	flex-wrap: wrap;
	gap: 5px;
}

.btn {
	display: inline-flex;
	align-items: center;
	gap: 10px;
	padding: 8px 10px;
	background: var(--col-button);
	border: 1px solid var(--col-border);
	border-radius: 10px;
	color: var(--popup-fg);
	cursor: pointer;
	user-select: none;
	-webkit-user-select: none;
}

.btn:hover {
	background: var(--col-hover);
}

.btn-small {
	padding: 4px 8px;
	font-size: 12px;
}

.pillbar {
	display: flex;
	flex-wrap: wrap;
	gap: 8px;
}

.pill {
	position: relative;
	display: inline-flex;
	align-items: center;
	gap: 8px;
	padding: 6px 10px;
	background: var(--col-button);
	border: 1px solid var(--col-border);
	border-radius: 999px;
	color: var(--popup-fg);
	cursor: pointer;
	user-select: none;
	-webkit-user-select: none;
}

.pill:not(.pill-selected):hover {
	background: var(--col-hover);
}

.pill-selected {
	background: var(--col-hilite);
	/*- border-color: var(--col-border); -*/
}



/* List rows */

.body__item-plain {}

.body__item {
	position: relative;
	display: grid;
	grid-template-columns: auto 1fr auto;
	align-items: center;
	column-gap: 12px;
	padding: 10px 10px;
	background: transparent;
	border: none;
	border-top: 1px solid var(--col-border);
	border-radius: 8px;
	cursor: pointer;
	user-select: none;
	-webkit-user-select: none;
	touch-action: none;
}

.body__item:hover {
	background: var(--col-hover);
}

.draggable-list.is-reordering .body__item:hover {
	background: transparent;
}

.body__item.is-active {
	/*-padding: 10px 10px;-*/
	background: var(--col-hilite);
	/*-box-shadow: inset 3px 0 0 0 Highlight;-*/
}

.body__item.is-dragging {
	opacity: 0;
}

.item__meta {
	display: grid;
	gap: 2px;
	min-width: 0;
}

.item__name {
	font-weight: 600;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}

.item__desc {
	font-size: 12px;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	opacity: 0.72;
}

.item__right {
	display: inline-flex;
	align-items: center;
	justify-self: end;
	gap: 10px;
}

/*-.header__title {
	font-weight: 600;
}-*/


/* Toggle switch */

.switch {
	position: relative;
	width: 44px;
	height: 26px;
	background: var(--col-border);
	border: 1px solid var(--col-border);
	border-radius: 999px;
	cursor: pointer;
}

.switch::after {
	content: '';
	position: absolute;
	top: 3px;
	left: 3px;
	width: 20px;
	height: 20px;
	background: var(--popup-bg);
	border: 1px solid var(--col-border);
	border-radius: 999px;
	transition: transform 120ms ease;
}

.toggle-on .switch {
	background: var(--col-hilite);
}

.toggle-on .switch::after {
	transform: translateX(18px);
}


/* Secondary row actions */

.unpin__btn {
	padding: 4px 6px;
	background: transparent;
	border: none;
	border-radius: 10px;
	color: var(--popup-fg);
	cursor: pointer;
	opacity: 0.7;
}

.unpin__btn:hover {
	background: var(--col-border);
}


/* Drag ghost */

.ghost {
	position: fixed;
	left: 0;
	top: 0;
	box-sizing: border-box;
	padding: 10px 10px;
	background: var(--popup-bg) !important;

//:::📙 const CUtil
const CUtil = {

	//:::	🔹 roundN
	roundN(x, n = 2) {
		const f = 10 ** n;
		return Math.round((x + Number.EPSILON) * f) / f;
	},

	//:::	🔹 clamp
	clamp(v, lo, hi) {
		return Math.min(Math.max(v, lo), hi);
	},

	//:::	🔹 getPrevNextValue
	getPrevNextValue(arr, valCurrent, iOffset, fallback = valCurrent, isRoundRobin = false) {
		if (!Array.isArray(arr) || arr.length === 0) return fallback;

		const idx = arr.indexOf(valCurrent);

		if (idx === -1)
			return isRoundRobin ? (iOffset < 0 ? arr[arr.length - 1] : arr[0]) : fallback;

		const idxNew = isRoundRobin ? (idx + iOffset + arr.length) % arr.length : CUtil.clamp(idx + iOffset, 0, arr.length - 1);

		return arr[idxNew];
	},

	//:::	🔹 getArgsKeys
	getArgsKeys(args) {
		const {type, caller, ...arrArgs } = args;				// filter out 'caller' from args
		return `(${Object.keys(arrArgs).join(', ')})`;	// build string with keys of all args (except 'caller' that was just removed)
	},	

	//:::	🔹 logGroup
	logGroup(module, fn, args = '', extra = '') {
		const styleLogFn = fn.startsWith("'") ? LOG_FUNCTION + LOG_RED : LOG_FUNCTION;
		return [`%c ${module} %c ${fn} %c ${args} %c ${extra}`, LOG_MODULE, styleLogFn, LOG_ARGS, LOG_EXTRA];
	},

	//:::	🔹 formatTimestamp
	formatTimestamp(iso) {
		const d = new Date(iso);
		const pad = n => String(n).padStart(2,'0');

		return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
			+ `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
	},

	//:::	🔹 formatShortcutForOS
	formatShortcutForOS(str) {
		const platform = navigator.platform.toUpperCase();
		const isMac = platform.includes('MAC');			// jk: maybe set single state/const in init? (CModel.init): appstate.platform = ['mac', 'windows', 'linux']
		const isWindows = platform.includes('WIN');
		const isLinux = !isMac && !isWindows;

		// Mac → return as-is
		if (isMac) {
			return str;
		}

		// Mapping from Mac symbols to Win/Linux
		const map = {
			'⌘': 'Ctrl',
			'⇧': 'Shift',
			'⌥': 'Alt',
			'⌃': 'Ctrl',
		};

		// Split into tokens (handles normal spaces and thin spaces)
		const tokens = str.trim().split(/\s+/);

		const modifiers = [];
		let key = '';

		for (const t of tokens) {
			if (map[t]) {
				modifiers.push(map[t]);
			}
			else {
				key = t;
			}
		}

		// Platform-specific modifier order
		const order = isWindows
			? ['Ctrl', 'Shift', 'Alt']
			: ['Shift', 'Ctrl', 'Alt']; // Linux

		const sortedModifiers = order.filter(m => modifiers.includes(m));

		return [...sortedModifiers, key].join('+');
	},

	//:::	🔹 normalizeError
	normalizeError(err) {
		if (err instanceof Error) {
			return {
				errtext: err.message || 'Unknown error',
				stack: err.stack || null,
			};
		}

		if (typeof err === 'string') {
			return {
				errtext: err,
				stack: null,
			};
		}

		if (err && typeof err === 'object') {
			return {
				errtext:
					typeof err.message === 'string'
						? err.message
						: JSON.stringify(err),
				stack:
					typeof err.stack === 'string'
						? err.stack
						: null,
			};
		}

		return {
			errtext: 'Unknown error',
			stack: null,
		};
	},

	//:::	🔹 getColorInfo
	getColorInfo(input) {
		if (typeof input !== 'string')
			return null;

		const value = input.trim();
		if (!value)
			return null;

		const el = document.createElement('div');
		el.style.color = '';
		el.style.color = value;

		// Browser rejected it
		if (!el.style.color)
			return null;

		document.body.appendChild(el);
		const resolved = getComputedStyle(el).color;
		el.remove();

		const mm = resolved.match(/^rgba?\(\s*(\d+),\s*(\d+),\s*(\d+)/i);
		if (!mm)
			return null;

		const r = Number(mm[1]);
		const g = Number(mm[2]);
		const b = Number(mm[3]);

		const toHex = n => n.toString(16).padStart(2, '0');

		return {
			raw: value,
			hex: `#${toHex(r)}${toHex(g)}${toHex(b)}`,
			r,
			g,
			b,
			rgb: `${r}, ${g}, ${b}`,
		};
	},

}

				return resSaveAs;
			}
		}

		await window.__TAURI__.core.invoke('quit_app');
		return res;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onFileChangedEvent
	onFileChangedEvent(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'onFileChangedEvent', '(payload: ' + args.payload + ')', args.caller));
		if (LOGARGS) console.log(args);

		const msBufferToPreventOpen = 600;
		const msTimestampFileChanged = Date.now();
		const msSinceWriteFileContent = msTimestampFileChanged - CWrapper.msTimestampWriteFileContent;
		const changedPath = args.payload;
		const isFileShouldReload = (changedPath === CModel.appstate.pathFileLoaded) && (msSinceWriteFileContent > msBufferToPreventOpen);
		if (LOGARGS) console.log('Reload file: ' + (isFileShouldReload ? 'YES: ' : 'NO: ') + msSinceWriteFileContent + ' ms)');	// jk: test and fix
		
		if (isFileShouldReload) {
			
			// debounce and add a small delay (helps with atomic saves: replace-then-write)
			if (CWrapper.reloadTimer) clearTimeout(CWrapper.reloadTimer);

			CWrapper.reloadTimer = setTimeout(async () => {
				if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'reloadTimer -> setTimeout finished', '(call: await App.dispatch: model.docdata.load.execute)', ''));
				let res = {status: STATUS.OK, info: 'not set'};

				try {
					//:		→ App: dispatch:					model.docdata.load
					res = await App.dispatch({type: 'model.docdata.load.execute', source: SOURCE.FILEPATH, pathFileToLoad: CModel.appstate.pathFileLoaded, caller: 'window.__TAURI__.event.listen(file-changed)'});
				}
				catch (err) {
					res = {status: STATUS.ERROR, code: CODE.ERROR_FILE_READ, err: String(err)};
				}

				await CFramework.handleResult(res);
				if (LOGGING) console.groupEnd();
			}, 100);
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 loadFileText
	async loadFileText(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'loadFileText', '(pathFileToLoad: ' + args.pathFileToLoad + ')', args.caller));
		if (LOGARGS) console.log(args);
		
		// retry a couple of times to survive 'atomic save' moments where the file is briefly unavailable (common in editors)
		let lastErr = null;
		for (let attempt = 0; attempt < 3; attempt++) {
			try {
				//: 		→ window.__TAURI__.fs:			readTextFile
				const text = await window.__TAURI__.fs.readTextFile(args.pathFileToLoad);
				
				if (LOGGING) console.groupEnd();
				return {status: STATUS.OK, err: null, text};
			}
			catch (err) {
				lastErr = err;
				await new Promise((r) => setTimeout(r, 60));
			}
		}

		if (LOGGING) console.groupEnd();
		return {status: STATUS.ERROR, code: CODE.ERROR_FILE_SCOPE, err: lastErr};
	},

	//:::	🔹 getCurrentLineRange
	getCurrentLineRange() {
		const ta = this.getTa();
		if (!ta) return null;

		const value = ta.value;
		const selStart = ta.selectionStart ?? 0;
		const selEnd = ta.selectionEnd ?? 0;

		const blockStart = value.lastIndexOf('\n', Math.max(0, selStart - 1)) + 1;

		let searchEnd = selEnd;
		if (selEnd > selStart && value[selEnd - 1] === '\n') {
			searchEnd = selEnd - 1;
		}

		let blockEnd = value.indexOf('\n', searchEnd);
		if (blockEnd === -1) {
			blockEnd = value.length;
		} else {
			blockEnd += 1; // include trailing newline
		}

		return {
			ta,
			start: blockStart,
			end: blockEnd,
			text: value.slice(blockStart, blockEnd),
		};
	},

	//:::	🔹 getTa
	getTa() {
		const el = document.activeElement;
		return el instanceof HTMLTextAreaElement ? el : null;
	},

	//:::	🔹 getSel
	getSel() {
		const expandLine = true;
		const ta = this.getTa();
		if (!ta) return null;

		let start = ta.selectionStart ?? 0;
		let end = ta.selectionEnd ?? 0;

		const hasExplicitSelection = end > start;

		if (!hasExplicitSelection && expandLine) {
			const value = ta.value;

			const lineStart = value.lastIndexOf('\n', start - 1) + 1;

			let lineEnd = value.indexOf('\n', start);

			if (lineEnd === -1) {
				lineEnd = value.length;
			} else {
				lineEnd += 1; // include trailing newline
			}

			start = lineStart;
			end = lineEnd;
		}

		return {
			ta,
			start,
			end,
			hasSelection: end > start,
			selectedText: ta.value.slice(start, end),
		};
	},

//:::📙 const CFramework
const CFramework = {
	elApp: null,
	elSplitter: null,
	isHandlingGlobalError: false,
	dragging: false,
	startCoord: 0,
	startSize: 0,
	mql: null,

	//:::	🔹 init
	init(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'init', CUtil.getArgsKeys(args), args.caller));

		this.elApp = document.querySelector('#app');
		this.elSplitter = document.querySelector('#splitter');

		window.addEventListener('keydown', e => {this.onKeydown({e, caller: 'window.addEventListener(keydown)'})}, {capture: true});
		window.addEventListener('resize', e => this.onWindowResize({e, caller: 'window.addEventListener(resize)'}));

		window.addEventListener('error', async (e) => {
			if (CFramework.isHandlingGlobalError)
				return;

			CFramework.isHandlingGlobalError = true;

			try {
				const {errtext, stack} = CUtil.normalizeError(e.error ?? e.message);

				await CFramework.handleResult({
					status: STATUS.ERROR,
					code: CODE.ERROR_RUNTIME,
					errtext: errtext,
					stack: stack,
					source: {
						file: e.filename || null,
						line: e.lineno || null,
						column: e.colno || null,
					},
					caller: `window.error (${e.lineno}:${e.colno})`
				});
			}
			finally {
				CFramework.isHandlingGlobalError = false;
			}
		});

		window.addEventListener('unhandledrejection', async (e) => {
			if (CFramework.isHandlingGlobalError)
				return;

			CFramework.isHandlingGlobalError = true;

			try {
				const {errtext, stack} = CUtil.normalizeError(e.reason);

				await CFramework.handleResult({
					status: STATUS.ERROR,
					code: CODE.ERROR_UNHANDLED_PROMISE,
					errtext: errtext,
					stack: stack,
					source: {
						file: e.filename || null,
						line: e.lineno || null,
						column: e.colno || null,
					},
					caller: 'window.unhandledrejection'
				});
			}
			finally {
				CFramework.isHandlingGlobalError = false;
			}
		});

		// splitter drag
		this.elSplitter.addEventListener('mousedown', e => this.onSplitterMousedown({e, caller: 'elSplitter.addEventListener(mousedown)'}));
		window.addEventListener('mousemove', e => this.onSplitterMousemove({e, caller: 'elSplitter.addEventListener(mousemove)'}));
		window.addEventListener('mouseup', () => this.onSplitterMouseup({caller: 'elSplitter.addEventListener(mouseup)'}));

		this.mql = window.matchMedia('(prefers-color-scheme: dark)');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMousedown
	onSplitterMousedown(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onSplitterMousedown', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		this.dragging = true;
		const isVert = this.elApp.classList.contains('sidebar-position-top') || this.elApp.classList.contains('sidebar-position-bottom');
		const point = args.e.touches ? args.e.touches[0] : args.e;

		this.startCoord = isVert ? point.clientY : point.clientX;

		this.startSize = parseFloat(
			getComputedStyle(document.documentElement).getPropertyValue('--px-sidebar-size')
		) || 340;

		document.body.classList.add('no-select');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMousemove
	onSplitterMousemove(args) {
		if (!this.dragging) return;
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onSplitterMousemove', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		const isVert = this.elApp.classList.contains('sidebar-position-top') || this.elApp.classList.contains('sidebar-position-bottom');
		const point = args.e.touches ? args.e.touches[0] : args.e;
		const pos = isVert ? point.clientY : point.clientX;
		let delta = pos - this.startCoord;

		if (this.elApp.classList.contains('sidebar-position-right') || this.elApp.classList.contains('sidebar-position-bottom')) {
			delta = -delta;
		}

		const newSize = CUtil.clamp(this.startSize + delta, 160, window.innerWidth * 0.8);

		document.documentElement.style.setProperty('--px-sidebar-size', newSize + 'px');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMouseup
	onSplitterMouseup(args) {
		if (!this.dragging) return;
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onSplitterMouseup', CUtil.getArgsKeys(args), args.caller));
		
		this.dragging = false;
		document.body.classList.remove('no-select');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 handleResult
	async handleResult(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'handleResult', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		if ( (args.status === STATUS.OK) || (args.status === STATUS.CANCEL) ) {
			if (LOGGING) console.groupEnd();
			return;
		}

		let logentry = {
			version: CWrapper.version_app,
			status: args.status,
			code: args.code,
			stack: args.stack ?? null,
			source: args.source ?? null,
			timestamp: new Date().toISOString(),
			caller: args.caller,
		}


		if (args.code === CODE.ERROR_FILE_SCOPE) {
			Object.assign(logentry, {
				title: 'File access lost',
				message: 'The app could not read the file.',
				suggestion: 'Try opening the file again to restore access.',
			});
		}
		else if (args.code === CODE.ERROR_FILE_READ) {
			Object.assign(logentry, {
				title: 'File read error',
				message: 'The app could not read the file.',
				suggestion: 'Try opening the file again.',
			});
		}
		else if (args.code === CODE.ERROR_FILE_WRITE) {
			Object.assign(logentry, {
				title: 'File write error',
				message: 'The app could not write the file.',
				suggestion: 'Try saving the file again - maybe in another folder.',
			});
		}
		else if (args.code === CODE.ERROR_RUNTIME || args.code === CODE.ERROR_UNHANDLED_PROMISE) {
			Object.assign(logentry, {
				title: 'Unexpected error',
				message: args.errtext,
				suggestion: 'You can continue, but something may not work as expected.',
			});
		}
		else {
			if (LOGGING) console.groupEnd();
			return;
		}

		if (LOGGING) console.log('logentry', logentry);

		CModel.updateLogstate({logentry, caller: 'CFramework.handleResult'});


		//:		→ CWrapper:				showPromptDialog
		const resPrompt = await CWrapper.showPromptDialog({
			type: 'ask',
			title: logentry.title,
			message: logentry.message + '\n\n' + logentry.suggestion,
			kind: logentry.status === STATUS.ERROR ? 'error' : logentry.status === STATUS.WARNING ? 'warning' : 'info',
			okLabel: 'Close',
			cancelLabel: 'See Log',
		});

		if (resPrompt.status === STATUS.CANCEL) {
			
			const res = await App.dispatch({type: 'popup.settings.open', idTab: 'status', caller: 'CFramework.handleResult'});
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setTheme
	setTheme(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'setTheme', `(mode: ${args.mode})`, args.caller));
		if (LOGARGS) console.log(args);

		//:		→ this: applyThemeClass
		this.applyThemeClass({mode: args.mode, caller: 'CFramework.setTheme'});
		
		// listen for OS changes only in system mode
		if (args.mode === 'system') {
			this.mql.onchange = () => this.applyThemeClass({mode: 'system', caller: 'CFramework.setTheme'});
		}
		
		else {
			this.mql.onchange = null;
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	applyThemeClass
	applyThemeClass(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'applyThemeClass', `(mode: ${args.mode})`, args.caller));
		if (LOGARGS) console.log('args, mql', args, this.mql);		

		const root = document.documentElement;

		root.classList.remove('theme-light', 'theme-dark');
		
		if (args.mode === 'light')
			root.classList.add('theme-light');

		else if (args.mode === 'dark')
			root.classList.add('theme-dark');

		else if (args.mode === 'system') {
			root.classList.add(this.mql.matches === true ? 'theme-dark' : 'theme-light');
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setCustomCss
	setCustomCss(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'setCustomCss', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		const txtInput = args.txtCustomCss || '';

		// 1) Remove #def lines entirely
		const txtWithoutDefs = txtInput.replace(
			/^\s*#def\s*\{[^}]*\}\s*;?\s*$/gmi,
			''
		);

		// 2) Convert app-style tag rules:
		//    #gitte { @fill: #fa0; @bold 800; }
		// into:
		//    .gitte { --fill: #fa0; --bold: 800; }
		const txtConverted = txtWithoutDefs.replace(
			/^\s*#([a-zA-Z_][\w-]*)\s*\{([^}]*)\}\s*;?\s*$/gmi,
			(match, tagName, body) => {
				const arrFields = body
					.split(';')
					.map(s => s.trim())
					.filter(Boolean);

				const arrCssFields = [];

				for (const field of arrFields) {
					// Allow both:
					// @fill: #fa0
					// @fill #fa0
					const mm = field.match(/^@([a-zA-Z_][\w-]*)\s*(?::\s*|\s+)(.+)$/);
					if (!mm)
						continue;

					const key = mm[1];
					const value = mm[2].trim();

					if (!value)
						continue;

					arrCssFields.push(`--${key}: ${value};`);
				}

				// If no valid @fields were found, drop the whole rule
				if (arrCssFields.length === 0)
					return '';

				return `.${tagName} { ${arrCssFields.join(' ')} }`;
			}
		).trim();

		// 3) Set resulting CSS
		const elStyleSettings = document.querySelector(`#${args.idElStyle}`);
		elStyleSettings.textContent = txtConverted;

		if (LOGGING)
			console.groupEnd();
	},

	//:::	🔹 updateLookupConstants
	updateLookupConstants(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'updateLookupConstants', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		PX_BASEUNIT			= args.pxBaseUnit ?? PX_BASEUNIT;
		COUNT_PART_LINES	= args.linecount  ?? COUNT_PART_LINES;

		PX_FONT_SIZE		= CUtil.roundN(PX_BASEUNIT * 1.0, 2);
		PX_LINE_HEIGHT		= CUtil.roundN(PX_BASEUNIT * 1.4, 2);
		PX_HEADER_HEIGHT	= CUtil.roundN(PX_LINE_HEIGHT * 3.25, 2);								// jk: make constant or rule for '3.25'

		PX_COL_WIDTH = (PX_LINE_HEIGHT * COUNT_PART_LINES) + PX_PADDING_NORMAL;

		if (LOGARGS) console.log({PX_BASEUNIT, PX_COL_WIDTH, COUNT_PART_LINES,  PX_FONT_SIZE, PX_LINE_HEIGHT, PX_HEADER_HEIGHT});

		//: 		→ this: updateCssFromLookupConstants
		this.updateCssFromLookupConstants({caller: 'CFramework.updateLookupConstants'});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	updateCssFromLookupConstants
	updateCssFromLookupConstants(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'updateCssFromLookupConstants', CUtil.getArgsKeys(args), args.caller));

		const root = document.documentElement;

		root.style.setProperty('--px-base-unit',		PX_BASEUNIT.toString() + 'px');
		root.style.setProperty('--px-line-height', 		PX_LINE_HEIGHT.toString() + 'px');
		root.style.setProperty('--px-font-size',		PX_FONT_SIZE.toString() + 'px');
		root.style.setProperty('--px-header-height',	PX_HEADER_HEIGHT.toString() + 'px');
		root.style.setProperty('--count-part-lines',	COUNT_PART_LINES.toString());

		// setup fonts for text measuring
		const arrProbe = [
			{name: 'section', 	elText: document.querySelector('#font-sample-section')},
			{name: 'chapter', 	elText: document.querySelector('#font-sample-chapter')},
			{name: 'part', 		elText: document.querySelector('#font-sample-part')},
			{name: 'part_top', 	elText: document.querySelector('#font-sample-part-top')},
			{name: 'toolbar', 	elText: document.querySelector('#font-sample-toolbar')},
		];

		for (const probe of arrProbe) {
			const style = window.getComputedStyle(probe.elText);
			const font = `${style.fontStyle} ${style.fontVariant} ${style.fontWeight} ${style.fontSize} / ${style.lineHeight} ${style.fontFamily}`;
			FONTS_SIZE_REF[probe.name] = font;
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 measurePartTextWidth2
	measurePartTextWidth2 (args) {
		//if (LOGGING) console.log(...CUtil.logGroup('CFramework', 'measurePartTextWidth2', CUtil.getArgsKeys(args), args.caller));
		
		CTX_FOR_TEXT_MEASURE.font = args.fontForMeasuring;
		return CTX_FOR_TEXT_MEASURE.measureText(args.text).width;
	},

	//:::	🔹 onKeydown
	onKeydown: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onKeydown', `(e.key: ${args.e.key})`, args.caller));
		if (LOGARGS) console.log(args);

		const caller = 'CFramework.onKeydown';
		const e = args.e;
		const ua = navigator.userAgent.toUpperCase();
		const isMac = ua.includes('MAC');
		const isWindows = ua.includes('WINDOWS');
		const isLinux = ua.includes('LINUX');

		const isMetaKey = isMac ? e.metaKey : e.ctrlKey;
		const isAltKey = e.altKey;
		const isShiftKey = e.shiftKey;
		const isCtrlKey = e.ctrlKey;

		const arrNumberKey = ['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5', 'Digit6', 'Digit7', 'Digit8', 'Digit9'];

		let res = {status: STATUS.OK, info: 'not set'};

		//::		🔻 Escape
		if (CModel.appstate.isPopupOpen && e.key === 'Escape') {

			//:			→ App: dispatch:			popup.settings.close
			res = await App.dispatch({type: 'popup.settings.close', caller});
		}

		//::		🔻 Cmd + Shift + E
		else if (e.key.toLowerCase() === 'e' && isMetaKey && isShiftKey) {
			if (e.preventDefault) e.preventDefault();

			const arrSidebarPosition = ['sidebar-position-left', 'sidebar-position-right', 'sidebar-position-top', 'sidebar-position-bottom'];
			const idSidebarPositionCurrent = CModel.appstate.idSidebarPosition;
			const idSidebarPositionNew = CUtil.getPrevNextValue(arrSidebarPosition, idSidebarPositionCurrent,  1, idSidebarPositionCurrent, true);

			//:			→ App: dispatch:			framework.sidebar.position.set (cycle thru 4 options)
			res = await App.dispatch({type: 'framework.sidebar.position.set', idSidebarPosition: idSidebarPositionNew, caller});
		}

		//::		🔻 Cmd + Shift + G
		else if (e.key.toLowerCase() === 'g' && isMetaKey && isShiftKey) {
			if (e.preventDefault) e.preventDefault();

			const arrGraphHeight = [25, 50, 75, 100];
			const pctGraphHeightCurrent = CModel.appstate.pctGraphHeight;
			const pctGraphHeightNew = CUtil.getPrevNextValue(arrGraphHeight, pctGraphHeightCurrent,  1, pctGraphHeightCurrent, true);

			//:			→ App: dispatch:			chart.graph.height.set
			res = await App.dispatch({type: 'chart.graph.height.set', pctGraphHeight: pctGraphHeightNew, caller});
		}

		//::		🔻 Cmd + Shift + 1 - 9
		else if (isMetaKey && isShiftKey && arrNumberKey.includes(e.code)) {		// NB: using e.code instead of e.key
			if (e.preventDefault) e.preventDefault();
			const idx = Number(e.code.replace('Digit', '')) - 1;
			const pathFilePinned = CModel.appstate.arrPathFilePinned[idx];

			if (pathFilePinned) {
				//:			→ App: dispatch:			model.docdata.load (pinned path)
				res = await App.dispatch({type: 'model.docdata.load', source: SOURCE.FILEPATH, pathFileToLoad: pathFilePinned, caller});
			}
		}

		//::		🔻 Ctrl + Tab, Ctrl + Shift + Tab
		else if (isCtrlKey && e.key === 'Tab') {
			if (e.preventDefault) e.preventDefault();

			const pathFallback = CModel.appstate.arrPathFilePinned[0];
			const pathFilePinned = CUtil.getPrevNextValue(CModel.appstate.arrPathFilePinned, CModel.appstate.pathFileLoaded, isShiftKey ? -1 : 1, pathFallback, true);

			if (pathFilePinned) {
				//:			→ App: dispatch:			model.docdata.load (next/prev tabbed pinned path)
				res = await App.dispatch({type: 'model.docdata.load', source: SOURCE.FILEPATH, pathFileToLoad: pathFilePinned, caller});
			}
		}

		//::		🔻 Cmd/Alt + 1 - 9
		else if ((isMetaKey || isAltKey) && !e.shiftKey && arrNumberKey.includes(e.code)) {		// NB: using e.code instead of e.key
			if (e.preventDefault) e.preventDefault();

			const idxTagblock = arrNumberKey.indexOf(e.code);
			const tagblock = CModel.docdata.arrTagblock[idxTagblock] || null;

			if (tagblock)
				//:			→ App: dispatch:			model.tagblock.active.set
				res = await App.dispatch({type: 'model.tagblock.active.set', tagblock: tagblock, isActive: tagblock.isActive, isAltKey: isAltKey, caller});
		}

		//::		🔻 Cmd + ArrowLeft/ArrowRight
		else if (CModel.appstate.isPopupOpen && isMetaKey && ['ArrowLeft', 'ArrowRight'].includes(e.key)) {
			if (e.preventDefault) e.preventDefault();

			const idTab = CModel.appstate.idTab;

			//:			→ App: dispatch:			popup.tab.select ('files', 'view', 'style', 'status')
			if (e.key === 'ArrowLeft' && idTab === 'view')
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'files', caller});

			else if ((e.key === 'ArrowRight' && idTab === 'files') || (e.key === 'ArrowLeft' && idTab === 'style'))
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'view', caller});
			
			else if ((e.key === 'ArrowRight' && idTab === 'view') || (e.key === 'ArrowLeft' && idTab === 'status'))
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'style', caller});
			
			else if (e.key === 'ArrowRight' && idTab === 'style')
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'status', caller});
		}

		//	 	'accelerator' keys: fix for missing feature in Tauri on Windows. Active for all os's, but only 'really' needed for Windows (see 'deduper' in onMenuEvent)
		//		nb: res does not get set on these
		//::
		//::		matching 'accelerator' keys from here:
		//::		🔻 Cmd + N
		else if (isMetaKey && e.key.toLowerCase() === 'n') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			file.new
			CWrapper.onMenuEvent({payload: 'file.new', caller});
		}

		//::		🔻 Cmd + O
		else if (isMetaKey && e.key.toLowerCase() === 'o') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			file.open
			CWrapper.onMenuEvent({payload: 'file.open', caller});
		}

		//::		🔻 Cmd + Shift + S
		else if (isMetaKey && isShiftKey && e.key.toLowerCase() === 's') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			fifile.saveas
			CWrapper.onMenuEvent({payload: 'file.saveas', caller});
		}

		//::		🔻 Cmd + Shift + P
		else if (isMetaKey && isShiftKey && e.key.toLowerCase() === 'p') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			file.pincurrent
			CWrapper.onMenuEvent({payload: 'file.pincurrent', caller});
		}

		//::		🔻 Alt + ,
		else if (isMetaKey && e.key.toLowerCase() === ',') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			file.settings
			CWrapper.onMenuEvent({payload: 'file.settings', caller});
		}

		//::		🔻 Alt + F4
		else if (isAltKey && e.key === 'F4') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			file.quit
			CWrapper.onMenuEvent({payload: 'file.quit', caller});
		}


		//::		🔻 Cmd + X
		else if (isMetaKey && e.key.toLowerCase() === 'x') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			edit.cut
			CWrapper.onMenuEvent({payload: 'edit.cut', caller});
		}

		//::		🔻 Cmd + C
		else if (isMetaKey && e.key.toLowerCase() === 'c') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			edit.copy
			CWrapper.onMenuEvent({payload: 'edit.copy', caller});
		}

		//::		🔻 Cmd + V
		else if (isMetaKey && e.key.toLowerCase() === 'v') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			edit.paste
			CWrapper.onMenuEvent({payload: 'edit.paste', caller});
		}

		//::		🔻 Cmd + Shift + D
		else if (isMetaKey && isShiftKey && e.key.toLowerCase() === 'd') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			edit.duplicateline
			CWrapper.onMenuEvent({payload: 'edit.duplicateline', caller});
		}

		//::		🔻 Cmd + D
		else if (isMetaKey && e.key.toLowerCase() === 'd') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			edit.deleteline
			CWrapper.onMenuEvent({payload: 'edit.deleteline', caller});
		}

		//::		🔻 Cmd + A	
		else if (isMetaKey && e.key.toLowerCase() === 'a') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			edit.selectall
			CWrapper.onMenuEvent({payload: 'edit.selectall', caller});
		}

		//::		🔻 Cmd + E
		else if (isMetaKey && e.key.toLowerCase() === 'e') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.sidebar.toggle
			CWrapper.onMenuEvent({payload: 'view.sidebar.toggle', caller});
		}

		//::		🔻 Cmd + R
		else if (isMetaKey && e.key.toLowerCase() === 'r') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.toolbar.toggle
			CWrapper.onMenuEvent({payload: 'view.toolbar.toggle', caller});
		}

		//::		🔻 Cmd + G
		else if (isMetaKey && e.key.toLowerCase() === 'g') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.graph.toggle
			CWrapper.onMenuEvent({payload: 'view.graph.toggle', caller});
		}

		//::		🔻 F1
		else if (!isMetaKey && !isShiftKey && e.key === 'F1') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.chart.viewa
			CWrapper.onMenuEvent({payload: 'view.chart.viewa', caller});
		}

		//::		🔻 F2
		else if (!isMetaKey && !isShiftKey && e.key === 'F2') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.chart.viewb
			CWrapper.onMenuEvent({payload: 'view.chart.viewb', caller});
		}


		//::		🔻 Cmd + Alt + 'J/K/L'
		else if ((!isShiftKey && isMetaKey && isAltKey) && (e.key.toLowerCase() === 'j' || e.key.toLowerCase() === 'k' || e.key === 'l')) {
			if (e.preventDefault) e.preventDefault();

			const isReset = (e.key === 'k');
			const isIn = (e.key.toLowerCase() === 'l');
			const isOut = !(isReset || isIn);
			const payload = isOut ? 'view.zoom.ui.out' : isIn ? 'view.zoom.ui.in' : 'view.zoom.ui.reset';
			
			//:			→ CWrapper: onMenuEvent:			view.zoom.ui.out|in|reset
			CWrapper.onMenuEvent({payload, caller});
		}

		//::		🔻 Cmd + 'J/K/L'
		else if (!isShiftKey && isMetaKey && (e.key.toLowerCase() === 'j' || e.key.toLowerCase() === 'k' || e.key === 'l')) {
			if (e.preventDefault) e.preventDefault();

			const isReset = (e.key === 'k');
			const isIn = (e.key.toLowerCase() === 'l');
			const isOut = !(isReset || isIn);
			const payload = isOut ? 'view.zoom.normal.out' : isIn ? 'view.zoom.normal.in' : 'view.zoom.normal.reset';

			//:			→ CWrapper: onMenuEvent:			view.zoom.normal.out|in|reset
			CWrapper.onMenuEvent({payload, caller});
		}

		//::		🔻 Cmd + Shift + F1
		else if (isMetaKey && isShiftKey && e.key === 'F1') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.theme.system
			CWrapper.onMenuEvent({payload: 'view.theme.system', caller});
		}

		//::		🔻 Cmd + Shift + F2
		else if (isMetaKey && isShiftKey && e.key === 'F2') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.theme.light
			CWrapper.onMenuEvent({payload: 'view.theme.light', caller});
		}

		//::		🔻 Cmd + Shift + F3 
		else if (isMetaKey && isShiftKey && e.key === 'F3') {
			if (e.preventDefault) e.preventDefault();

			//:			→ CWrapper: onMenuEvent:			view.theme.dark
			CWrapper.onMenuEvent({payload: 'view.theme.dark', caller});
		}

		res.context = caller;
		await CFramework.handleResult(res);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onWindowResize
	onWindowResize: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onWindowResize', CUtil.getArgsKeys(args), args.caller));

		if (CModel.docdata !== null)
			//: 		→ App: dispatch				chart.render
			await App.dispatch({type: 'chart.render', typeSvgUpdate: SVG_UPDATE_RESIZE_ONLY, caller: 'CFramework.onWindowResize'});

		if (LOGGING) console.groupEnd();
	},

};

//:::📙 const CChart
const CChart = {
	elParent: null,
	elSvgStage: null,
	pxHeightSvgContainer: 0,
	pxWidthViewbox: 0,
	pxHeightViewbox: 0,

	//:::  📗 Templates
	Templates: {
		
		//::		☐ SvgStage()
		SvgStage() {
			if (LOGGING) console.log('%c CChart %c Template: %c SvgStage %c ()', LOG_MODULE, LOG_RED, LOG_FUNCTION+LOG_BOLD, LOG_ARGS);
			const docdata = CModel.docdata;

			return svg`
		<svg id="stage" viewBox=${`0 0 ${CChart.pxWidthViewbox} ${CChart.pxHeightViewbox}`} width=${CChart.pxWidthViewbox} height=${CChart.pxHeightViewbox} aria-label="Novel arcs" role="img">
			<g class="header">
				${CChart.Templates.Header()}
			</g>
			<g class="tagblocks tagblocks--parts">
				${docdata.arrTagblock.map(CChart.Templates.TagblockParts)}
			</g>

			${CModel.appstate.isGraphVisible ? svg`
				<g class="tagblocks tagblocks--graphs">
					${docdata.arrTagblock.map(CChart.Templates.TagblockGraphs)}
				</g>
				` : null}

		</svg>`;
		},

		//::		☐ Header()
		//:			→ @click: this.onClick
		Header() {
			if (LOGGING) console.log('%c CChart %c Template: %c Header %c ()', LOG_MODULE, LOG_RED, LOG_FUNCTION+LOG_BOLD, LOG_ARGS);
			const docdata = CModel.docdata;
			const pxWidthGraphBg = (CChart.pxWidthViewbox - PX_MARGIN_LEFT_W - PX_MARGIN_RIGHT_W) + (PX_PADDING_NORMAL * 2);
			const arrElSvg = [];

			arrElSvg.push(
				...docdata.arrSection.filter(section => section.arrIdxChapter.length > 0).map(function(section, idxSection) {
					const ellipsis = '…';
					const pxX = PX_MARGIN_LEFT_W + (PX_COL_WIDTH * section.arrIdxChapter[0]);
					const pxWidth = PX_COL_WIDTH * section.arrIdxChapter.length;
					const arrCaptionSplit = CChart.splitString(section.caption, pxWidth - (PX_PADDING_NORMAL*2), FONTS_SIZE_REF.section, 1);
					const strCaption = arrCaptionSplit[0] + (arrCaptionSplit.length > 1 ? ellipsis : '');
					const strExtraStyle = CChart.getStyleFromMetadata(section.metadata);
					
					const strClassesRect = ['header__rect', 'header__rect--section', ...section.arrTag, ((idxSection % 2) ? 'header__rect--section-even' : 'header__rect--section-odd')].join(' ');
					const strClassesText = ['header__text', 'header__text--section', ...section.arrTag].join(' ');

					return svg`	<rect class=${strClassesRect} style=${strExtraStyle} x=${pxX} y=${0} width=${pxWidth} rx=${PX_PADDING_NORMAL * 1.5}  @click=${e => CChart.onClick({src: 'section', e, idxTextareaLine: section.idxTextareaLine, caller: 'src: section'})} />
								<text class=${strClassesText} style=${strExtraStyle} x=${pxX + PX_PADDING_NORMAL} y=${PX_LINE_HEIGHT * 1.2}>${strCaption}</text>`;
				})
			);

			arrElSvg.push(
				...docdata.arrChapter.map((chapter, idx) => {
					const ellipsis = '…';
					const pxX = PX_MARGIN_LEFT_W + (PX_COL_WIDTH * idx);
					const arrCaptionSplit = CChart.splitString(chapter.caption, PX_COL_WIDTH - (PX_PADDING_NORMAL*1), FONTS_SIZE_REF.chapter, 1);
					const strCaption = arrCaptionSplit[0] + (arrCaptionSplit.length > 1 ? ellipsis : '');
					const strExtraStyle = CChart.getStyleFromMetadata(chapter.metadata);
					
					// new:
					const strClassesRect = ['header__rect', 'header__rect--chapter', ...chapter.arrTag].join(' ');
					const strClassesText = ['header__text', 'header__text--chapter', ...chapter.arrTag].join(' ');

					return svg` <rect class=${strClassesRect} style=${strExtraStyle} x=${pxX} y=${PX_LINE_HEIGHT * 2} width=${PX_COL_WIDTH}  rx=${PX_PADDING_NORMAL} @click=${e => CChart.onClick({src: 'chapter', e, idxTextareaLine: chapter.idxTextareaLine, caller: 'src: chapter'})} />
								<text class=${strClassesText} style=${strExtraStyle} x=${pxX + PX_PADDING_NORMAL} y=${PX_LINE_HEIGHT * 2.65}>${strCaption}</text>`;
				})
			);

			if (CModel.appstate.isGraphVisible)
				arrElSvg.push(svg`<rect class="graphs-bg-rect" x=${PX_MARGIN_LEFT_W - PX_PADDING_NORMAL} y="0" width=${pxWidthGraphBg} height="0" rx=${PX_PADDING_SMALL} />`);

			return arrElSvg;
		},

		//::		☐ TagblockParts(tagblock, idx)
		//:			→ @click: this: onClick
		TagblockParts(tagblock, idx) {
			if (LOGGING) console.log('%c CChart %c Template: %c TagblockParts %c (tagblock, idx)', LOG_MODULE, LOG_RED, LOG_FUNCTION+LOG_BOLD, LOG_ARGS);
			if (LOGARGS) console.log(tagblock, idx);
			const strClasses = ['tagblock', tagblock.id, ['tagblock-odd', 'tagblock-even'][idx % 2]].join(' ');
			const pxWidthTagblock = CChart.pxWidthViewbox - PX_MARGIN_LEFT_W - PX_MARGIN_RIGHT_W;
			const pxYa = PX_HEADER_HEIGHT + 'px';

			return svg`
			<g class=${strClasses} style=${`--ya:${pxYa}; --count-rows:${tagblock.countRows}; --fill: ${tagblock.metadata.fill}; --fillrgb: ${tagblock.metadata.fillrgb};`}; data-id=${tagblock.id} @click=${e => CChart.onClick({src: 'tagblock', e, tagblock, caller: 'src: tagblock'})}>
				<rect class="tagblock__bg-rect" x=${PX_MARGIN_LEFT_W - 1} y="0" width=${pxWidthTagblock + 2} />

				${tagblock.arrPart.map(part => CChart.Templates.Tagblock_Part(part, tagblock))}
			</g>`;
		},

		//::		☐ TagblockGraphs(tagblock, idx)
		//:			→ @click: this: onClick
		TagblockGraphs(tagblock, idx) {
			if (LOGGING) console.log('%c CChart %c Template: %c TagblockGraphs %c (tagblock, idx)', LOG_MODULE, LOG_RED, LOG_FUNCTION+LOG_BOLD, LOG_ARGS);
			if (LOGARGS) console.log(tagblock, idx);
			const strClasses = ['tagblock', tagblock.id].join(' ');
			const pxYa = PX_HEADER_HEIGHT + 'px';
			const arrKeyExclude = ['fill', 'text', 'bold', 'saturation'];		// jk: same as arrAllowedKey in getStyleFromMetadata. Maybe make global const?

			return svg`
			<g class=${strClasses} style=${`--ya:${pxYa}; --count-rows:${tagblock.countRows}; --fillrgb: ${tagblock.metadata.fillrgb}; --stroke: ${tagblock.metadata.stroke};`} data-id=${tagblock.id} @click=${e => CChart.onClick({src: 'tagblock', e, tagblock, caller: 'src: tagblock'})}>

				${Object.entries(tagblock.graphtags)
					.filter(([keyMeta]) => !arrKeyExclude.includes(keyMeta))
					.map(([keyMeta, arrValueMeta]) => CChart.Templates.Graphtag(tagblock, keyMeta, arrValueMeta))}
			</g>`;
		},

		//::		☐ Tagblock_Part(part, tagblock)
		//:			→ @click: this.onClick
		Tagblock_Part(part, tagblock) {
			//if (LOGGING) console.log('%c CChart %c Template: %c Tagblock_Part %c (part, tagblock)', LOG_MODULE, LOG_RED, LOG_FUNCTION+LOG_BOLD, LOG_ARGS);
			if (LOGARGS) console.log(part, tagblock);
			const pxWidthRect = PX_COL_WIDTH - (PX_PADDING_SMALL * 2);
			const pxX = PX_MARGIN_LEFT_W + (PX_COL_WIDTH * part.idxChapter);
			const pxYa = (((PX_LINE_HEIGHT * COUNT_PART_LINES) + PX_PADDING_NORMAL) * part.idxOrderInChapter) + PX_PADDING_SMALL;
			const pxYb = (PX_LINE_HEIGHT * part.idxRow) + PX_PADDING_SMALL;
			const symbolString = part.metadata?.code;
			const show = part.metadata?.show ?? tagblock.metadata?.show ?? 'normal';
			const strBaseStyle = `--x:${pxX}px; --ya:${pxYa}px; --yb:${pxYb}px; `;
			const strExtraStyle = CChart.getStyleFromMetadata(part.metadata);
			const strClasses = ['tb-part', ...part.arrTag, show === 'normal' ? 'tb-part--normal' : 'tb-part--special'].join(' ');

			let arrTextlines = [];
			let arrObjTextline = [];

			if (show === 'normal') {
				arrTextlines = CChart.splitString(part.caption, pxWidthRect, FONTS_SIZE_REF.part_top, COUNT_PART_LINES);

				arrTextlines.forEach((textline, idx) => {
					const addLineHeight = idx === 0 ? 0.5 : 1;
					arrObjTextline.push({caption: textline, classes: ['top'], style: '', dy: PX_LINE_HEIGHT * addLineHeight, idxTextareaLine: undefined});
				});

				let countLines = arrObjTextline.length;

				part.arrSub.forEach(sub => {

					const strExtraStyle = CChart.getStyleFromMetadata(sub.metadata);					
					const arrTextlines = CChart.splitString(sub.caption, pxWidthRect, FONTS_SIZE_REF.part, COUNT_PART_LINES);

					arrTextlines.forEach((textline, idx) => {
						const addLineHeight = idx === 0 ? 1.25 : 1;
						countLines += addLineHeight;

						if (countLines <= COUNT_PART_LINES)
							arrObjTextline.push({caption: textline, classes: sub.arrTag, style: strExtraStyle, idxTextareaLine: sub.idxTextareaLine, dy: PX_LINE_HEIGHT * addLineHeight});
					});
				});
			}

			else {
				const definition = CModel.docdata.definitions?.[show];
				const strLine0 = `${show} (${definition ? definition.unit : '?'})`;
				const strLine1 = part.metadata?.[show] ?? '—';

				arrTextlines = [strLine0, strLine1];

				arrTextlines.forEach((textline, idx) => {
					const addLineHeight = idx === 0 ? 0.5 : 1.1;

					arrObjTextline.push({caption: textline, classes: [], idxTextareaLine: undefined, dy: PX_LINE_HEIGHT * addLineHeight});
				});
			}

			return svg`
		<g class=${strClasses} style=${strBaseStyle + strExtraStyle} data-idxline=${'x' + part.idxTextareaLine} @click=${e => CChart.onClick({src: 'part', e, idxTextareaLine: part.idxTextareaLine, caller: 'src: part'})} >
			<rect class="tb-part__rect tb-part__rect-bg" x=${PX_PADDING_SMALL} y="0" width=${pxWidthRect} rx=${PX_PADDING_SMALL-1}/>
			<rect class="tb-part__rect" x=${PX_PADDING_SMALL} y="0" width=${pxWidthRect} rx=${PX_PADDING_SMALL-1}/>
			<text class="tb-part__text-viewa">
				${arrObjTextline.map((objTextline, idx) => svg`
					<tspan data-idxlinesub=${objTextline.idxTextareaLine} class=${[...objTextline.classes, 'line', 'line' + (idx+1)].join(' ')} style="${objTextline.style}" x=${PX_PADDING_SMALL * 2} dy=${objTextline.dy}>${objTextline.caption}</tspan>
				`)}
			</text>
			<text class="tb-part__text-viewb top" x=${PX_PADDING_NORMAL} y=${PX_LINE_HEIGHT * 0.5}>${part.caption}</text> 

			${symbolString ? svg`<g class="tb-part__symbol" style=${`--x:${pxWidthRect + PX_PADDING_NORMAL}px; --y:${PX_LINE_HEIGHT * COUNT_PART_LINES}px;`}><text x="0" y="0">${symbolString}</text></g>` : ''}
		</g>`;
		},

		//${symbolString ? svg`<text class="tb-part__symbol" style=${`--x:${pxWidthRect + PX_PADDING_NORMAL}px; --y:${PX_LINE_HEIGHT * COUNT_PART_LINES}px;`} x="0" y="0">${symbolString}</text>` : ''}

		//::		☐ Graphtag(tagblock, keyMeta, arrValueMeta) 😃
		//:			→ @click: this.onClick
		Graphtag(tagblock, keyMeta, arrValueMeta) {
			if (LOGGING) console.log('%c CChart %c Template: %c Graphtag %c (tagblock, keyMeta, arrValueMeta)', LOG_MODULE, LOG_RED, LOG_FUNCTION+LOG_BOLD, LOG_ARGS);
			if (LOGARGS) console.log(tagblock, keyMeta, arrValueMeta);
			const definition = CModel.docdata.definitions[keyMeta] ?? {unit: '', min: 0, max: 100 };
			const unit = definition.unit ?? '?';

			return svg`
			<g class=${`graph ${tagblock.id} ${keyMeta}`}>
				<polyline
					class="tagblock-polyline"
					stroke-linecap="round"
					stroke-linejoin="round"
				></polyline>

				${arrValueMeta.map(graphvalue => svg`
					<circle class="tagblock-circle-bg"></circle>
					<circle
						class="tagblock-circle"
						@click=${e => CChart.onClick({src: 'graph', e, idxTextareaLine: graphvalue.idxTextareaLine, caller: 'src: graph'})}
						data-idxline=${'x' + graphvalue.idxTextareaLine}
					>
					</circle>
					<text 
						class="tagblock-circle-text"
						data-idxline=${'x' + graphvalue.idxTextareaLine}
					>${`${tagblock.id}: ${keyMeta} (${unit}): ${graphvalue.value}`}</text>
				`)}
			</g>`;
		},
	},

	//:::	🔹 init
	init(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CChart', 'init', CUtil.getArgsKeys(args), args.caller));

		this.elParent = document.querySelector('#workspace-main');

		this.elParent.addEventListener('pointerover', (e) => {CChart.onHover({e, isOn: true});});
		this.elParent.addEventListener('pointerout',  (e) => {CChart.onHover({e, isOn: false});});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 renderSvg(args)
	renderSvg(args) {				// typeSvgUpdate can be SVG_UPDATE_FULL_RENDER or SVG_UPDATE_RESIZE_ONLY
		if (LOGGING) console.group(...CUtil.logGroup('CChart', 'renderSvg', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		//: 		→ this: calculateRequiredViewboxSize
		CChart.calculateRequiredViewboxSize(CModel.docdata);

		if (args.typeSvgUpdate === SVG_UPDATE_FULL_RENDER) {
			//: 		→ [uhtml].render		SvgStage
			render(CChart.elParent, CChart.Templates.SvgStage());

			CChart.elSvgStage = document.querySelector('#stage');
		}

		else if (args.typeSvgUpdate === SVG_UPDATE_RESIZE_ONLY) {
			
			CChart.elSvgStage.setAttribute('viewBox', `0 0 ${CChart.pxWidthViewbox} ${CChart.pxHeightViewbox}`);
			CChart.elSvgStage.setAttribute('width', String(CChart.pxWidthViewbox));
			CChart.elSvgStage.setAttribute('height', String(CChart.pxHeightViewbox));

			// set height of chapter rects
			const arrElChapterRect = CChart.elSvgStage.querySelectorAll('.chapter__rect');
			for (const elChapterRect of arrElChapterRect) {
				elChapterRect.setAttribute('height', String(CChart.pxHeightViewbox - PX_HEADER_HEIGHT));
			}
		}

		//: 		→ this: reflowAllTagblocks
		CChart.reflowAllTagblocks(CModel.docdata);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	calculateRequiredViewboxSize()
	calculateRequiredViewboxSize(docdata) {
		if (LOGGING) console.group('%c CChart %c calculateRequiredViewboxSize', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(docdata);

		let pxHeightRequired = PX_HEADER_HEIGHT;

		if (CModel.docstate.idxView === VIEWA) {

			const idxOrderInChapterMax = Math.max( ...docdata.arrTagblock.flatMap(tb => tb.arrPart.map(p => p.idxOrderInChapter)) );
			const pxPartHeight = PX_LINE_HEIGHT * COUNT_PART_LINES;

			pxHeightRequired += ((pxPartHeight + PX_PADDING_NORMAL) * (idxOrderInChapterMax + 1));
		}
		else if (CModel.docstate.idxView === VIEWB) {

			for (const tagblock of docdata.arrTagblock) {
				const pxTagblockHeight = (PX_LINE_HEIGHT * (tagblock.isActive ? tagblock.countRows : 1)) + 10;

				pxHeightRequired += pxTagblockHeight; 
			}
		}

		// set ui values
		CChart.pxWidthViewbox = PX_MARGIN_LEFT_W + PX_MARGIN_RIGHT_W + (PX_COL_WIDTH * docdata.arrChapter.length);
		CChart.pxHeightSvgContainer = CChart.elParent.clientHeight;
		CChart.pxHeightViewbox = Math.max(pxHeightRequired, CChart.pxHeightSvgContainer, PX_VIEVBOX_MIN_H);

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	reflowAllTagblocks(docdata)
	reflowAllTagblocks(docdata) {
		if (LOGGING) console.group('%c CChart %c reflowAllTagblocks', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(docdata);

		let pxTagblockTop = PX_HEADER_HEIGHT;

		// update graphs-bg-rect placement
		if (CModel.docstate.idxView === VIEWA && CModel.appstate.isGraphVisible) {

			const pxGraphsFullHeight = CChart.pxHeightViewbox - (PX_HEADER_HEIGHT + PX_GRAPHS_SPACE_BOTTOM);
			const pxGraphHeight = pxGraphsFullHeight / 100 * CModel.appstate.pctGraphHeight;
			const pxGraphTop = CChart.pxHeightViewbox - (pxGraphHeight + PX_GRAPHS_SPACE_BOTTOM + PX_HEADER_HEIGHT);
			
			const elGraphsBgRect = CChart.elSvgStage.querySelector('.graphs-bg-rect');

			if (elGraphsBgRect) {
				elGraphsBgRect.setAttribute('y', pxGraphTop);
				elGraphsBgRect.setAttribute('height', pxGraphHeight);
			}
		}


		docdata.arrTagblock.forEach(tagblock => {

			const pxYb = pxTagblockTop + 'px';
			const pxTagblockHeight = (PX_LINE_HEIGHT * (tagblock.isActive ? tagblock.countRows : 1)) + PX_PADDING_NORMAL;
			const elTagblockParts = CChart.elSvgStage.querySelector(`.tagblocks--parts .tagblock.${tagblock.id}`);

			elTagblockParts.classList.toggle('tagblock--active', tagblock.isActive);
			elTagblockParts.classList.toggle('tagblock--inactive', !tagblock.isActive);
			elTagblockParts.style.setProperty('--yb', pxYb);

			if (CModel.appstate.isGraphVisible) {

				const elTagblockGraphs = CChart.elSvgStage.querySelector(`.tagblocks--graphs .tagblock.${tagblock.id}`);

				elTagblockGraphs.classList.toggle('tagblock--active', tagblock.isActive);
				elTagblockGraphs.classList.toggle('tagblock--inactive', !tagblock.isActive);
				elTagblockGraphs.style.setProperty('--yb', pxYb);

				//:			→ this: updateTagblockGraphs
				CChart.updateTagblockGraphs(tagblock, docdata.definitions, elTagblockGraphs);
			}

			pxTagblockTop += pxTagblockHeight;
		});

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹		updateTagblockGraphs(tagblock)
	updateTagblockGraphs(tagblock, definitions, elTagblock) {		// jk: maybe make this function 'safer'
		if (LOGGING) console.group('%c CChart %c updateTagblockGraphs %c (' + tagblock.id + ')', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(tagblock, definitions);

		function mapValuesWithFracX(arr) {
			const arrNew = [];
			let i = 0;

			while (i < arr.length) {
				const idxChapter = arr[i].idxChapter;

				// Find contiguous group with same idxChapter
				let j = i;
				while (j < arr.length && arr[j].idxChapter === idxChapter) {
					j++;
				}

				const count = j - i;

				// Map group items with fX spread across column
				for (let k = 0; k < count; k++) {
					const item = arr[i + k];
					const fracX = (k + 1) / (count + 1);

					arrNew.push({
						...item,
						fracX
					});
				}

				i = j;
			}

			return arrNew;
		}


		const pxGraphsFullHeight = CChart.pxHeightViewbox - (PX_HEADER_HEIGHT + PX_GRAPHS_SPACE_BOTTOM);
		const pxGraphHeight = (CModel.docstate.idxView === VIEWA) ? (pxGraphsFullHeight / 100 * CModel.appstate.pctGraphHeight) : (PX_LINE_HEIGHT * tagblock.countRows) + PX_PADDING_NORMAL;
		const pxGraphTop = (CModel.docstate.idxView === VIEWA) ? (CChart.pxHeightViewbox - (pxGraphHeight + PX_GRAPHS_SPACE_BOTTOM + PX_HEADER_HEIGHT)) : 0;


		Object.entries(tagblock.graphtags).forEach(([keyMeta, arrValueMeta]) => {					// loop over graph tags: 'future', 'action', etc.
			
			const graphGroup = elTagblock.querySelector(`.graph.${tagblock.id}.${keyMeta}`);		// find this particular graph group: <g class="graph gitte future">
			if (!graphGroup) return;

			const polyline = graphGroup.querySelector('.tagblock-polyline');
			const circles  = graphGroup.querySelectorAll('.tagblock-circle');
			const circlesBg  = graphGroup.querySelectorAll('.tagblock-circle-bg');
			const circletexts  = graphGroup.querySelectorAll('.tagblock-circle-text');
			if (!polyline) return;

			// check if definition exists for keyMeta (eg. 'weight') - else use default range 0 - 100
			const definition = definitions[keyMeta] ?? {unit: '', min: 0, max: 100 };

			// make array of coords
			const arrCoord = [];
			const arrValueMetaMapped = mapValuesWithFracX(arrValueMeta);

			arrValueMetaMapped.forEach(({ idxChapter, value, fracX }) => {
				const pctValue = ((value - definition.min) / (definition.max - definition.min)) * 100;		// calculate percent value inside range definition
				const pxYBase = pxGraphHeight - (pxGraphHeight * (pctValue / 100));
				const pxX = PX_MARGIN_LEFT_W + (idxChapter * PX_COL_WIDTH) + (PX_COL_WIDTH * fracX);
				const pxY = pxGraphTop + pxYBase;

				arrCoord.push({pxX, pxY});
			});

			polyline.setAttribute('points', arrCoord.map(pt => `${pt.pxX},${pt.pxY}`).join(' '));		// set polyline points
			polyline.style.display = '';

			circles.forEach((circle, idx) => {			// set circle positions
				const point = arrCoord[idx];
				circle.setAttribute('cx', point.pxX);
				circle.setAttribute('cy', point.pxY);
				circle.style.display = '';

				circletexts[idx].setAttribute('x', point.pxX);	// jk: could be 'safer' here?
				circletexts[idx].setAttribute('y', point.pxY);

				circlesBg[idx].setAttribute('cx', point.pxX);
				circlesBg[idx].setAttribute('cy', point.pxY);
			});			
		});

		if (LOGGING) console.groupEnd();
	},


	//:::	🔹 getStyleFromMetadata() 				- better placement?
	getStyleFromMetadata(obj) { 
		if (!obj) return '';
		//if (LOGGING) console.log('%c CChart %c getStyleFromMetadata', LOG_MODULE, LOG_FUNCTION);
		const arrAllowedKey = ['fill', 'text', 'bold', 'saturation'];
		
		return Object.entries(obj)
			.filter(([, v]) => v !== null && v !== undefined && v !== '')
			.filter(([k, v]) => arrAllowedKey.includes(k)) 
			.map(([k, v]) => `--${k}: ${v};`)
			.join(' ');
	},


	//:::	🔹 splitString (*args*)
	splitString(text, pxWidthMax, fontForMeasuring, maxLines) {
		const content = (text || '').trim();
		if (!content) return [''];
		//if (LOGGING) console.log('%c CChart %c splitString', LOG_MODULE, LOG_FUNCTION);

		CTX_FOR_TEXT_MEASURE.font = fontForMeasuring;

		const measure = (txt) => CTX_FOR_TEXT_MEASURE.measureText(txt).width;

		const appendEllipsis = (line) => {
			const ellipsis = '…';
			let trimmed = (line || '').replace(/\s+$/, '');

			while (trimmed && measure(trimmed + ellipsis) > pxWidthMax)
				trimmed = trimmed.slice(0, -1);

			return trimmed ? trimmed + ellipsis : ellipsis;
		};

		const fitSingleWord = (word) => {
			if (measure(word) <= pxWidthMax)
				return word;

			return appendEllipsis(word);
		};

		const words = content.split(/\s+/);
		const lines = [];

		let currentLine = '';

		for (let i = 0; i < words.length; i++) {
			const word = words[i];
			const candidate = currentLine ? `${currentLine} ${word}` : word;

			if (measure(candidate) <= pxWidthMax) {
				currentLine = candidate;
				continue;
			}

			if (currentLine) {
				lines.push(currentLine);
				if (lines.length >= maxLines) break;

				// start new line with word, but shorten it if needed
				currentLine = fitSingleWord(word);

				// if the shortened word already ends with ellipsis,
				// we know the original text was truncated
				if (currentLine.endsWith('…')) {
					lines.push(currentLine);
					currentLine = '';
					break;
				}
			}
			else {
				// single word longer than max width → shorten with ellipsis
				lines.push(fitSingleWord(word));
				if (lines.length >= maxLines) break;
				currentLine = '';
			}
		}

		if (currentLine && lines.length < maxLines) {
			lines.push(currentLine);
		}

		// apply ellipsis if truncated across multiple words
		if (lines.length === maxLines && words.length) {
			const usedWords = lines.join(' ').split(/\s+/).length;
			if (usedWords < words.length && !lines[lines.length - 1].endsWith('…')) {
				lines[lines.length - 1] = appendEllipsis(lines[lines.length - 1]);
			}
		}

		return lines;
	},

	//:::	🔹 onHover(args)
	onHover: (args) => {
		if (LOGGING && DETAILS) console.group('%c CChart %c onHover %c [callback]', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(args);

		const elTagblock = args.e.target.closest('.tagblock');
		const elPartOrCircle = args.e.target.closest('[data-idxline]');

		if (elTagblock) {

			const idTagblock = elTagblock.dataset.id;

			CChart.elParent.querySelectorAll(`.tagblock[data-id="${idTagblock}"]`).forEach(el => el.classList.toggle('is-hover', args.isOn));

			if (elPartOrCircle)
				CChart.elParent.querySelectorAll(`[data-idxline="${elPartOrCircle.dataset.idxline}"]`).forEach(el => el.classList.toggle('is-hover', args.isOn));
			
			CToolbar.elParent.querySelector(`.${idTagblock}`).classList.toggle('is-hover', args.isOn);
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onClick(args)
	onClick: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CChart', 'onClick', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		const caller = 'CChart.onClick (' + args.caller + ')';
		const e = args.e;

		const ua = navigator.userAgent.toUpperCase();
		const isMac = ua.includes('MAC');
		const isWindows = ua.includes('WINDOWS');
		const isLinux = ua.includes('LINUX');

		const isMetaKey = isMac ? e.metaKey : e.ctrlKey;
		const isAltKey = e.altKey;
		const isShiftKey = e.shiftKey;
		const isCtrlKey = e.ctrlKey;

		switch (args.src) {

			//::		🔻 section, chapter, part, graph
			case 'section':
			case 'chapter':
			case 'part':
			case 'graph':

				const idxLine = e.srcElement.dataset.idxlinesub || args.idxTextareaLine;	// 'dataset.idxlinesub' is set if user clicked tspan created from arrSub (part's direct children)

				//: 			→ App: dispatch: 		selectLine
				if (!isMetaKey && !isAltKey)
					await App.dispatch({type: 'texteditor.line.select', idxLine: idxLine, isSelectWholeTextbloc: isShiftKey, caller});
				break;

			//::		🔻 tagblock
			case 'tagblock':

				//: 			→ App: dispatch:		model.tagblock.active.set	[if isMetaKey || isAltKey]
				if (isMetaKey || isAltKey)
					await App.dispatch({type: 'model.tagblock.active.set', tagblock: args.tagblock, isActive: args.tagblock.isActive, isAltKey: isAltKey, caller});
				break;
		}
		if (LOGGING) console.groupEnd();
	},
	
};
