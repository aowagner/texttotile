<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>SVG App — Text + Preview (Light Theme)</title>
	<style>

	:root {
		color-scheme: light dark;

		/* user editable */
		--zoom:			1.0;
		--lineheight:	1.4;
		--fontsize:		1.1;
		--fill:			Canvas;
		--text:			CanvasText;
		--bold:			400;
		--fontfamily:				system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
		--fontfamily-texteditor:	ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

		/* calculated */
		--px-base-unit:		12px;
		--px-line-height:	calc(var(--px-base-unit) * var(--zoom) * var(--lineheight));
		--px-font-size:		calc(var(--px-base-unit) * var(--zoom) * var(--fontsize));

		/* will be overwritten in code by updateCssFromLookupConstants */
		--px-line-height-svg:	20px;
		--px-font-size-svg:		16px;
		--px-header-height-svg:	50px;
		--count-lines-svg:		4;

		/* other */
		--ms-transition: 0.4s;
		--ms-transition-quick: 0.15s;

		--px-sidebar-size: 500px;
		--px-sidebar-min: 200px;
	}


	:root.theme-dark {
		color-scheme: dark;

		--fill-section-odd-chapter-rect-fill:  #80808026;
		--fill-section-even-chapter-rect-fill: #8080801f;
		--fill-chapter-rect-stroke: var(--fill);

		--rect-opacity: 1;
		--fill-fallback: #888888;	/* nb: must be without alpha! used in color-mix in .tagblock-label-rect */
		--fill-tagblock-bg-rect-stroke: #52525280;
		--fill-tagblock-label-stroke: #52525280;
		--fill-tagblock-label-text-fill: #ffffff;

		--fill-part-rect-stroke: #787878;
		--fill-part-rect-stroke-hover: #ffffff;
		--fill-part-rect-fill-mix: #656565;
		/* --fill-tagblock-part-rect-drop-shadow: #97aebd88; */
	}

	:root.theme-light {
		color-scheme: light;

		--fill-section-odd-chapter-rect-fill:  #8080802b;
		--fill-section-even-chapter-rect-fill: #8080801f;
		--fill-chapter-rect-stroke: var(--fill);

		--rect-opacity: 1;
		--fill-fallback: #cccccc;	/* nb: must be without alpha! used in color-mix in .tagblock-label-rect */
		--fill-tagblock-bg-rect-stroke: #aaaaaa80;
		--fill-tagblock-label-stroke: #52525280;
		--fill-tagblock-label-text-fill: #000000;

		--fill-part-rect-stroke: #a1a1a1;
		--fill-part-rect-stroke-hover: #3a3a3a;
		--fill-part-rect-fill-mix: #ffffff;
		/* --fill-tagblock-part-rect-drop-shadow: #97aebd88; */ 
	}

	:root.theme-dark #workspace {--XXXfill: #333333; /* default tag bg color */ }

	:root.theme-light #workspace {--XXXfill: #ffffff; /* default tag bg color */ }



	html, body {height: 100%; margin: 0; overflow: hidden; background: var(--fill);  font-family: var(--fontfamily); font-size: var(--px-font-size); font-weight: var(--bold); color: var(--text); }

	body.no-select, body.no-select * {user-select: none; -webkit-user-select: none; }
	body.no-select .texteditor {pointer-events: none; }


/* app */
	#app {display: grid; grid-template-rows: auto 1fr; height: 100vh; }

	/* Existing 3-column layout lives here */
	#layout {display: grid; height:100vh;  min-height: 0; /* important for overflow handling */ }

	/* Optional: allow workspace/sidebar to scroll correctly */
	.sidebar,
	.workspace {min-height: 0; }

	#app.sidebar-layout-left 	#layout {grid-template-columns:	minmax(var(--px-sidebar-min), var(--px-sidebar-size)) 6px 1fr; grid-template-areas: "sidebar splitter workspace"; }
	#app.sidebar-layout-right 	#layout {grid-template-columns:	1fr 6px minmax(var(--px-sidebar-min), var(--px-sidebar-size)); grid-template-areas: "workspace splitter sidebar"; }
	#app.sidebar-layout-top 	#layout {grid-template-rows:	minmax(var(--px-sidebar-min), var(--px-sidebar-size)) 6px 1fr; grid-template-areas: "sidebar" "splitter" "workspace"; }
	#app.sidebar-layout-bottom 	#layout {grid-template-rows:	1fr 6px minmax(var(--px-sidebar-min), var(--px-sidebar-size)); grid-template-areas: "workspace" "splitter" "sidebar"; }

	#app.sidebar-visible-no 	#layout {grid-template-columns: 1fr !important; grid-template-rows: 1fr !important; grid-template-areas: "workspace" !important; }	/* Force single-pane layout regardless of current side */
	
/* layout - sidebar */
							.sidebar {grid-area: sidebar; position: relative; overflow: hidden; display: flex; flex-direction: column; }
	#app.sidebar-visible-no .sidebar {display: none; }

		/* sidebar - sidebar__main */
		.sidebar__main {flex: 1 1 auto; overflow: auto; display: flex; flex-direction: column;   padding-top: var(--px-header-height-svg); }

			/* sidebar__main - textarea */
			.texteditor {flex: 1 1 50%; display:inline-flex; box-sizing: border-box; width: 100%; height: 100%; resize: none; padding: 8px; font-family: var(--fontfamily-texteditor); font-size: var(--px-font-size); font-weight: var(--bold); line-height: var(--px-line-height);  outline: none; /* white-space: pre;*/ tab-size: 3; border: none;  caret-color: #1976d2; overflow: auto;  background: color-mix(in srgb, var(--fill) 97%, var(--text)); color: color-mix(in srgb, var(--text) 90%, var(--fill)); }

/* layout - splitter */
								.splitter {grid-area: splitter; position: relative; cursor: col-resize; z-index: 10; }
	#app.sidebar-visible-no		.splitter {display: none; }
	#app.sidebar-layout-top 	.splitter,
	#app.sidebar-layout-bottom	.splitter {cursor: row-resize; }

/* layout - workspace */

	#workspace {grid-area: workspace; position: relative; overflow: hidden; display: flex; flex-direction: column; }


/* Prevent selection in the workspace */
#workspace * {
  user-select: none;
  -webkit-user-select: none;
}




/* toolbar */
						.toolbar 		{position: absolute; overflow: auto hidden; background: var(--fill); border: 1px solid color-mix(in srgb, var(--text) 11%, transparent); border-radius: 5px; }
						.toolbarTags 	{--bold-button: var(--bold); /* --bold-button is a 'hack' to use toolbarTags's (aka :root) --bold, so buttons don't use individual tag's --bold */ height: calc(var(--px-line-height) + 7px); max-width: calc(100% - (var(--px-line-height) + 68px)); padding: 7px; margin-top: calc((var(--px-line-height) + 40px) * -1); margin-left: 10px; }
	.toolbar-visible-no	.toolbarTags 	{display: none; }

		.toolbar__button 	{position: absolute; transform: translateX(var(--pxX)); border: 1px solid var(--fill-part-rect-stroke); border-radius: 5px; font-family: var(--fontfamily); font-size: var(--px-font-size); line-height: var(--px-line-height); color: var(--text); white-space: nowrap; cursor: pointer; transition: opacity 120ms ease; }
		.button--inactive	{opacity: 0.33; }
		.button-draggable 	{cursor: grab; touch-action: none; }

		.toolbarTags 	.toolbar__button 			{background: color-mix(in srgb, var(--fill) 30%, var(--fill-part-rect-fill-mix)); font-weight: var(--bold-button); }
		.toolbarTags 	.toolbar__button.is-hover 	{background: color-mix(in srgb, var(--fill) 15%, var(--fill-part-rect-fill-mix)); outline: 1.5px solid black; z-index: 2; border-width: 0px; }


		.popup-btn {
			position: absolute;
			right: 10px;
			margin-top: calc((var(--px-line-height) + 40px) * -1);
			width: calc(var(--px-line-height) + 21px);
			height: calc(var(--px-line-height) + 21px);
			line-height: calc(var(--px-line-height) + 21px);
			border-radius: 5px;
			border: 1px solid color-mix(in srgb, var(--text) 11%, transparent);
			background: var(--fill);	/*- color-mix(in srgb, var(--fill) 92%, black);-*/
			color: var(--text);
			cursor: pointer;
			/* box-sizing: border-box; */
			font-size: calc(var(--px-font-size) * 1.25);
			text-align: center;
		}

		.popup-btn:hover{
			background: color-mix(in srgb, var(--fill) 86%, var(--text)); 
		}


/* workspace-main */

	.workspace__main {		/* class used here, not id, since font-width logic with hidden dom-elements use this class too */
		--fill-header-section-text-fill: color-mix(in srgb, var(--text) 40%, transparent);
		--fill-header-chapter-text-fill: color-mix(in srgb, var(--text) 60%, transparent);

		flex: 1 1 auto;
		overflow: auto;
		line-height: var(--px-line-height-svg);		/* probably not used - but for completeness */
		font-size: var(--px-font-size-svg);
		font-family: var(--fontfamily);
		font-weight: var(--bold);
		background: var(--fill);
		fill: var(--text);
	}


	/* workspace-panel */
	#workspace-panel	{position: relative; flex: 0 0 auto; height: 0px; /* NB: height 0px is part of making the toolbar float, while maintaining the structure (could be setting at some point) */ }






/*** svg#stage (svg from here) ***/

	svg#stage {display: block;  user-select: none; }

	/* header */
	.header							{}

	.header__rect					{fill: transparent; stroke-width: 0; }
	.header__rect:hover				{fill: color-mix(in srgb, var(--fill) 30%, #eee); } 
	.header__text					{pointer-events: none; dominant-baseline: middle; }

	.header__rect--section			{y: 0; height: calc(var(--px-line-height-svg) * 1.5); }
	.header__text--section			{transform: translate(5px, calc(var(--px-line-height-svg) * 1.0)); fill: var(--fill-header-section-text-fill); font-size: calc(var(--px-font-size-svg) * 1.5); font-weight: var(--bold); }

	.header__rect--chapter			{y: calc(var(--px-line-height-svg) * 1.5); height: var(--px-line-height-svg); }
	.header__text--chapter			{transform: translate(5px, calc(var(--px-line-height-svg) * 2)); fill: var(--fill-header-chapter-text-fill); font-size: calc(var(--px-font-size-svg) * 1.00); font-weight: var(--bold); }

	/* chapter */
	.chapter__rect					{stroke: var(--fill-chapter-rect-stroke); stroke-width: 1; }
	.chapter__rect--section-odd  	{fill: var(--fill-section-odd-chapter-rect-fill); }
	.chapter__rect--section-even 	{fill: var(--fill-section-even-chapter-rect-fill); }

	/* tagblock */
	.tagblocks			{}

					.tagblock			{--fill: Canvas; transition: transform var(--ms-transition) ease-out, opacity var(--ms-transition-quick) ease-out; }
	.chart-viewb	.tagblock			{transform: translate(0px, var(--yb)) }
	.chart-viewa	.tagblock			{transform: translate(0px, var(--ya)) }
					.tagblock--inactive	{opacity: 0.33; }

	/* tagblock - bg rect */
											.tagblock__bg-rect {fill: color-mix(in srgb, var(--fill) 5%, transparent); vector-effect: non-scaling-stroke; pointer-events: none; transition: opacity var(--ms-transition) ease-out, height var(--ms-transition) ease-out }
	.chart-viewa       						.tagblock__bg-rect {height: 0px; opacity: 0; pointer-events: none; /* needed since pointer-events are still active in the not-scaled area. this is an error in the browser-engine */ }
	.chart-viewb  		.tagblock--active   .tagblock__bg-rect {height: calc((var(--px-line-height-svg) * var(--count-lines)) + 10px); }
	.chart-viewb  		.tagblock--inactive	.tagblock__bg-rect {height: calc((var(--px-line-height-svg) * 1) + 10px); }
						.tagblock.is-hover	.tagblock__bg-rect {fill: color-mix(in srgb, var(--fill) 10%, #fff3); stroke: #77777730; }

	/* part */
	.tagblock__parts	{}
										.tagblock__part, 
										.tb-part 	{transition: var(--ms-transition) ease-out; } 
	.chart-viewa						.tb-part 	{transform: translate(var(--x), var(--ya)) }
	.chart-viewb						.tb-part 	{transform: translate(var(--x), var(--yb)) }
	.chart-viewb	.tagblock--inactive	.tb-part 	{transform: translate(var(--x), 5px); }

					.tb-part__rect	{opacity: var(--rect-opacity); fill: color-mix(in srgb, var(--fill) 30%, var(--fill-part-rect-fill-mix)); stroke: var(--fill-part-rect-stroke); stroke-width: 1; rx: 4px; /* filter: drop-shadow(3px 4px 6px var(--fill-tagblock-part-rect-drop-shadow));*/ }
	.chart-viewa 	.tb-part__rect	{height: var(--px-line-height-svg); transform: scaleY(var(--count-lines-svg)); transition: transform var(--ms-transition) ease-out; vector-effect: non-scaling-stroke; }
	.chart-viewb 	.tb-part__rect	{height: var(--px-line-height-svg); /*?transition: transform var(--ms-transition) ease-out;*/ vector-effect: non-scaling-stroke; }

					.tb-part__text						{font-size: var(--px-font-size-svg);  pointer-events: none; transform: scaleY(1); opacity: 1; transition: transform var(--ms-transition) ease-out, opacity var(--ms-transition) ease-out; }
					.tb-part__text--chart-viewa tspan	{dominant-baseline: middle; fill: var(--text); font-weight: var(--bold); }
					.tb-part__text--chart-viewb			{dominant-baseline: middle; fill: var(--text); font-weight: var(--bold); } 

	.chart-viewa	.tb-part__text--chart-viewb	{transform: scaleY(0); opacity: 0; }
	.chart-viewb	.tb-part__text--chart-viewa	{transform: scaleY(0); opacity: 0; }

	.chart-viewa	.tb-part--special	.line1 {font-size: 75%; fill: #777; }
	.chart-viewa	.tb-part--special	.line2 {font-size: 150%; }

					.tb-part__symbol	{text-anchor: end; transition: var(--ms-transition) ease-out; }
	.chart-viewa	.tb-part__symbol	{transform: translate(var(--x), var(--y));  					font-size: calc(var(--px-line-height-svg) * 1.5);	dominant-baseline: auto;  }
	.chart-viewb	.tb-part__symbol	{transform: translate(10px, calc(var(--px-line-height-svg) * 0.5)); font-size: calc(var(--px-line-height-svg) * 1.0); 	dominant-baseline: central; }

	/* hover tagblock--active */
	.chart-viewa	.tagblock--active.is-hover .tb-part {/* transform: translate(calc(var(--x) - 8px), calc(var(--ya) - 4px)) scale(1.127); */ }
					.tagblock--active.is-hover .tb-part__rect	{fill: color-mix(in srgb, var(--fill) 20%, var(--fill-part-rect-fill-mix)); stroke: #333; stroke-width: 1.5; }

					.tagblock--active.is-hover .tagblock-circle,
					.tagblock--active.is-hover .tagblock-polyline {stroke-width: 2px !important; }

	/* hover tb-part */
					.tagblock--active 	.tb-part.is-hover 	.tb-part__rect {fill: color-mix(in srgb, var(--fill) 5%, #fff) !important; }

	/* hover circle */
					.tagblock--active 	.tagblock-circle.is-hover 			{fill: color-mix(in srgb, var(--fill) 10%, #fff) !important; r: 12px;}

	/* graphs */
											.tagblock-graphs 	{opacity: 1;	transition: opacity var(--ms-transition-quick) ease-out; }
	.chart-viewa	.tagblock--inactive		.tagblock-graphs 	{opacity: 0.4;	pointer-events: none; }
	.chart-viewb	.tagblock--inactive		.tagblock-graphs 	{opacity: 0;	pointer-events: none; }

	.tagblock-polyline		{fill: none; stroke: color-mix(in srgb, var(--fill) 70%, #000); stroke-width: 1.25; /* filter: url(#glow); */ pointer-events: none; }
	.tagblock-circle 		{fill: color-mix(in srgb, var(--fill) 25%, #fff); stroke: color-mix(in srgb, var(--fill) 70%, #000); stroke-width: 1.5; /* filter: url(#glow); */ }
	
	.tagblock-circle-text 			{opacity: 0; transform: translate(16px, 1px); pointer-events: none;  dominant-baseline: middle; }
	.tagblock-circle-text.is-hover 	{opacity: 1; }

	/* .tagblock--inactive		.graph	{opacity: 0.5; pointer-events: none; } */

	.tagblock-circle		{transition: r var(--ms-transition) ease-out, opacity var(--ms-transition-quick) ease-out; }
	.tagblock-circle-text	{transition: opacity var(--ms-transition-quick) ease-out; }

	</style>

	<style>


	/* css for popup */
	:root {
		color-scheme: light dark;
		--bg: var(--fill);
		--fg: var(--text);
		--border: color-mix(in srgb, var(--text) 14%, transparent);
		--popup-bg: color-mix(in srgb, var(--fill) 92%, black);
		--shadow: 0 18px 50px rgba(0,0,0,.25);
		--btn-bg: color-mix(in srgb, var(--fill) 92%, black);
		--btn-hover: color-mix(in srgb, var(--fill) 86%, black);
		--radius: 14px;
		--focus: color-mix(in srgb, Highlight 55%, transparent);
	}
	:root.theme-light {color-scheme: light; }
	:root.theme-dark { color-scheme: dark;  }

	button.btn, button.pill, button.tablist__btn, button.close__btn, button.unpin__btn {font-family: var(--fontfamily); font-size: var(--px-font-size); font-weight: var(--bold); }
	
	.popup-overlay {position: fixed; inset:0; background: rgba(0,0,0,.28); display:flex; align-items:center; justify-content:center; padding:18px; z-index: 10; overscroll-behavior: contain; touch-action: none; }
	
	.popup {width: min(780px, 100%); height: 55vh; max-height: min(78vh, 760px); background: var(--popup-bg); border:1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; display:flex; flex-direction: column; touch-action: auto; }
	
	.popup__panel {display:flex; align-items:center; justify-content: space-between; gap: 10px; padding: 10px 12px; border-bottom:1px solid var(--border); }
	.popup__title {font-weight:650; letter-spacing:.2px; white-space: nowrap; }
	.close__btn {opacity: 0.5; /*border:1px solid var(--border);*/ border: none; background: transparent; color: var(--fg); border-radius: 10px; padding: 6px 10px; cursor:pointer; flex: 0 0 auto; }
	.close__btn:hover {opacity: 1; }
	/*.close__btn:hover {background: color-mix(in srgb, var(--text) 7%, transparent); }*/

	
	.popup__tablist {/*-margin-left: auto;-*/ display:flex; /*border:1px solid var(--border);*/ /*-border-radius: 999px;-*/ overflow: hidden; background: color-mix(in srgb, var(--text) 6%, transparent); }
	.tablist__btn {border:0; background: transparent; color: var(--fg); padding: 7px 12px; cursor:pointer; user-select:none; -webkit-user-select:none; display:flex; gap:8px; align-items:center; font-weight: 600; }
	/*.tablist__btn:hover {background: color-mix(in srgb, var(--text) 8%, transparent); }*/
	.tablist__btn-selected {/*background: color-mix(in srgb, Highlight 18%, transparent);*/ /* box-shadow: inset 0 0 0 1px color-mix(in srgb, Highlight 45%, transparent);*/ }
	
.tablist__btn:hover:not(.tablist__btn-selected),
.close__btn:hover {
	background: color-mix(in srgb, var(--text) 4%, transparent);
}

	.popup__main {padding: 14px; overflow: auto; min-height: 0; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; touch-action: pan-y; }

	.main__content {display: grid; gap: 14px; }
	
	.kbd {font-size: 12px; border: 1px solid var(--border); border-bottom-width: 2px; padding: 1px 6px; border-radius: 8px; opacity: .85; white-space: nowrap; }
	.kbd.is-label {pointer-events:none; 	display: inline-block; justify-self: start; width: fit-content; }
	
	.content__section {border:1px solid var(--border); /*-border-radius: 12px;-*/ overflow:hidden; background: color-mix(in srgb, var(--text) 5%, transparent); }
	/*-.section__head {padding: 10px 12px; font-weight: 600; display:flex; align-items:center; justify-content: space-between; border-bottom: 1px solid var(--border); } */
	.section__body {padding: 10px 12px; display:grid; gap: 10px; }
	.hint {opacity:.5; font-size: 11px; font-weight: 400; padding-left: 6px; }
	
	.pillbar {display:flex; gap: 8px; flex-wrap: wrap; }
	.pill {border: 1px solid var(--border); background: transparent; color: var(--fg); border-radius: 999px; padding: 7px 10px; cursor:pointer; user-select:none; -webkit-user-select:none; display:inline-flex; align-items:center; gap:8px; }
	.pill:hover 	 {background: color-mix(in srgb, var(--text) 7%, transparent); }
	.pill-selected 	 {border-color: color-mix(in srgb, Highlight 55%, var(--border)); background: color-mix(in srgb, Highlight 18%, transparent); }
	
	.body__item {display:grid; grid-template-columns: 4rem 1fr auto; align-items:center; column-gap: 12px; border: 1px solid var(--border); background: var(--btn-bg); border-radius: 12px; padding: 10px 12px; cursor: pointer; user-select:none; -webkit-user-select:none; touch-action: none; }
	.body__item:hover {background: var(--btn-hover); }
	.item__meta {display:grid; gap:2px; min-width:0; }
	.item__name {font-weight:600; white-space:nowrap; overflow:hidden; text-overflow: ellipsis; }
	.item__desc {opacity:.72; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow: ellipsis; }
	.item__right {display:inline-flex; align-items:center; gap:10px; justify-self:end; }

	.body__itemP {}
	/*-.item__header {display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px;}-*/
	.header__title {font-weight: 600;}

	.switch {width:44px; height:26px; border-radius: 999px; border:1px solid var(--border); background: color-mix(in srgb, var(--text) 10%, transparent); position: relative; cursor:pointer; }
	.switch::after {content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius: 999px; background: var(--bg); border:1px solid var(--border); transition: transform 120ms ease; }

	.toggle-on .switch {background: color-mix(in srgb, Highlight 35%, transparent); border-color: color-mix(in srgb, Highlight 55%, var(--border)); }
	.toggle-on .switch::after {transform: translateX(18px); }
	.switch:focus-visible {outline: 2px solid var(--focus); outline-offset: 2px; }
	
	.draggable-list.is-reordering .body__item:hover {background: var(--btn-bg); }
	
	.unpin__btn {border:1px solid var(--border); background: transparent; color: var(--fg); border-radius: 10px; padding: 6px 8px; cursor:pointer; }
	.unpin__btn:hover {background: color-mix(in srgb, var(--text) 7%, transparent); }
	
	.body__item.is-active {border-color: color-mix(in srgb, Highlight 45%, var(--border)); background: color-mix(in srgb, Highlight 12%, var(--btn-bg)); box-shadow: inset 4px 0 0 0 Highlight; }
	/*-.body__item.is-active .item__name {font-weight:700; }-*/
	.body__item.is-dragging {opacity: 0; }
	
	.ghost {position: fixed; left:0; top:0; z-index: 9999; pointer-events: none; border: 1px solid color-mix(in srgb, Highlight 50%, var(--border)); background: color-mix(in srgb, Highlight 14%, var(--btn-bg)); border-radius: 12px; box-shadow: 0 12px 28px rgba(0,0,0,.28); padding: 10px 10px; }

	.content__actions {display:flex; gap:5px; flex-wrap: wrap; }
	.btn {border: 1px solid var(--border); background: var(--btn-bg); color: var(--fg); border-radius: 12px; padding: 10px 12px; cursor:pointer; user-select:none; -webkit-user-select:none; display:inline-flex; align-items:center; gap:10px; }

//:::📙 const CUtil
const CUtil = {

	//:::	🔹 roundN
	roundN(x, n = 2) {
		const f = 10 ** n;
		return Math.round((x + Number.EPSILON) * f) / f;
	},

	//:::	🔹 clamp
	clamp(v, lo, hi) {
		return Math.min(Math.max(v, lo), hi);
	},

	//:::	🔹 fnPrevNextValue
	fnPrevNextValue(arr, valCurrent, iOffset, fallback = valCurrent) {
		const idx = arr.indexOf(valCurrent);
		if (idx === -1) return fallback;

		const idxNew = CUtil.clamp(idx + iOffset, 0, arr.length - 1);
		return arr[idxNew];
	},

	//:::	🔹 getArgsKeys
	getArgsKeys2(args) {
		return '(' + Object.keys(args).filter(k => k !== 'caller').join(', ') + ')';
	},

	getArgsKeys(args) {
		const {type, caller, ...arrArgs } = args;				// filter out 'caller' from args
		return `(${Object.keys(arrArgs).join(', ')})`;	// build string with keys of all args (except 'caller' that was just removed)
	},	

	//:::	🔹 logGroup
	logGroup(module, fn, args = '', extra = '') {
		const styleLogFn = fn.startsWith("'") ? LOG_FUNCTION + LOG_RED : LOG_FUNCTION;
		return [`%c ${module} %c ${fn} %c ${args} %c ${extra}`, LOG_MODULE, styleLogFn, LOG_ARGS, LOG_EXTRA];
	},
}

	//:::	🔹 onFileChangedEvent

		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'onFileChangedEvent', '(payload: ' + args.payload + ')', args.caller));
		if (LOGARGS) console.log(args);

		const msBufferToPreventOpen = 400;
		const msTimestampFileChanged = Date.now();
		const msSinceWriteFileContent = msTimestampFileChanged - CWrapper.msTimestampWriteFileContent;
		const changedPath = args.payload;
		const isFileShouldReload = (changedPath === CModel.appstate.pathFileLoaded) && (msSinceWriteFileContent > msBufferToPreventOpen);
		if (!LOGARGS) console.log('# # # # # # Reload: ' + (isFileShouldReload ? 'YES: ' : 'NO: ') + msSinceWriteFileContent + ' ms)');	// jk: test and fix
		
		if (isFileShouldReload) {
			
			// debounce and add a small delay (helps with atomic saves: replace-then-write)
			if (CWrapper.reloadTimer) clearTimeout(CWrapper.reloadTimer);

			CWrapper.reloadTimer = setTimeout(async () => {
				if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'reloadTimer -> setTimeout finished', '(call: await App.dispatch: model.docdata.load.execute)', ''));
				let res = {status: STATUS.OK, info: 'not set'};

				try {
					//:		→ App: dispatch:					model.docdata.load
					res = await App.dispatch({type: 'model.docdata.load.execute', source: SOURCE.FILEPATH, pathFileToLoad: CModel.appstate.pathFileLoaded, caller: 'window.__TAURI__.event.listen(file-changed)'});
				}
				catch (err) {
					res = {status: STATUS.ERROR, code: CODE.ERROR_FILE_READ, err: String(err)};
				}

				await CFramework.handleResult(res);
				if (LOGGING) console.groupEnd();
			}, 100);
		}
		if (LOGGING) console.groupEnd();

	//:::	🔹 showPromptDialog
	async showPromptDialog(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'showPromptDialog', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		// type: 'ask/confirm'
		// kind: 'info/warning/error'
		const {type, kind, message, title, okLabel, cancelLabel} = args;

		//: 		→ window.__TAURI__.dialog:			ask
		//: 		→ window.__TAURI__.dialog:			confirm
		const res = (type === 'ask') ?
			await window.__TAURI__.dialog.ask(message, {title, kind, okLabel, cancelLabel}) : 
			await window.__TAURI__.dialog.confirm(message, {title, kind, okLabel, cancelLabel});

		const resPrompt = {
			status: res === true ? STATUS.OK : STATUS.CANCEL,
		};

		if (LOGGING) console.groupEnd();
		return resPrompt;
	},

	//:::	🔹 loadFileText
	async loadFileText(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'loadFileText', '(pathFileToLoad: ' + args.pathFileToLoad + ')', args.caller));
		if (LOGARGS) console.log(args);

		/*+if (STANDALONE) {
			if (LOGGING) console.groupEnd();
			return {text: TEXT_STANDALONE, err: null};
		}*/
		
		// retry a couple of times to survive 'atomic save' moments where the file is briefly unavailable (common in editors)
		let lastErr = null;
		for (let attempt = 0; attempt < 3; attempt++) {
			try {
				//: 		→ window.__TAURI__.fs:			readTextFile
				const text = await window.__TAURI__.fs.readTextFile(args.pathFileToLoad);
				
				if (LOGGING) console.groupEnd();
				return {status: STATUS.OK, err: null, text};
			}
			catch (err) {
				lastErr = err;
				await new Promise((r) => setTimeout(r, 60));
			}
		}

		if (LOGGING) console.groupEnd();
		return {status: STATUS.ERROR, code: CODE.ERROR_FILE_SCOPE, err: lastErr};
	},

	//:::	🔹 saveFileText
	async saveFileText(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'saveFileText', '(text: [see args], pathFileToSave: ' + args.pathFileToSave + ')', args.caller));
		if (LOGARGS) console.log(args);
		
		try {
			//: 		→ window.__TAURI__.fs:			writeTextFile
			await window.__TAURI__.fs.writeTextFile(args.pathFileToSave, args.text);

			CWrapper.msTimestampWriteFileContent = Date.now();
			if (LOGGING) console.groupEnd();
			return {status: STATUS.OK, err: null};
		}
		catch (err) {
			if (LOGGING) console.groupEnd();
			return {status: STATUS.ERROR, code: CODE.ERROR_FILE_WRITE, pathFileToSave: args.pathFileToSave, err};
		}
	},

	//:::	🔹 set_menu_checks(args)
	set_menu_checks: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'set_menu_checks', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		//: 		→ window.__TAURI__.core.invoke:	set_menu_checks
		await window.__TAURI__.core.invoke('set_menu_checks', {updates: args.arrUpdate});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setWindowTitle(args)
	setWindowTitle: async (args) => {	
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'setWindowTitle', `(title: ${args.title})`, args.caller));
		if (LOGARGS) console.log(args);
		
		//: 		→  window.__TAURI__.window:		setTitle
		await window.__TAURI__.window.getCurrentWindow().setTitle(args.title);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 startWatchFile(args)
	startWatchFile: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'startWatchFile', CUtil.getArgsKeys(args), args.caller));
		
		// start watcher (Rust) — single watcher slot in Rust will replace any previous watcher
		//: 		→ window.__TAURI__.core.invoke:	start_watch_file
		await window.__TAURI__.core.invoke('start_watch_file', {path: args.pathFileToWatch});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 stopWatchFile()
	stopWatchFile: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CWrapper', 'stopWatchFile', CUtil.getArgsKeys(args), args.caller));
		
		// start watcher (Rust) — single watcher slot in Rust will replace any previous watcher
		//: 		→ window.__TAURI__.core.invoke:	stop_watch_file
		await window.__TAURI__.core.invoke('stop_watch_file');
		if (LOGGING) console.groupEnd();

//:::
//:::📙 const CFramework
const CFramework = {
	elApp: null,
	elSplitter: null,
	dragging: false,
	startCoord: 0,
	startSize: 0,
	mql: null,

	//:::	🔹 init
	init(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'init', CUtil.getArgsKeys(args), args.caller));

		this.elApp = document.querySelector('#app');
		this.elSplitter = document.querySelector('#splitter');

		document.querySelector('#btn-popup').addEventListener('click', async (e) => {
			e.preventDefault();
			 await App.dispatch({type: 'popup.settings.open', caller: 'btn-popup'});
		});

		window.addEventListener('keydown', e => {this.onKeydown({e, caller: 'window.addEventListener(keydown)'})}, {capture: true});
		window.addEventListener('resize', e => this.onWindowResize({e, caller: 'window.addEventListener(resize)'}));

		// splitter drag
		this.elSplitter.addEventListener('mousedown', e => this.onSplitterMousedown({e, caller: 'elSplitter.addEventListener(mousedown)'}));
		window.addEventListener('mousemove', e => this.onSplitterMousemove({e, caller: 'elSplitter.addEventListener(mousemove)'}));
		window.addEventListener('mouseup', () => this.onSplitterMouseup({caller: 'elSplitter.addEventListener(mouseup)'}));

		this.mql = window.matchMedia('(prefers-color-scheme: dark)');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMousedown
	onSplitterMousedown(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onSplitterMousedown', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		this.dragging = true;
		const isVert = this.elApp.classList.contains('sidebar-layout-top') || this.elApp.classList.contains('sidebar-layout-bottom');
		const point = args.e.touches ? args.e.touches[0] : args.e;

		this.startCoord = isVert ? point.clientY : point.clientX;

		this.startSize = parseFloat(
			getComputedStyle(document.documentElement).getPropertyValue('--px-sidebar-size')
		) || 340;

		document.body.classList.add('no-select');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMousemove
	onSplitterMousemove(args) {
		if (!this.dragging) return;
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onSplitterMousemove', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		const isVert = this.elApp.classList.contains('sidebar-layout-top') || this.elApp.classList.contains('sidebar-layout-bottom');
		const point = args.e.touches ? args.e.touches[0] : args.e;
		const pos = isVert ? point.clientY : point.clientX;
		let delta = pos - this.startCoord;

		if (this.elApp.classList.contains('sidebar-layout-right') || this.elApp.classList.contains('sidebar-layout-bottom')) {
			delta = -delta;
		}

		const newSize = CUtil.clamp(this.startSize + delta, 160, window.innerWidth * 0.8);

		document.documentElement.style.setProperty('--px-sidebar-size', newSize + 'px');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMouseup
	onSplitterMouseup(args) {
		if (!this.dragging) return;
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onSplitterMouseup', CUtil.getArgsKeys(args), args.caller));
		
		this.dragging = false;
		document.body.classList.remove('no-select');
		if (LOGGING) console.groupEnd();
	},

		//:::	🔹 handleResult
	async handleResult(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'handleResult', CUtil.getArgsKeys(args), args.caller));
		if (!LOGARGS) console.log(args);

		if ( (args.status === STATUS.OK) || (args.status === STATUS.CANCEL) ) {
			if (LOGGING) console.groupEnd();
			return;
		}


		const TYPE_DIALOG = {NONE: 'NONE', MBOX: 'MBOX', PROMPT: 'PROMPT'};

		let logentry = {
			version: '0.1.0',
			status: args.status,
			code: args.code,
			err: args.err,
			timestamp: new Date().toISOString(),
			caller: args.caller,
		}

		if (args.code === CODE.ERROR_FILE_SCOPE) {
			Object.assign(logentry, {
				title: 'File access lost',
				message: 'The app could not read the file.',
				suggestion: 'Try opening the file again to restore access.',
				typeDialogShow: TYPE_DIALOG.MBOX,
				labelOK: 'OK'
			});
		}
		else if (args.code === CODE.ERROR_FILE_WRITE) {
			Object.assign(logentry, {
				title: 'File write error',
				message: 'The app could not write the file.',
				suggestion: 'Try saving the file again - maybe in another folder.',
				typeDialogShow: TYPE_DIALOG.MBOX,
				labelOK: 'OK'
			});
		}
		else if (args.code === CODE.FILE_PATH_NOTSET) {		// nb: don't save warnings to error-log! but *maybe* show info somewhere, that doc isn't saved?
			Object.assign(logentry, {
				title: 'File path not set',
				message: 'No path was specified.',
				suggestion: 'nb: this should not be shown in mbox, as this is expected flow (user edits New file, etc....)',
				typeDialogShow: TYPE_DIALOG.MBOX,
				labelOK: 'OK'
			});
		}

		console.log('logentry', logentry, logentry.err);

		CModel.updateLogstate({logentry, caller: 'CFramework.handleResult'});


		
		if (logentry.typeDialogShow === TYPE_DIALOG.MBOX) {

			await CWrapper.showMessageDialog({
				title: logentry.title,
				message: logentry.message + '\n\n' + logentry.suggestion,
				kind: logentry.status === STATUS.ERROR ? 'error' : STATUS.WARNING ? 'warning' : 'info',
				okLabel: logentry.labelOK,
			});
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setTheme
	setTheme(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'setTheme', `(mode: ${args.mode})`, args.caller));
		if (LOGARGS) console.log(args);

		//:		→ this: applyThemeClass
		this.applyThemeClass({mode: args.mode, caller: 'CFramework.setTheme'});
		
		// listen for OS changes only in system mode
		if (args.mode === 'system') {
			this.mql.onchange = () => this.applyThemeClass({mode: 'system', caller: 'CFramework.setTheme'});
		}
		
		else {
			this.mql.onchange = null;
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	applyThemeClass
	applyThemeClass(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'applyThemeClass', `(mode: ${args.mode})`, args.caller));
		if (LOGARGS) console.log('args, mql', args, this.mql);		

		const root = document.documentElement;

		root.classList.remove('theme-light', 'theme-dark');
		
		if (args.mode === 'light')
			root.classList.add('theme-light');

		else if (args.mode === 'dark')
			root.classList.add('theme-dark');

		else if (args.mode === 'system') {
			root.classList.add(this.mql.matches === true ? 'theme-dark' : 'theme-light');
		}
		if (LOGGING) console.groupEnd();
	},	

	//:::	🔹 setAppUiClasses
	setAppUiClasses(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'setAppUiClasses', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		this.elApp.classList.toggle('sidebar-visible-yes', args.appstate.isSidebarVisible === true);
		this.elApp.classList.toggle('sidebar-visible-no',  args.appstate.isSidebarVisible === false);
		
		this.elApp.classList.toggle('toolbar-visible-yes', args.appstate.isToolbarVisible === true);
		this.elApp.classList.toggle('toolbar-visible-no',  args.appstate.isToolbarVisible === false);
		
		this.elApp.classList.remove(...['sidebar-layout-left', 'sidebar-layout-right', 'sidebar-layout-top', 'sidebar-layout-bottom']);
		this.elApp.classList.add(args.appstate.idSidebarPosition);
		
		this.elApp.classList.toggle('chart-viewa', args.appstate.idxView === VIEWA);
		this.elApp.classList.toggle('chart-viewb', args.appstate.idxView === VIEWB);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setCustomCss
	setCustomCss(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'setCustomCss', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		// strip #def Lines
  		const textContent = args.txtCustomCss.replace(/^\s*#def\s*\{[^}]*\}\s*;?\s*$/gmi, '').trim();

		// set custom css
		const elStyleSettings = document.querySelector(`#${args.idElStyle}`);
		elStyleSettings.textContent = textContent;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 updateLookupConstants
	updateLookupConstants(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'updateLookupConstants', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		const px_ui_base_unit = 15;
		const ui_font_size_factor = 1.0;		// nb: do not control from user css! user can zoom to wished size using Cmd + +/-

		F_ZOOM_SVG			= args.fZoom ?? F_ZOOM_SVG;
		F_LINE_HEIGHT_SVG	= args.fLineheightFromCss ?? F_LINE_HEIGHT_SVG;
		PX_COL_WIDTH_SVG	= args.pxColWidth ?? PX_COL_WIDTH_SVG;
		COUNT_LINES_SVG 	= args.linecount ?? COUNT_LINES_SVG;

		PX_LINE_HEIGHT_SVG 	= Math.round(px_ui_base_unit * F_LINE_HEIGHT_SVG * F_ZOOM_SVG);
		PX_FONT_SIZE_SVG 	= Math.round(px_ui_base_unit * ui_font_size_factor * F_ZOOM_SVG);
		PX_HEADER_HEIGHT_SVG = Math.round(PX_LINE_HEIGHT_SVG * 2.5);									// jk: make constant or rule for '2.5'
		if (LOGARGS) console.log({F_ZOOM_SVG, PX_COL_WIDTH_SVG, COUNT_LINES_SVG, F_LINE_HEIGHT_SVG,  PX_LINE_HEIGHT_SVG, PX_FONT_SIZE_SVG, PX_HEADER_HEIGHT_SVG});

		//: 		→ this: updateCssFromLookupConstants
		this.updateCssFromLookupConstants({caller: 'CFramework.updateLookupConstants'});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	updateCssFromLookupConstants
	updateCssFromLookupConstants(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'updateCssFromLookupConstants', CUtil.getArgsKeys(args), args.caller));

		const root = document.documentElement;

		root.style.setProperty('--px-line-height-svg', PX_LINE_HEIGHT_SVG.toString() + 'px');
		root.style.setProperty('--px-font-size-svg', PX_FONT_SIZE_SVG.toString() + 'px');
		root.style.setProperty('--px-header-height-svg', PX_HEADER_HEIGHT_SVG.toString() + 'px');
		root.style.setProperty('--count-lines-svg', COUNT_LINES_SVG.toString());

		// setup fonts for text measuring
		const arrProbe = [
			{name: 'section', 	elText: document.querySelector('#font-sample-section')},
			{name: 'chapter', 	elText: document.querySelector('#font-sample-chapter')},
			{name: 'part', 		elText: document.querySelector('#font-sample-part')},
			{name: 'toolbar', 	elText: document.querySelector('#font-sample-toolbar')},
		];

		for (const probe of arrProbe) {
			const style = window.getComputedStyle(probe.elText);
			const font = `${style.fontStyle} ${style.fontVariant} ${style.fontWeight} ${style.fontSize} / ${style.lineHeight} ${style.fontFamily}`;
			FONTS_SIZE_REF[probe.name] = font;
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 measurePartTextWidth2
	measurePartTextWidth2 (args) {
		if (LOGGING) console.log(...CUtil.logGroup('CFramework', 'measurePartTextWidth2', CUtil.getArgsKeys(args), args.caller));
		
		CTX_FOR_TEXT_MEASURE.font = args.fontForMeasuring;
		return CTX_FOR_TEXT_MEASURE.measureText(args.text).width;
	},

	//:::	🔹 onKeydown
	onKeydown: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onKeydown', `(e.key: ${args.e.key})`, args.caller));
		if (LOGARGS) console.log(args);

		const caller = 'CFramework.onKeydown';
		const e = args.e;
		const ua = navigator.userAgent.toUpperCase();
		const isMac = ua.includes('MAC');
		const isWindows = ua.includes('WINDOWS');
		const isLinux = ua.includes('LINUX');

		const isMetaKey = isMac ? e.metaKey : e.ctrlKey;
		const isAltKey = e.altKey;
		const isShiftKey = e.shiftKey;
		const isCtrlKey = e.ctrlKey;

		const arrNumberKey = ['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5', 'Digit6', 'Digit7', 'Digit8', 'Digit9'];

		let res = {status: STATUS.OK, info: 'not set'};

		//::		🔻 Escape
		if (CModel.appstate.isPopupOpen && e.key === 'Escape') {

			//:			→ App: dispatch:			popup.settings.close
			res = await App.dispatch({type: 'popup.settings.close', caller});
		}

		//::		🔻 Cmd + Shift + E
		else if (e.key.toLowerCase() === 'e' && isMetaKey && isShiftKey) {
			if (e.preventDefault) e.preventDefault();

			const arrSidebarPosition = ['sidebar-layout-left', 'sidebar-layout-right', 'sidebar-layout-top', 'sidebar-layout-bottom'];
			const idxSidebarPosition = arrSidebarPosition.indexOf(CModel.appstate.idSidebarPosition);
			const idxSidebarPositionNew = (idxSidebarPosition + 1) % 4;
			const idSidebarLayoutNew = arrSidebarPosition[idxSidebarPositionNew];

			//:			→ App: dispatch:			framework.sidebar.layout.set (cycle thru 4 options)
			res = await App.dispatch({type: 'framework.sidebar.layout.set', idSidebarLayout: idSidebarLayoutNew, caller});
		}

		//::		🔻 Cmd + Shift + 1 - 9
		else if (isMetaKey && isShiftKey && arrNumberKey.includes(e.code)) {		// NB: using e.code instead of e.key
			if (e.preventDefault) e.preventDefault();
			const idx = Number(e.code.replace('Digit', '')) - 1;
			const pathFilePinned = CModel.appstate.arrPathFilePinned[idx];

			if (pathFilePinned) {
				//:			→ App: dispatch:			model.docdata.load (pinned path)
				res = await App.dispatch({type: 'model.docdata.load', source: SOURCE.FILEPATH, pathFileToLoad: pathFilePinned, caller});
			}
		}

		//::		🔻 Ctrl + Tab, Ctrl + Shift + Tab
		else if (isCtrlKey && e.key === 'Tab') {
			if (e.preventDefault) e.preventDefault();

								function getNextPinnedPath(arr, currentPath, direction) {
									if (!Array.isArray(arr) || arr.length === 0) return null;

									const idx = arr.indexOf(currentPath);

									// If current file is not pinned → choose entry based on direction
									if (idx === -1) return direction < 0 ? arr[arr.length - 1] : arr[0];

									const len = arr.length;
									const nextIdx = (idx + direction + len) % len;

									return arr[nextIdx];
								}

			const pathFilePinned = getNextPinnedPath(CModel.appstate.arrPathFilePinned, CModel.appstate.pathFileLoaded, isShiftKey ? -1 : 1);

			if (pathFilePinned) {
				//:			→ App: dispatch:			model.docdata.load (next/prev tabbed pinned path)
				res = await App.dispatch({type: 'model.docdata.load', source: SOURCE.FILEPATH, pathFileToLoad: pathFilePinned, caller});
			}
		}

		//::		🔻 Cmd + '+', Cmd + '-', Cmd + 0
		else if ((isMetaKey || isAltKey) && (e.key === '+' || e.key === '-' || e.key === '_' || e.key === '=' || e.key === '0' || e.key === '±' || e.key === '–' || e.code === 'NumpadAdd' || e.code === 'NumpadSubtract' || e.code === 'Numpad0')) {
			if (e.preventDefault) e.preventDefault();

			const typeZoom = (isMetaKey && isAltKey) ? ZOOM_LINECOUNT : isAltKey ? ZOOM_HORIZONTAL : ZOOM_ALL;
			const isReset = (e.key === '0' || e.code === 'Numpad0');
			const isIn = (e.key === '+' || e.key === '=' || e.key === '±' || e.code === 'NumpadAdd');
			const isOut = !(isReset || isIn);

			//:			→ App: dispatch:			chart.zoom ('all', 'width', 'lines')
			res = await App.dispatch({type: 'chart.zoom', typeZoom, isIn, isOut, isReset, caller});
		}

		//::		🔻 Cmd/Alt + 1 - 9
		else if ((isMetaKey || isAltKey) && !e.shiftKey && arrNumberKey.includes(e.code)) {		// NB: using e.code instead of e.key
			if (e.preventDefault) e.preventDefault();

			const idxTagblock = arrNumberKey.indexOf(e.code);
			const tagblock = CModel.docdata.arrTagblock[idxTagblock] || null;

			if (tagblock)
				//:			→ App: dispatch:			model.tagblock.active.set
				res = await App.dispatch({type: 'model.tagblock.active.set', tagblock: tagblock, isActive: tagblock.isActive, isAltKey: isAltKey, caller});
		}

		//::		🔻 Cmd + ArrowLeft/ArrowRight
		else if (CModel.appstate.isPopupOpen && isMetaKey && ['ArrowLeft', 'ArrowRight'].includes(e.key)) {
			if (e.preventDefault) e.preventDefault();

			const idTab = CModel.appstate.idTab;

			//:			→ App: dispatch:			popup.tab.select ('files', 'ui', 'css')
			if (e.key === 'ArrowLeft' && idTab === 'ui')
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'files', caller});

			else if ((e.key === 'ArrowRight' && idTab === 'files') || (e.key === 'ArrowLeft' && idTab === 'css'))
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'ui', caller});
			
			else if ((e.key === 'ArrowRight' && idTab === 'ui') || (e.key === 'ArrowLeft' && idTab === 'status'))
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'css', caller});
			
			else if (e.key === 'ArrowRight' && idTab === 'css')
				res = await App.dispatch({type: 'popup.tab.select', idTab: 'status', caller});
		}

		//:: 			Windows 'accelerator' keys: fix for missing feature in Tauri
		else if (isWindows) {

			//::			🔻 Cmd + N
			if (isMetaKey && e.key.toLowerCase() === 'n') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'file.new', caller});
			}

			//::			🔻 Cmd + O
			else if (isMetaKey && e.key.toLowerCase() === 'o') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'file.open', caller});
			}

			//::			🔻 Cmd + Shift + S
			else if (isMetaKey && isShiftKey && e.key.toLowerCase() === 's') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'file.saveas', caller});
			}

			//::			🔻 Cmd + D
			else if (isMetaKey && e.key.toLowerCase() === 'd') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'file.pincurrent', caller});
			}

			//::			🔻 Alt + ,
			else if (isMetaKey && e.key.toLowerCase() === ',') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'file.settings', caller});
			}

			//::			🔻 Alt + F4
			else if (isAltKey && e.key === 'F4') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'file.exit', caller});
			}

			//::			🔻 Cmd + E
			else if (isMetaKey && e.key.toLowerCase() === 'e') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'view.sidebar.toggle', caller});
			}

			//::			🔻 Cmd + R
			else if (isMetaKey && e.key.toLowerCase() === 'r') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'view.toolbar.toggle', caller});
			}

			//::			🔻 F1
			else if (!isMetaKey && !isShiftKey && e.key === 'F1') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'view.chart.viewa', caller});
			}

			//::			🔻 F2
			else if (!isMetaKey && !isShiftKey && e.key === 'F2') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'view.chart.viewb', caller});
			}

			//::			🔻 Cmd + Shift + F1
			else if (isMetaKey && isShiftKey && e.key === 'F1') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'view.theme.system', caller});
			}

			//::			🔻 Cmd + Shift + F2
			else if (isMetaKey && isShiftKey && e.key === 'F2') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'view.theme.light', caller});
			}

			//::			🔻 Cmd + Shift + F3 
			else if (isMetaKey && isShiftKey && e.key === 'F3') {
				if (e.preventDefault) e.preventDefault();

				CWrapper.onMenuEvent({payload: 'view.theme.dark', caller});
			}

			return;
		}

		if (CModel.appstate.isPopupOpen)
			CPopup.renderPopup({caller});		// jk: change to App.dispatch?

		res.context = caller;
		await CFramework.handleResult(res);

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onWindowResize
	onWindowResize: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CFramework', 'onWindowResize', CUtil.getArgsKeys(args), args.caller));

		//: 		→ App: dispatch				chart.render
		await App.dispatch({type: 'chart.render', typeSvgUpdate: SVG_UPDATE_RESIZE_ONLY, caller: 'CFramework.onWindowResize'});

		if (LOGGING) console.groupEnd();
	},

};

	//:::	🔹 init
	init(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CChart', 'init', CUtil.getArgsKeys(args), args.caller));

		this.elParent = document.querySelector('#workspace-main');	

		this.elParent.addEventListener('pointerover', (e) => {CChart.onHover({e, isOn: true});});
		this.elParent.addEventListener('pointerout',  (e) => {CChart.onHover({e, isOn: false});});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 renderSvg(args)
	renderSvg(args) {				// typeSvgUpdate can be SVG_UPDATE_FULL_RENDER or SVG_UPDATE_RESIZE_ONLY
		if (LOGGING) console.group(...CUtil.logGroup('CChart', 'renderSvg', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		CChart.idxView = args.idxView;

		//: 		→ this: calculateRequiredViewboxSize
		CChart.calculateRequiredViewboxSize(args.docdata);

		if (args.typeSvgUpdate === SVG_UPDATE_FULL_RENDER) {
			//: 		→ [uhtml].render
			render(CChart.elParent, CChart.Templates.Stage(args.docdata));
		}

		else if (args.typeSvgUpdate === SVG_UPDATE_RESIZE_ONLY) {
			const elSvg = document.querySelector('#stage');
			
			elSvg.setAttribute('viewBox', `0 0 ${CChart.pxWidthViewbox} ${CChart.pxHeightViewbox}`);
			elSvg.setAttribute('width', String(CChart.pxWidthViewbox));
			elSvg.setAttribute('height', String(CChart.pxHeightViewbox));

			// set height of chapter rects
			const arrElChapterRect = elSvg.querySelectorAll('.chapter__rect');
			for (const elChapterRect of arrElChapterRect) {
				elChapterRect.setAttribute('height', String(CChart.pxHeightViewbox - PX_HEADER_HEIGHT_SVG));
			}
		}

		//: 		→ this: reflowAllTagblocks
		CChart.reflowAllTagblocks(args.docdata);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	calculateRequiredViewboxSize()
	calculateRequiredViewboxSize(docdata) {
		if (LOGGING) console.group('%c CChart %c calculateRequiredViewboxSize', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(docdata);

		let pxHeightRequired = 0;

		if (CChart.idxView === VIEWA) {
			const idxOrderInChapterMax = Math.max( ...docdata.arrTagblock.flatMap(tb => tb.arrPart.map(p => p.idxOrderInChapter)) );
			const pxPartHeight = PX_LINE_HEIGHT_SVG * COUNT_LINES_SVG;

			pxHeightRequired = PX_HEADER_HEIGHT_SVG + PX_GRAPH_VIEWA_H + PX_PADDING_NORMAL + ((pxPartHeight + PX_PADDING_NORMAL) * (idxOrderInChapterMax + 1));		// jk: what if no graphs in txt? then space set off none the less
		}
		else if (CChart.idxView === VIEWB) {
			pxHeightRequired = PX_HEADER_HEIGHT_SVG;

			for (const tagblock of docdata.arrTagblock) {
				const pxTagblockHeight = (PX_LINE_HEIGHT_SVG * (tagblock.isActive ? tagblock.countRows : 1)) + 10;		// 1.33

				pxHeightRequired += pxTagblockHeight; 
			}
		}

		// set ui values
		CChart.pxHeightSvgContainer = CChart.elParent.clientHeight;
		CChart.pxWidthViewbox = PX_MARGIN_LEFT_W + PX_MARGIN_RIGHT_W + (PX_COL_WIDTH_SVG * docdata.arrChapter.length);
		CChart.pxHeightViewbox = Math.max(pxHeightRequired, CChart.pxHeightSvgContainer, PX_VIEVBOX_MIN_H);

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	reflowAllTagblocks(docdata)
	reflowAllTagblocks(docdata) {
		if (LOGGING) console.group('%c CChart %c reflowAllTagblocks', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(docdata);

		let pxTagblockTop = PX_HEADER_HEIGHT_SVG;

		const arrElTagblock = CChart.elParent.querySelectorAll('#stage .tagblock');

		for (const [idxTagblock, tagblock] of docdata.arrTagblock.entries()) {
			const pxYb = pxTagblockTop + 'px';
			const pxTagblockHeight = (PX_LINE_HEIGHT_SVG * (tagblock.isActive ? tagblock.countRows : 1)) + 10;		// 1.33

			arrElTagblock[idxTagblock].classList.toggle('tagblock--active', tagblock.isActive);
			arrElTagblock[idxTagblock].classList.toggle('tagblock--inactive', !tagblock.isActive);
			arrElTagblock[idxTagblock].style.setProperty('--yb', pxYb);

			pxTagblockTop += pxTagblockHeight;

			//:			→ this: updateTagblockGraphs
			CChart.updateTagblockGraphs(tagblock, docdata.definitions);
		};

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹		updateTagblockGraphs(tagblock)
	updateTagblockGraphs(tagblock, definitions) {		// jk: maybe make this function 'safer'
		if (LOGGING) console.group('%c CChart %c updateTagblockGraphs %c (' + tagblock.id + ')', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(tagblock, definitions);

		function mapValuesWithFracX(arr) {
			const arrNew = [];
			let i = 0;

			while (i < arr.length) {
				const idxChapter = arr[i].idxChapter;

				// Find contiguous group with same idxChapter
				let j = i;
				while (j < arr.length && arr[j].idxChapter === idxChapter) {
					j++;
				}

				const count = j - i;

				// Map group items with fX spread across column
				for (let k = 0; k < count; k++) {
					const item = arr[i + k];
					const fracX = (k + 1) / (count + 1);

					arrNew.push({
						...item,
						fracX
					});
				}

				i = j;
			}

			return arrNew;
		}


		const elTagblock = CChart.elParent.querySelector(`#stage .tagblock.${tagblock.id}`);

		const elGroupGraphs = elTagblock.querySelector('.tagblock-graphs');
		if (!elGroupGraphs) {
			if (LOGGING) console.groupEnd();
			return;
		}

		const pxGraphHeight = (CChart.idxView === VIEWA) ? PX_GRAPH_VIEWA_H : (PX_LINE_HEIGHT_SVG * tagblock.countRows);

		Object.entries(tagblock.graphtags).forEach(([keyMeta, arrValueMeta]) => {					// loop over graph tags: 'future', 'action', etc.
		
			const graphGroup = elGroupGraphs.querySelector(`.graph.${tagblock.id}.${keyMeta}`);		// find this particular graph group: <g class="graph gitte future">
			if (!graphGroup) return;

			const polyline = graphGroup.querySelector('.tagblock-polyline');
			const circles  = graphGroup.querySelectorAll('.tagblock-circle');
			const circletexts  = graphGroup.querySelectorAll('.tagblock-circle-text');
			if (!polyline) return;

			// check if definition exists for keyMeta (eg. 'weight') - else use default range 0 - 100
			const definition = definitions[keyMeta] ?? {unit: '', min: 0, max: 100 };

			// make array of coords
			const arrCoord = [];

			const arrValueMetaMapped = mapValuesWithFracX(arrValueMeta);

			arrValueMetaMapped.forEach(({ idxChapter, value, fracX }) => {
				let pxX = PX_MARGIN_LEFT_W + (idxChapter * PX_COL_WIDTH_SVG) + (PX_COL_WIDTH_SVG * fracX);
				const pctValue = ((value - definition.min) / (definition.max - definition.min)) * 100;		// calculate percent value inside range definition
				const pxYBase = pxGraphHeight - (pxGraphHeight * (pctValue / 100));

				let pxY;
				if (CChart.idxView === VIEWA) {
					const pxGraphTop = CChart.pxHeightViewbox - (PX_HEADER_HEIGHT_SVG + PX_PADDING_NORMAL + pxGraphHeight);
					pxY = pxGraphTop + pxYBase;
				} else {
					pxY = pxYBase;
				}

				arrCoord.push({pxX, pxY});
			});

			polyline.setAttribute('points', arrCoord.map(pt => `${pt.pxX},${pt.pxY}`).join(' '));		// set polyline points
			polyline.style.display = '';

			circles.forEach((circle, idx) => {			// set circle positions
				const point = arrCoord[idx];
				circle.setAttribute('cx', point.pxX);
				circle.setAttribute('cy', point.pxY);
				circle.style.display = '';

				circletexts[idx].setAttribute('x', point.pxX);	// jk: could be 'safer' here?
				circletexts[idx].setAttribute('y', point.pxY);
			});			
		});

		if (LOGGING) console.groupEnd();
	},


	//:::	🔹 getStyleFromMetadata() 				- better placement?
	getStyleFromMetadata(obj) { 
		if (!obj) return '';

		//?if (LOGGING) console.log('%c CChart %c getStyleFromMetadata', LOG_MODULE, LOG_FUNCTION);

		const arrAllowedKey = ['fill', 'text', 'bold', 'fontsize'];
		
		return Object.entries(obj)
			.filter(([, v]) => v !== null && v !== undefined && v !== '')
			.filter(([k, v]) => arrAllowedKey.includes(k)) 
			.map(([k, v]) => `--${k}: ${v};`)
			.join(' ');
	},


	//:::	🔹 splitString (*args*)
	splitString(text, pxWidthMax, fontForMeasuring) {
		const VIEWA_MAX_LINES = COUNT_LINES_SVG;
		const content = (text || '').trim();
		if (!content) return [''];
		const tokens = content.split(/\s+/);
		const lines = [];
		let index = 0;

		//?if (LOGGING) console.log('%c CChart %c splitString', LOG_MODULE, LOG_FUNCTION);

		// :		(→ ☐ measurePartTextWidth)
		const measurePartTextWidth = (text) => {
			CTX_FOR_TEXT_MEASURE.font = fontForMeasuring;
			return CTX_FOR_TEXT_MEASURE.measureText(text).width;
		};

		// :		(→ ☐ splitTokenToFit)
		const splitTokenToFit = (token, pxWidthMax) => {
			if (!token) return { fit: '', rest: '' };
			if (pxWidthMax <= 0) return { fit: '', rest: token };
			let fit = '';
			for (let i = 0; i < token.length; i++) {
				const candidate = fit + token[i];
				if (measurePartTextWidth(candidate) <= pxWidthMax || fit === '') {
					fit = candidate;
				} else {
					break;
				}
			}
			if (!fit) fit = token[0] || '';
			const rest = token.slice(fit.length);
			return { fit, rest };
		};

		// :		(→ ☐ appendEllipsis)
		const appendEllipsis = (line, pxWidthMax) => {
			const ellipsis = '…';
			if (!line) return ellipsis;
			if (pxWidthMax <= 0) return ellipsis;
			let trimmed = line.replace(/\s+$/, '');
			while (trimmed && measurePartTextWidth(trimmed + ellipsis) > pxWidthMax) {
				trimmed = trimmed.slice(0, -1);
			}
			if (!trimmed) return ellipsis;
			return trimmed + ellipsis;
		};

		while (index < tokens.length && lines.length < VIEWA_MAX_LINES) {
			let line = '';
			while (index < tokens.length) {
				let token = tokens[index];
				const candidate = line ? `${line} ${token}` : token;
				if (measurePartTextWidth(candidate) <= pxWidthMax) {
					line = candidate;
					index += 1;
				}
				else {
					if (!line) {
						const { fit, rest } = splitTokenToFit(token, pxWidthMax);
						line = fit;
						if (rest) {
							tokens[index] = rest;
						} else {
							index += 1;
						}
					}
					break;
				}
			}
			if (!line && index < tokens.length) {
				line = tokens[index];
				index += 1;
			}
			lines.push(line || '');
		}

		if (index < tokens.length && lines.length) {
			lines[lines.length - 1] = appendEllipsis(lines[lines.length - 1], pxWidthMax);
		}

		return lines;
	},

	//:::	🔹 onHover(args)
	onHover: (args) => {
		if (LOGGING && DETAILS) console.group('%c CChart %c onHover %c [callback]', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(args);

		const elPartOrCircle = args.e.target.closest('[data-idxline]');
		const elTagblock = args.e.target.closest('.tagblock');

		if (elTagblock) {
			elTagblock.classList.toggle('is-hover', args.isOn);
			CToolbar.elParent.querySelector('.' + elTagblock.dataset.id).classList.toggle('is-hover', args.isOn);

			if (elPartOrCircle)
				elTagblock.querySelectorAll(`[data-idxline="${elPartOrCircle.dataset.idxline}"]`).forEach(el => el.classList.toggle('is-hover', args.isOn));
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onClick(args)
	onClick: async (args) => {
		if (LOGGING) console.group(...CUtil.logGroup('CChart', 'onClick', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		const caller = 'CChart.onClick (' + args.caller + ')';
		const e = args.e;

		const ua = navigator.userAgent.toUpperCase();
		const isMac = ua.includes('MAC');
		const isWindows = ua.includes('WINDOWS');
		const isLinux = ua.includes('LINUX');

		const isMetaKey = isMac ? e.metaKey : e.ctrlKey;
		const isAltKey = e.altKey;
		const isShiftKey = e.shiftKey;
		const isCtrlKey = e.ctrlKey;

		switch (args.src) {

			//::		🔻 section, chapter, part, graph
			case 'section':
			case 'chapter':
			case 'part':
			case 'graph':

				//: 			→ App: dispatch: 		selectLine
				if (!isMetaKey && !isAltKey)
					await App.dispatch({type: 'texteditor.line.select', idxLine: args.idxTextareaLine, isSelectWholeTextbloc: isShiftKey, caller});
				break;

			//::		🔻 tagblock
			case 'tagblock':

				//: 			→ App: dispatch:		model.tagblock.active.set	[if isMetaKey || isAltKey]
				if (isMetaKey || isAltKey)
					await App.dispatch({type: 'model.tagblock.active.set', tagblock: args.tagblock, isActive: args.tagblock.isActive, isAltKey: isAltKey, caller});
				break;
		}
		if (LOGGING) console.groupEnd();
	},
	
};

//:::📙 const CTexteditor
const CTexteditor = {
	elParent: null,
	elTextarea: null,
	value: '',

	//:::	🔹 init
	init(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CTexteditor', 'init', CUtil.getArgsKeys(args), args.caller));

		this.elParent = document.querySelector('#sidebar-main');
		this.value = '';

		const elTextarea = document.createElement('textarea');
		elTextarea.id = 'texteditorDoc';
		elTextarea.value = '';
		elTextarea.className = ['texteditor', 'texteditor-doc'].join(' ');
		elTextarea.setAttribute('spellcheck', 'false');
		elTextarea.setAttribute('autocomplete', 'off');
		elTextarea.setAttribute('autocorrect', 'off');
		elTextarea.setAttribute('autocapitalize', 'off');
		elTextarea.setAttribute('wrap', 'off');

		this.onInputDebounced = this.debounce(() => this.onInput(), 400);

		elTextarea.addEventListener('input', this.onInputDebounced);
		elTextarea.addEventListener('keydown', e => this.onKeydown(e));

		this.elTextarea = elTextarea;
		this.elParent.appendChild(this.elTextarea);

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onKeydown(e)
	onKeydown(e) {
		if (LOGGING) console.group("%c CTexteditor %c event %c onKeydown %c '" + e.key + "'", LOG_MODULE, LOG_RED, LOG_FUNCTION, LOG_ARGS);
		if (LOGARGS) console.log(e);

		//:  		☐ getLineStartPos(text, pos)
		const getLineStartPos = (text, pos) => {
			let i = pos;
			while (i > 0 && text[i - 1] !== '\n') i--;
			return i;
		};

		//:  		☐ etSelection()
		const getSelection = () => {
			const ta = this.elTextarea;
			return { start: ta.selectionStart, end: ta.selectionEnd };
		};

		//:  		☐ setSelection(start, end)
		const setSelection = (start, end) => {
			const ta = this.elTextarea;
			ta.selectionStart = start;
			ta.selectionEnd = end;
		};

		//::  		☐ getLineEndPos(start, end)
		const getLineEndPos = (text, pos) => {
			let i = pos;
			while (i < text.length && text[i] !== '\n') i++;
			return i;
		};

		const ta = this.elTextarea;
		let { start, end } = getSelection();
		const value = ta.value;

		if (e.key === 'Tab') {
			e.preventDefault();
			const tab = '\t';

			// If selection ends at start of next line, don't include that next line
			if (end > start && value[end - 1] === '\n') end -= 1;

			const sel = value.slice(start, end);
			const isMultiLine = sel.includes('\n');

			if (!e.shiftKey) {
				if (isMultiLine) {
					const blockStart = getLineStartPos(value, start);
					const blockEnd   = getLineEndPos(value, end);

					const before = value.slice(0, blockStart);
					const srcBlock = value.slice(blockStart, blockEnd);
					const indentedBlock = srcBlock.replace(/^/gm, tab);
					const after = value.slice(blockEnd);

					ta.value = before + indentedBlock + after;
					setSelection(blockStart, blockStart + indentedBlock.length);
				}
				else {
					ta.value = value.slice(0, start) + tab + value.slice(end);
					const caret = start + tab.length;
					setSelection(caret, caret);
				}
			}
			else {
				if (isMultiLine) {
					const blockStart = getLineStartPos(value, start);
					const blockEnd   = getLineEndPos(value, end);

					const before = value.slice(0, blockStart);
					const srcBlock = value.slice(blockStart, blockEnd);
					const outdentedBlock = srcBlock.replace(/^(\t| {1,4})/gm, '');
					const after = value.slice(blockEnd);

					ta.value = before + outdentedBlock + after;
					setSelection(blockStart, blockStart + outdentedBlock.length);
				}
				else {
					const lineStartPos = getLineStartPos(value, start);
					const lineStartText = value.slice(lineStartPos, start);
					const m = lineStartText.match(/(\t| {1,4})$/);
					if (m) {
						const cut = m[0].length;
						ta.value = value.slice(0, start - cut) + value.slice(end);
						const caret = start - cut;
						setSelection(caret, caret);
					}
				}
			}

			this.onInputDebounced();
		}

		else if (e.key === 'Enter') {
			e.preventDefault();
			const lineStart = getLineStartPos(value, start);
			const currentIndent = (value.slice(lineStart).match(/^[\t ]+/) || [''])[0];
			const insert = '\n' + currentIndent;

			ta.value = value.slice(0, start) + insert + value.slice(end);
			const caret = start + insert.length;
			setSelection(caret, caret);

			this.onInputDebounced();
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 debounce(fn, ms = 150)
	debounce (fn, ms = 150) {
		// NB: Don't LOG here: will not be shown in console
		let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
	},

	//:::	🔹 setText(args)
	setText(args) {		// nb: can be filename or stuff later
		if (LOGGING) console.group('%c CTexteditor %c setText', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(args);

		this.value = args.txt;
		this.elTextarea.value = this.value;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 selectLine(args)
	selectLine(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CTexteditor', 'selectLine', CUtil.getArgsKeys(args), args.caller));
		if (LOGARGS) console.log(args);

		const ta = this.elTextarea;
		const text = ta.value;
		const lines = text.split('\n');
		const N = lines.length;
		if (args.idxLine < 0 || args.idxLine >= N) return;

		// Count leading tabs
		function leadingTabs(s) {
			let i = 0;
			while (i < s.length && s[i] === '\t') i++;
			return i;
		}

		// --- Determine start and end line of selection ---
		let startLine = args.idxLine;
		let endLine = args.idxLine;

		if (args.isSelectWholeTextbloc) {
			const baseTabs = leadingTabs(lines[args.idxLine]);

			// Select all following deeper-indented lines
			for (let i = args.idxLine + 1; i < N; i++) {
				if (leadingTabs(lines[i]) > baseTabs) {
					endLine = i;
				} else {
					break;
				}
			}
		}

		// --- Convert line numbers into text offsets ---
		let start = 0;
		for (let i = 0; i < startLine; i++)
			start += lines[i].length + 1; // +1 for '\n'

		let end = 0;
		for (let i = 0; i < endLine; i++)
			end += lines[i].length + 1;

		end += lines[endLine].length;

		// Include trailing newline if not last line
		if (endLine < N - 1) end += 1;

		// --- Apply selection ---
		ta.focus();
		ta.setSelectionRange(start, end);


		// scroll textarea so line is centered (vertically)
		const strTextareaheight = getComputedStyle(document.querySelector('#texteditorDoc')).getPropertyValue('height');
		const strLineheight = getComputedStyle(document.querySelector('#texteditorDoc')).getPropertyValue('line-height');
		const pxTextareaheight = parseInt(strTextareaheight);
		const pxLineheight = parseInt(strLineheight);

		ta.scrollTop = Math.max(0, (pxLineheight * args.idxLine) - (pxTextareaheight / 2));

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onInput()
	async onInput () {
		if (LOGGING) console.group('%c CTexteditor %c onInput', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);

		const caller = 'CTexteditor.onInput';

		this.value = this.elTextarea.value;

		//:		→ App: dispatch:		model.appstate.update:			[isDocdataSaved: false]
		await App.dispatch({type: 'model.appstate.update', oUpdate: {isDocdataSaved: false}, caller});

		//:		→ App: dispatch:		model.build.and.augment
		await App.dispatch({type: 'model.build.and.augment', text: this.value, caller});

		//:		→ App: dispatch:		chart.render
		await App.dispatch({type: 'chart.render', typeSvgUpdate: SVG_UPDATE_FULL_RENDER, caller});

		//:		→ App: dispatch:		toolbar.buttons.recreate
		await App.dispatch({type: 'toolbar.buttons.recreate', caller});

		//:		→ App: dispatch:		wrapper.file.save
		const resFileSave = await App.dispatch({type: 'wrapper.file.save', pathFileToSave: CModel.appstate.pathFileLoaded, text: this.value, caller});
		await CFramework.handleResult(resFileSave);
			
		if (LOGGING) console.groupEnd();
	},
};

//:::📙 const CToolbar
const CToolbar = {
	elParent: null,
	elToolbar: null,
	draginfo: null,          // { el, startX, startY, pxOffset, wasDragging, pointerId }
	DRAG_THRESHOLD: 6,	

	//:::	🔹 init
	init(args) {
		if (LOGGING) console.group(...CUtil.logGroup('CToolbar', 'init', CUtil.getArgsKeys(args), args.caller));

		this.elParent = document.querySelector('#workspace-panel');

		const elDiv = document.createElement('div');
		elDiv.className = ['toolbar', 'toolbarTags'].join(' ');

		elDiv.addEventListener('pointerover', (e) => {this.onHover.bind(this)(e, true);});
		elDiv.addEventListener('pointerout',  (e) => {this.onHover.bind(this)(e, false);});
		elDiv.addEventListener('pointerdown', this.onPointerdown.bind(this), { passive: false });	// e.preventDefault allowed only if passive:false

		this.elToolbar = elDiv;

		//?if (args.arrButtons !== undefined)
		//?	this.createButtons(args.arrButtons);

		this.elParent.appendChild(this.elToolbar);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onPointerdown(e)
	onPointerdown(e) {
		if (LOGGING) console.group('%c CToolbar %c onPointerdown', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(e);
		console.log(this);

		const elBtn = e.target.closest('button.button-draggable');
		if (elBtn) {

			const pxX = Number(elBtn.dataset.pxx) || 0;		// record intent, but DO NOT start dragging yet

			CToolbar.draginfo = {
				elBtn: elBtn,
				pointerId: e.pointerId,
				startX: e.clientX,
				startY: e.clientY,
				pxOffset: e.clientX - pxX,
				wasDragging: false,
			};

			window.addEventListener('pointermove', CToolbar.onPointermove.bind(this), { passive: false });
			window.addEventListener('pointerup', CToolbar.onPointerup.bind(this), { passive: false });
			window.addEventListener('pointercancel', CToolbar.onPointerup.bind(this), { passive: false });
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onPointermove(e)
	onPointermove(e) {
		if (!CToolbar.draginfo) return;
		if (e.pointerId !== CToolbar.draginfo.pointerId) return;

		const dx = e.clientX - CToolbar.draginfo.startX;
		const dy = e.clientY - CToolbar.draginfo.startY;

		// Only start 'real drag' after threshold
		if (!CToolbar.draginfo.wasDragging) {
			if (Math.hypot(dx, dy) < this.DRAG_THRESHOLD) return;

			CToolbar.draginfo.wasDragging = true;

			CToolbar.draginfo.elBtn.style.setProperty('z-index', 10);

			// Optional but helps with losing pointer outside the window
			CToolbar.draginfo.elBtn.setPointerCapture?.(e.pointerId);
		}

		if (LOGGING) console.group('%c CToolbar %c onPointermove', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(e);

		// Now we are dragging -> prevent browser from turning this into selection/scroll
		e.preventDefault();

		// move the selected button
		const pxButtonDragNewX = e.clientX - CToolbar.draginfo.pxOffset;
		CToolbar.draginfo.elBtn.style.setProperty('--pxX', pxButtonDragNewX + 'px');

		// push relevant other buttons to give space
		const pxButtonDragWidth = CToolbar.draginfo.elBtn.offsetWidth; //? + PX_PADDING_SMALL;
		const pxButtonDragOrigX = Number(CToolbar.draginfo.elBtn.dataset.pxx) || 0;
		const arrElButtons = this.elToolbar.querySelectorAll('button.button-draggable');

		for (const elButton of arrElButtons) {
			const pxButtonOrigX = Number(elButton.dataset.pxx) || 0;
			const doPushRight = (pxButtonOrigX > pxButtonDragNewX - 30) && (pxButtonOrigX < pxButtonDragOrigX);
			const doPushLeft  = (pxButtonOrigX < pxButtonDragNewX + 30) && (pxButtonOrigX > pxButtonDragOrigX);
			const pxTemp = pxButtonOrigX + (doPushRight ? pxButtonDragWidth : doPushLeft ? -pxButtonDragWidth : 0);

			if (elButton !== CToolbar.draginfo.elBtn)
				elButton.style.setProperty('--pxX', pxTemp + 'px');
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onPointerup(e)
	onPointerup(e) {
		if (!CToolbar.draginfo) return;
		if (LOGGING) console.group('%c CToolbar %c onPointerup', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(e);

		window.removeEventListener('pointermove', this.onPointermove);
		window.removeEventListener('pointerup', this.onPointerup);
		window.removeEventListener('pointercancel', this.onPointerup);

		const wasDragging = CToolbar.draginfo.wasDragging;

		if (wasDragging && CToolbar.draginfo.elBtn) {
			// suppress any 'click-after-drag' weirdness
			e.preventDefault();

			CToolbar.draginfo.elBtn.style.removeProperty('z-index');
			CToolbar.draginfo.elBtn.releasePointerCapture?.(CToolbar.draginfo.pointerId);
			CToolbar.draginfo.elBtn = null;

			// return array of dataset in new order, to let app react to this
			const arrDataset = Array.from(this.elToolbar.querySelectorAll('button.button-draggable'))
				.map(elBtn => ({
					id: elBtn.dataset.id,
					x: parseFloat(getComputedStyle(elBtn).getPropertyValue('--pxX')) || 0
				}))
				.sort((a, b) => a.x - b.x);

				this.onDragend(arrDataset);
		}

		// clear draginfo either way
		CToolbar.draginfo = null;

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 createButtons(arrButtons)
	createButtons(arrButtons) {
		if (LOGGING) console.group('%c CToolbar %c createButtons', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(arrButtons);

		let pxX = 0;

		const arrElButtonNew = arrButtons.map(btn => {
			const pxTextWidth = parseInt(CFramework.measurePartTextWidth2({fontForMeasuring: FONTS_SIZE_REF.toolbar, text: btn.label + '    ', caller: 'CToolbar.createButtons'}));
			const elButton = document.createElement('button');

			elButton.textContent = btn.label;
			elButton.className = ['toolbar__button', ...btn.classes, (btn.draggable ? 'button-draggable' : '')].join(' ').trim();
			elButton.style.setProperty('--pxX', pxX + 'px');
			elButton.style.setProperty('width', pxTextWidth + 'px');
			elButton.dataset['pxx'] = pxX;
			if (btn.tooltip) elButton.title = btn.tooltip;
			if (btn.dataset) Object.entries(btn.dataset).forEach(([key, value]) => {elButton.dataset[key] = value;});
			if (btn.onClick) elButton.addEventListener('click', btn.onClick);

			pxX += pxTextWidth;

			return elButton;
		});

		this.elToolbar.replaceChildren(...arrElButtonNew);
		this.elToolbar.style.width = pxX + 'px';

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onHover()
	onHover(e, isOn) {
		if (LOGGING) console.group('%c CToolbar %c onHover %c [callback]', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(e);

		const elButton = e.target.closest('.toolbar__button');

		if (elButton) {
			const cssSelect = '.' + elButton.dataset.id;
			document.querySelectorAll(cssSelect).forEach(el => el.classList.toggle('is-hover', isOn));
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onDragend
	async onDragend(arrDataset) {
		if (LOGGING) console.group('%c CToolbar %c onDragend %c [callback]', LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);
		if (LOGARGS) console.log(arrDataset);

		const arrTagOrderNew = arrDataset.map(dataset => dataset.id);

		await App.dispatch({type: 'model.tagblock.reorder', arrTagOrderNew: arrTagOrderNew});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 recreateButtons
	recreateButtons(args) {
		if (LOGGING) console.group('%c CToolbar %c recreateButtons %c, caller: ' + args.caller, LOG_MODULE, LOG_FUNCTION, LOG_ARGS, LOG_EXTRA);

		const arrButtons = CModel.docdata.arrTagblock.map((tagblock, idx) => ({
			label: (idx+1).toString() + ': #' + tagblock.id,
			tooltip: `Set active/passive.\nHold Alt to solo / restore all.\nDrag to change order in Tags chart.\n${idx < 9 ? ('(⌘ ' + String(idx+1) + ' -> Activate / deactivate)\n(⌥ ' + String(idx+1) + ' -> Solo / restore all)') : '(No keyboard shortcut)'}`,
			classes: [tagblock.id, (tagblock.isActive ? 'button--active' : 'button--inactive')],
			draggable: true,
			dataset: {id: tagblock.id},		// can have several data fields
			//::		 ☐ onClick
			//:			→ App: dispatch:			model.tagblock.active.set
			onClick: async (e) => {
				e.stopPropagation();
				await App.dispatch({type: 'model.tagblock.active.set', tagblock: tagblock, isActive: tagblock.isActive, isAltKey: e.altKey})
			}
		}));
		
		this.createButtons(arrButtons);

		if (LOGGING) console.groupEnd();
	},
};

//:::📙 const CPopup
const CPopup = {
	elTextarea: null,

	//:::	📗 Templates
	Templates: {

		//::		☐ Popup()
		//:			→ @click: this.onClick
		Popup(appstate) {
