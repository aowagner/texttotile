//:::📙 const CFramework
const CFramework = {
	elApp: null,
	elSplitter: null,
	dragging: false,
	startCoord: 0,
	startSize: 0,
	mql: null,

	//:::	🔹 init()
	init() {
		if (LOGGING) console.group('%c CFramework %c init', LOG_GREY, LOG_RED);

		this.elApp = document.getElementById('app');
		this.elSplitter = document.getElementById('splitter');

		document.getElementById("btn-popup").addEventListener("click", (e) => {
			e.preventDefault();
			app.dispatch({type: 'popup.settings.open'});
		});

		window.addEventListener('keydown', e => {this.onKeydown(e)}, {capture: true});
		window.addEventListener('resize', e => this.onWindowResize(e));

		// splitter drag
		this.elSplitter.addEventListener('mousedown', e => this.onSplitterMousedown(e));
		window.addEventListener('mousemove', e => this.onSplitterMousemove(e));
		window.addEventListener('mouseup', () => this.onSplitterMouseup());

		this.mql = window.matchMedia('(prefers-color-scheme: dark)');

		//: 		→ this: setTheme
		this.setTheme({mode: CModel.appstate.idTheme});

		//: 		→ this: setAppUiClasses
		this.setAppUiClasses({appstate: CModel.appstate});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMousedown(e)
	onSplitterMousedown(e) {
		if (LOGGING) console.group('%c CFramework %c onSplitterMousedown', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);
		this.dragging = true;
		const isVert = this.elApp.classList.contains('sidebar-layout-top') || this.elApp.classList.contains('sidebar-layout-bottom');
		const point = e.touches ? e.touches[0] : e;

		this.startCoord = isVert ? point.clientY : point.clientX;

		this.startSize = parseFloat(
			getComputedStyle(document.documentElement).getPropertyValue('--px-sidebar-size')
		) || 340;

		document.body.classList.add('no-select');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMousemove(e)
	onSplitterMousemove(e) {
		if (!this.dragging) return;
		if (LOGGING) console.group('%c CFramework %c onSplitterMousemove', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		const isVert = this.elApp.classList.contains('sidebar-layout-top') || this.elApp.classList.contains('sidebar-layout-bottom');
		const point = e.touches ? e.touches[0] : e;
		const pos = isVert ? point.clientY : point.clientX;
		let delta = pos - this.startCoord;

		if (this.elApp.classList.contains('sidebar-layout-right') || this.elApp.classList.contains('sidebar-layout-bottom')) {
			delta = -delta;
		}

		const newSize = CUtil.clamp(this.startSize + delta, 160, window.innerWidth * 0.8);

		document.documentElement.style.setProperty('--px-sidebar-size', newSize + 'px');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onSplitterMouseup
	onSplitterMouseup(e) {
		if (!this.dragging) return;
		if (LOGGING) console.group('%c CFramework %c onSplitterMouseup', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);
		this.dragging = false;
		document.body.classList.remove('no-select');
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 applyThemeClass
	applyThemeClass(args) {
		if (LOGGING) console.group('%c CFramework %c applyThemeClass', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log('args, mql', args, this.mql);		
		const root = document.documentElement;

		root.classList.remove('theme-light', 'theme-dark');
		
		if (args.mode === 'light')
			root.classList.add('theme-light');

		else if (args.mode === 'dark')
			root.classList.add('theme-dark');

		else if (args.mode === 'system') {
			root.classList.add(this.mql.matches === true ? 'theme-dark' : 'theme-light');
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setTheme
	setTheme(args) {
		if (LOGGING) console.group('%c CFramework %c setTheme', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		this.applyThemeClass(args);
		
		// listen for OS changes only in system mode
		if (args.mode === 'system') {
			this.mql.onchange = () => this.applyThemeClass({mode: 'system'});
		}
		
		else {
			this.mql.onchange = null;
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setAppUiClasses
	setAppUiClasses(args) {
		if (LOGGING) console.group('%c CFramework %c setAppUiClasses', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		document.querySelector('#app').classList.toggle('sidebar-visible-yes', args.appstate.isSidebarVisible === true);
		document.querySelector('#app').classList.toggle('sidebar-visible-no',  args.appstate.isSidebarVisible === false);

		document.querySelector('#app').classList.toggle('toolbar-visible-yes', args.appstate.isToolbarVisible === true);
		document.querySelector('#app').classList.toggle('toolbar-visible-no',  args.appstate.isToolbarVisible === false);

		document.querySelector('#app').classList.remove(...['sidebar-layout-left', 'sidebar-layout-right', 'sidebar-layout-top', 'sidebar-layout-bottom']);
		document.querySelector('#app').classList.add(args.appstate.idSidebarPosition);

		document.querySelector('#app').classList.toggle('chart-viewa', args.appstate.idxView === VIEWA);
		document.querySelector('#app').classList.toggle('chart-viewb', args.appstate.idxView === VIEWB);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 setCustomCss
	setCustomCss(args, info) {
		if (LOGGING) console.group('%c CFramework %c setCustomCss %c' + info, LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		// strip #def Lines
  		const textContent = args.txtCustomCss.replace(/^\s*#def\s*\{[^}]*\}\s*;?\s*$/gmi, '').trim();

		// set custom css
		const elStyleSettings = document.getElementById(args.idElStyle);
		elStyleSettings.textContent = textContent;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 updateLookupConstants
	updateLookupConstants(args) {
		if (LOGGING) console.group('%c CFramework %c updateLookupConstants', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		const px_ui_base_unit = 15;
		const ui_font_size_factor = 1.0;		// nb: do not control from user css! user can zoom to wished size using Cmd + +/-

		F_ZOOM_SVG			= args.fZoom ?? F_ZOOM_SVG;
		F_LINE_HEIGHT_SVG	= args.fLineheightFromCss ?? F_LINE_HEIGHT_SVG;
		PX_COL_WIDTH_SVG	= args.pxColWidth ?? PX_COL_WIDTH_SVG;
		COUNT_LINES_SVG 	= args.linecount ?? COUNT_LINES_SVG;

		PX_LINE_HEIGHT_SVG 	= Math.round(px_ui_base_unit * F_LINE_HEIGHT_SVG * F_ZOOM_SVG);
		PX_FONT_SIZE_SVG 	= Math.round(px_ui_base_unit * ui_font_size_factor * F_ZOOM_SVG);
		PX_HEADER_HEIGHT_SVG = Math.round(PX_LINE_HEIGHT_SVG * 2.5);									// jk: make constant or rule for '2.5'
		if (LOGARGS) console.log({F_ZOOM_SVG, PX_COL_WIDTH_SVG, COUNT_LINES_SVG, F_LINE_HEIGHT_SVG,  PX_LINE_HEIGHT_SVG, PX_FONT_SIZE_SVG, PX_HEADER_HEIGHT_SVG});

		//: 		→ updateCssFromLookupConstants
		this.updateCssFromLookupConstants();
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	updateCssFromLookupConstants
	updateCssFromLookupConstants() {
		if (LOGGING) console.group('%c CFramework %c updateCssFromLookupConstants', LOG_GREY, LOG_BLUE, LOG_GREEN);

		const root = document.documentElement;

		root.style.setProperty('--px-line-height-svg', PX_LINE_HEIGHT_SVG.toString() + 'px');
		root.style.setProperty('--px-font-size-svg', PX_FONT_SIZE_SVG.toString() + 'px');
		root.style.setProperty('--px-header-height-svg', PX_HEADER_HEIGHT_SVG.toString() + 'px');
		root.style.setProperty('--count-lines-svg', COUNT_LINES_SVG.toString());

		// setup fonts for text measuring
		const arrProbe = [
			{name: "section", 	elText: document.getElementById("font-sample-section")},
			{name: "chapter", 	elText: document.getElementById("font-sample-chapter")},
			{name: "part", 		elText: document.getElementById("font-sample-part")},
			{name: "toolbar", 	elText: document.getElementById("font-sample-toolbar")},
		];

		for (const probe of arrProbe) {
			const style = window.getComputedStyle(probe.elText);
			const font = `${style.fontStyle} ${style.fontVariant} ${style.fontWeight} ${style.fontSize} / ${style.lineHeight} ${style.fontFamily}`;
			FONTS_SIZE_REF[probe.name] = font;
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 measurePartTextWidth2
	measurePartTextWidth2 (args) {
		if (LOGGING) console.log('%c CFramework %c measurePartTextWidth2', LOG_GREY, LOG_BLUE);
		CTX_FOR_TEXT_MEASURE.font = args.fontForMeasuring;
		return CTX_FOR_TEXT_MEASURE.measureText(args.text).width;
	},

	//:::	🔹 onKeydown
	onKeydown: async (e) => {
		if (LOGGING) console.group('%c CFramework %c onKeydown %c [callback]', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		const isMac = navigator.platform.toUpperCase().includes('MAC');
		const isMetaKey = isMac ? e.metaKey : e.ctrlKey;
		const isAltKey = e.altKey;
		const isShiftKey = e.shiftKey;
		const isCtrlKey = e.ctrlKey;
		const arrNumberKey = ['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5', 'Digit6', 'Digit7', 'Digit8', 'Digit9'];

		//::		🔻 Escape
		if (CModel.appstate.isPopupOpen && e.key === 'Escape') {

			//:			→ App: dispatch:			popup.settings.close
			App.dispatch({type: 'popup.settings.close'});
		}

		//::		🔻 Cmd + Shift + E
		else if (e.key.toLowerCase() === 'e' && isMetaKey && isShiftKey) {
			if (e.preventDefault) e.preventDefault();

			const arrSidebarPosition = ['sidebar-layout-left', 'sidebar-layout-right', 'sidebar-layout-top', 'sidebar-layout-bottom'];
			const idxSidebarPosition = arrSidebarPosition.indexOf(CModel.appstate.idSidebarPosition);
			const idxSidebarPositionNew = (idxSidebarPosition + 1) % 4;
			const idSidebarLayoutNew = arrSidebarPosition[idxSidebarPositionNew];

			//:			→ App: dispatch:			framework.sidebar.layout.set (cycle thru 4 options)
			App.dispatch({type: 'framework.sidebar.layout.set', idSidebarLayout: idSidebarLayoutNew});
		}

		//::		🔻 Cmd + Shift + 1 - 9
		else if (isMetaKey && isShiftKey && arrNumberKey.includes(e.code)) {		// NB: using e.code instead of e.key
			if (e.preventDefault) e.preventDefault();
			const idx = Number(e.code.replace("Digit", "")) - 1;
			const path = CModel.appstate.arrPathFilePinned[idx];

			if (path)
				//:			→ App: dispatch:			model.filepath.open (pinned path)
				App.dispatch({type: 'model.filepath.open', path: path});
		}

		//::		🔻 Ctrl + Tab, Ctrl + Shift + Tab
		else if (isCtrlKey && e.key === 'Tab') {
			if (e.preventDefault) e.preventDefault();

								function getNextPinnedPath(arr, currentPath, direction) {
									if (!Array.isArray(arr) || arr.length === 0) return null;

									const idx = arr.indexOf(currentPath);

									// If current file is not pinned → choose entry based on direction
									if (idx === -1) return direction < 0 ? arr[arr.length - 1] : arr[0];

									const len = arr.length;
									const nextIdx = (idx + direction + len) % len;

									return arr[nextIdx];
								}

			const pathToOpen = getNextPinnedPath(CModel.appstate.arrPathFilePinned, CModel.appstate.pathFileOpen, isShiftKey ? -1 : 1);

			if (pathToOpen)
				//:			→ App: dispatch:			model.filepath.open (next/prev tabbed pinned path)
				App.dispatch({type: 'model.filepath.open', path: pathToOpen, caller: 'onKeydown: Ctrl+Tab, Ctrl+Shift+Tab'});
		}

		//::		🔻 Cmd + '+', Cmd + '-', Cmd + 0
		else if ((isMetaKey || isAltKey) && (e.key === '+' || e.key === '-' || e.key === '_' || e.key === '=' || e.key === '0' || e.key === '±' || e.key === '–' || e.code === 'NumpadAdd' || e.code === 'NumpadSubtract' || e.code === 'Numpad0')) {
			if (e.preventDefault) e.preventDefault();

			const typeZoom = (isMetaKey && isAltKey) ? ZOOM_LINECOUNT : isAltKey ? ZOOM_HORIZONTAL : ZOOM_ALL;
			const isReset = (e.key === '0' || e.code === 'Numpad0');
			const isIn = (e.key === '+' || e.key === '=' || e.key === '±' || e.code === 'NumpadAdd');
			const isOut = !(isReset || isIn);

			//:			→ App: dispatch:			chart.zoom ('all', 'width', 'lines')
			App.dispatch({type: 'chart.zoom', typeZoom, isIn, isOut, isReset});
		}

		//::		🔻 Cmd/Alt + 1 - 9
		else if ((isMetaKey || isAltKey) && !e.shiftKey && arrNumberKey.includes(e.code)) {		// NB: using e.code instead of e.key
			if (e.preventDefault) e.preventDefault();

			const idxTagblock = arrNumberKey.indexOf(e.code);
			const tagblock = CModel.docdata.arrTagblock[idxTagblock] || null;

			if (tagblock)
				//:			→ App: dispatch:			model.tagblock.active.set
				App.dispatch({type: 'model.tagblock.active.set', tagblock: tagblock, isActive: tagblock.isActive, isAltKey: isAltKey});
		}

		//::		🔻 Cmd + ArrowLeft/ArrowRight
		else if (CModel.appstate.isPopupOpen && isMetaKey && ['ArrowLeft', 'ArrowRight'].includes(e.key)) {
			if (e.preventDefault) e.preventDefault();

			//:			→ App: dispatch:			popup.tab.select ('files', 'ui', 'css')
			if (e.key === 'ArrowLeft' && CModel.appstate.idTab === 'ui')
				App.dispatch({type: 'popup.tab.select', idTab: 'files'});

			else if ((e.key === 'ArrowRight' && CModel.appstate.idTab === 'files') || (e.key === 'ArrowLeft' && CModel.appstate.idTab === 'css'))
				App.dispatch({type: 'popup.tab.select', idTab: 'ui'});
			
			else if (e.key === 'ArrowRight' && CModel.appstate.idTab === 'ui')
				App.dispatch({type: 'popup.tab.select', idTab: 'css'});
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onWindowResize
	onWindowResize: (e) => {
		if (LOGGING) console.group('%c CFramework %c onWindowResize %c [callback]', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		//: 		→ App: dispatch				chart.render
		App.dispatch({type: 'chart.render', typeSvgUpdate: SVG_UPDATE_RESIZE_ONLY});

		if (LOGGING) console.groupEnd();
	},

};


//:::
//:::📙 const CChart
const CChart = {
	//-?- id: 'chart',
	elParent: null,
	pxHeightSvgContainer: 0,
	pxWidthViewbox: 0,
	pxHeightViewbox: 0,
	idxView: VIEWA,

	//:::  📗 Templates
	Templates: {
		
		//::		☐ Stage(docdata)
		Stage(docdata) {
			if (LOGGING) console.log('%c CChart %c Template: %c Stage %c (docdata)', LOG_GREY, LOG_RED, LOG_BLUE+LOG_BOLD, LOG_GREEN);
			if (LOGARGS) console.log(docdata);

			return svg`
		<svg id="stage" viewBox=${`0 0 ${CChart.pxWidthViewbox} ${CChart.pxHeightViewbox}`} width=${CChart.pxWidthViewbox} height=${CChart.pxHeightViewbox} aria-label="Novel arcs" role="img">
			<g class="header">
				${CChart.Templates.Header(docdata.arrSection, docdata.arrChapter)}
			</g>
			<g class="chapters">
				${docdata.arrChapter.map(CChart.Templates.Chapter)}
			</g>
			<g class="tagblocks">
				${docdata.arrTagblock.map(CChart.Templates.Tagblock)}
			</g>
		</svg>`;
		},

		//::		☐ Header(arrSection, arrChapter)
		//:			→ @click: this.onClick
		Header(arrSection, arrChapter) {
			if (LOGGING) console.log('%c CChart %c Template: %c Header %c (arrSection, arrChapter)', LOG_GREY, LOG_RED, LOG_BLUE+LOG_BOLD, LOG_GREEN);
			if (LOGARGS) console.log(arrSection, arrChapter);

			return [
				...arrSection.map(function(section, idx) {
					const ellipsis = '…';
					const pxX = PX_MARGIN_LEFT_W + (PX_COL_WIDTH_SVG * section.rangeChapters[0]);
					const countChapters = (section.rangeChapters[1] - section.rangeChapters[0]) + 1;
					const pxWidth = PX_COL_WIDTH_SVG * countChapters;
					const arrCaptionSplit = CChart.splitString(section.caption, pxWidth - (PX_PADDING_NORMAL*2), FONTS_SIZE_REF.section);
					const strCaption = arrCaptionSplit[0] + (arrCaptionSplit.length > 1 ? ellipsis : '');

					return svg`	<rect class="header__rect header__rect--section" x=${pxX} width=${pxWidth} @click=${e => CChart.onClick({src: 'section', e, idxTextareaLine: section.idxTextareaLine})} />
								<text class="header__text header__text--section" x=${pxX}>${strCaption}</text>`;
				}),
				
				...arrChapter.map((chapter, idx) => {
					const ellipsis = '…';
					const pxX = PX_MARGIN_LEFT_W + (PX_COL_WIDTH_SVG * idx);
					const arrCaptionSplit = CChart.splitString(chapter.caption, PX_COL_WIDTH_SVG - (PX_PADDING_NORMAL*1), FONTS_SIZE_REF.chapter);
					const strCaption = arrCaptionSplit[0] + (arrCaptionSplit.length > 1 ? ellipsis : '');

					return svg` <rect class="header__rect header__rect--chapter" x=${pxX} width=${PX_COL_WIDTH_SVG}  @click=${e => CChart.onClick({src: 'chapter', e, idxTextareaLine: chapter.idxTextareaLine})} />
								<text class="header__text header__text--chapter" x=${pxX}>${strCaption}</text>`;
				})
			];
		},

		//::		☐ Chapter(chapter, idx)
		Chapter(chapter, idx) {
			if (LOGGING) console.log('%c CChart %c Template: %c Chapter %c (chapter, idx)', LOG_GREY, LOG_RED, LOG_BLUE+LOG_BOLD, LOG_GREEN);
			if (LOGARGS) console.log(chapter, idx);
			const strClasses = 'chapter__rect ' + ((chapter.idxSection % 2) ? 'chapter__rect--section-even' : 'chapter__rect--section-odd');
			const pxX = PX_MARGIN_LEFT_W + (PX_COL_WIDTH_SVG * idx);

			return svg`<rect class=${strClasses} x=${pxX} y=${PX_HEADER_HEIGHT_SVG} width=${PX_COL_WIDTH_SVG} height=${CChart.pxHeightViewbox - PX_HEADER_HEIGHT_SVG} @click=${e => CChart.onClick({src: 'chapter', e, idxTextareaLine: chapter.idxTextareaLine})} />`;
		},

		//::		☐ Tagblock(tagblock, idx)
		//:			→ @click: this: onClick
		Tagblock(tagblock, idx) { 
			if (LOGGING) console.log('%c CChart %c Template: %c Tagblock %c (tagblock, idx)', LOG_GREY, LOG_RED, LOG_BLUE+LOG_BOLD, LOG_GREEN);
			if (LOGARGS) console.log(tagblock, idx);
			const strClasses = ['tagblock', tagblock.id].join(' ');
			const pxWidthTagblock = CChart.pxWidthViewbox - PX_MARGIN_LEFT_W - PX_MARGIN_RIGHT_W;
			const fBgRectScaleY = tagblock.countRows;		// 1.33 +++++
			const pxYa = PX_HEADER_HEIGHT_SVG + 'px';

			return svg`
		<g class=${strClasses} style=${`--yr: 0px; --ya:${pxYa}; --count-lines:${tagblock.countRows}`} data-id=${tagblock.id} @click=${e => CChart.onClick({src: 'tagblock', e, tagblock})}>
			<rect class="tagblock__bg-rect" x=${PX_MARGIN_LEFT_W} y="0" width=${pxWidthTagblock} rx=${PX_PADDING_SMALL} />

			<g class="tagblock__parts">
				${tagblock.arrPart.map(part => CChart.Templates.Tagblock_Part(part, tagblock))}
			</g>

			${tagblock.graphtags
				? svg`
					<g class="tagblock-graphs">
						${Object.entries(tagblock.graphtags).map(([keyMeta, arrValueMeta]) => CChart.Templates.Graphtag(tagblock, keyMeta, arrValueMeta))}
					</g>
				`
				: null}
		</g>`;
		},

		//::		☐ Tagblock_Part(part, tagblock)
		//:			→ @click: this.onClick
		Tagblock_Part(part, tagblock) {
			if (LOGGING) console.log('%c CChart %c Template: %c Tagblock_Part %c (part, tagblock)', LOG_GREY, LOG_RED, LOG_BLUE+LOG_BOLD, LOG_GREEN);
			if (LOGARGS) console.log(part, tagblock);
			const pxWidthRect = PX_COL_WIDTH_SVG - (PX_PADDING_SMALL * 2);
			const pxX = PX_MARGIN_LEFT_W + (PX_COL_WIDTH_SVG * part.idxChapter);
			const pxYa = (((PX_LINE_HEIGHT_SVG * COUNT_LINES_SVG) + PX_PADDING_NORMAL) * part.idxOrderInChapter) + 5;
			const pxYb = (PX_LINE_HEIGHT_SVG * part.idxRow) + 5;		 1.33  
			const symbolString = part.metadata?.code;
			const show = part.metadata?.show ?? tagblock.metadata?.show ?? 'normal';
			const baseStyle = `--x:${pxX}px; --ya:${pxYa}px; --yb:${pxYb}px; `;
			const extraStyle = CChart.getStyleFromMetadata(part.metadata);
			const strClasses = ['tagblock__part', 'tb-part', show === 'normal' ? 'tb-part--normal' : 'tb-part--special'].join(' ');

			let arrTextlines = [];

			if (show === 'normal') {
				arrTextlines = CChart.splitString(part.caption, pxWidthRect - PX_PADDING_SMALL, FONTS_SIZE_REF.part); 
			}

			else {
				const definition = CModel.docdata.definitions?.[show];
				const strLine0 = `${show} (${definition ? definition.unit : '?'})`;
				const strLine1 = part.metadata?.[show] ?? '—';

				arrTextlines = [strLine0, strLine1];
			}

			return svg`
		<g class=${strClasses} style=${baseStyle + extraStyle}  data-idxline=${'x' + part.idxTextareaLine} @click=${e => CChart.onClick({src: 'part', e, idxTextareaLine: part.idxTextareaLine})} >
			<rect class="tb-part__rect" x=${PX_PADDING_SMALL} y="0" width=${pxWidthRect} />
			<text class="tb-part__text tb-part__text--chart-viewa">
				${arrTextlines.map((textline, idx) => svg`
					<tspan class="${'line' + (idx+1)}" x=${PX_PADDING_SMALL * 2} dy=${idx === 0 ? PX_LINE_HEIGHT_SVG * 0.5 : PX_LINE_HEIGHT_SVG}>${textline}</tspan>
				`)}
			</text>
			<text class="tb-part__text tb-part__text--chart-viewb" x=${PX_PADDING_NORMAL} y=${PX_LINE_HEIGHT_SVG * 0.5}>${part.caption}</text> 

			${symbolString ? svg`<text class="tb-part__symbol" style=${`--x:${pxWidthRect + PX_PADDING_NORMAL}px; --y:${PX_LINE_HEIGHT_SVG * COUNT_LINES_SVG}px;`} x="0" y="0">${symbolString}</text>` : ''}
		</g>`;
		},

		//::		☐ Graphtag(tagblock, keyMeta, arrValueMeta) 😃
		//:			→ @click: this.onClick
		Graphtag(tagblock, keyMeta, arrValueMeta) {
			if (LOGGING) console.log('%c CChart %c Template: %c Graphtag %c (tagblock, keyMeta, arrValueMeta)', LOG_GREY, LOG_RED, LOG_BLUE+LOG_BOLD, LOG_GREEN);
			if (LOGARGS) console.log(tagblock, keyMeta, arrValueMeta);
			const definition = CModel.docdata.definitions[keyMeta] ?? {unit: '', min: 0, max: 100 };
			const unit = definition.unit ?? '?';

			return svg`
			<g class=${`graph ${tagblock.id} ${keyMeta}`}>
				<polyline
					class="tagblock-polyline"
					fill="none"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				></polyline>

				${arrValueMeta.map(graphvalue => svg`
					<circle
						class="tagblock-circle"
						r="7.5"
						stroke-width="2"
						@click=${e => CChart.onClick({src: 'graph', e, idxTextareaLine: graphvalue.idxTextareaLine})}
						data-idxline=${'x' + graphvalue.idxTextareaLine}
					>
					</circle>
					<text 
						class="tagblock-circle-text"
						data-idxline=${'x' + graphvalue.idxTextareaLine}
					>${`${tagblock.id}: ${keyMeta} (${unit}): ${graphvalue.value}`}</text>
				`)}
			</g>`;
		},
	},

	//:::	🔹 init()
	init() {
		if (LOGGING) console.group('%c CChart %c init', LOG_GREY, LOG_RED);

		this.elParent = document.querySelector('#workspace-main');	

		this.elParent.addEventListener('pointerover', (e) => {CChart.onHover({e, isOn: true});});
		this.elParent.addEventListener('pointerout',  (e) => {CChart.onHover({e, isOn: false});});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 renderSvg(args)
	renderSvg(args) {				// typeSvgUpdate can be SVG_UPDATE_FULL_RENDER or SVG_UPDATE_RESIZE_ONLY
		if (LOGGING) console.group('%c CChart %c renderSvg', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		CChart.idxView = args.idxView;

		//: 		→ this: calculateRequiredViewboxSize
		CChart.calculateRequiredViewboxSize(args.docdata);

		if (args.typeSvgUpdate === SVG_UPDATE_FULL_RENDER) {
			//: 		→ [uhtml].render
			render(CChart.elParent, CChart.Templates.Stage(args.docdata));
		}

		else if (args.typeSvgUpdate === SVG_UPDATE_RESIZE_ONLY) {
			const elSvg = document.getElementById('stage');
			
			elSvg.setAttribute('viewBox', `0 0 ${CChart.pxWidthViewbox} ${CChart.pxHeightViewbox}`);
			elSvg.setAttribute('width', String(CChart.pxWidthViewbox));
			elSvg.setAttribute('height', String(CChart.pxHeightViewbox));

			// set height of chapter rects
			const arrElChapterRect = elSvg.querySelectorAll('.chapter__rect');
			for (const elChapterRect of arrElChapterRect) {
				elChapterRect.setAttribute('height', String(CChart.pxHeightViewbox - PX_HEADER_HEIGHT_SVG));
			}
		}

		//: 		→ this: reflowAllTagblocks
		CChart.reflowAllTagblocks(args.docdata);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	calculateRequiredViewboxSize()
	calculateRequiredViewboxSize(docdata) {
		if (LOGGING) console.group('%c CChart %c calculateRequiredViewboxSize', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(docdata);

		let pxHeightRequired = 0;

		if (CChart.idxView === VIEWA) {
			const idxOrderInChapterMax = Math.max( ...docdata.arrTagblock.flatMap(tb => tb.arrPart.map(p => p.idxOrderInChapter)) );
			const pxPartHeight = PX_LINE_HEIGHT_SVG * COUNT_LINES_SVG;

			pxHeightRequired = PX_HEADER_HEIGHT_SVG + PX_GRAPH_VIEWA_H + PX_PADDING_NORMAL + ((pxPartHeight + PX_PADDING_NORMAL) * (idxOrderInChapterMax + 1));		// jk: what if no graphs in txt? then space set off none the less
		}
		else if (CChart.idxView === VIEWB) {
			pxHeightRequired = PX_HEADER_HEIGHT_SVG;

			for (const tagblock of docdata.arrTagblock) {
				const pxTagblockHeight = (PX_LINE_HEIGHT_SVG * (tagblock.isActive ? tagblock.countRows : 1)) + 10;		// 1.33

				pxHeightRequired += pxTagblockHeight; 
			}
		}

		// set ui values
		CChart.pxHeightSvgContainer = CChart.elParent.clientHeight;
		CChart.pxWidthViewbox = PX_MARGIN_LEFT_W + PX_MARGIN_RIGHT_W + (PX_COL_WIDTH_SVG * docdata.arrChapter.length);
		CChart.pxHeightViewbox = Math.max(pxHeightRequired, CChart.pxHeightSvgContainer, PX_VIEVBOX_MIN_H);

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹	reflowAllTagblocks(docdata)
	reflowAllTagblocks(docdata) {
		if (LOGGING) console.group('%c CChart %c reflowAllTagblocks', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(docdata);

		let pxTagblockTop = PX_HEADER_HEIGHT_SVG;

		const arrElTagblock = CChart.elParent.querySelectorAll('#stage .tagblock');

		for (const [idxTagblock, tagblock] of docdata.arrTagblock.entries()) {
			const pxYb = pxTagblockTop + 'px';
			const pxTagblockHeight = (PX_LINE_HEIGHT_SVG * (tagblock.isActive ? tagblock.countRows : 1)) + 10;		// 1.33

			arrElTagblock[idxTagblock].classList.toggle('tagblock--active', tagblock.isActive);
			arrElTagblock[idxTagblock].classList.toggle('tagblock--inactive', !tagblock.isActive);
			arrElTagblock[idxTagblock].style.setProperty('--yb', pxYb);

			pxTagblockTop += pxTagblockHeight;

			//:			→ this: updateTagblockGraphs
			CChart.updateTagblockGraphs(tagblock, docdata.definitions);
		};

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹		updateTagblockGraphs(tagblock)
	updateTagblockGraphs(tagblock, definitions) {		// jk: maybe make this function 'safer'
		if (LOGGING) console.group('%c CChart %c updateTagblockGraphs %c (' + tagblock.id + ')', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(tagblock, definitions);

		const elTagblock = CChart.elParent.querySelector(`#stage .tagblock.${tagblock.id}`);

		const elGroupGraphs = elTagblock.querySelector('.tagblock-graphs');
		if (!elGroupGraphs) {
			if (LOGGING) console.groupEnd();
			return;
		}

		const pxGraphHeight = (CChart.idxView === VIEWA) ? PX_GRAPH_VIEWA_H : (PX_LINE_HEIGHT_SVG * tagblock.countRows);

		Object.entries(tagblock.graphtags).forEach(([keyMeta, arrValueMeta]) => {					// Loop over graph tags: "future", "action", etc.
		
			const graphGroup = elGroupGraphs.querySelector(`.graph.${tagblock.id}.${keyMeta}`);		// Find this particular graph group: <g class="graph gitte future">
			if (!graphGroup) return;

			const polyline = graphGroup.querySelector('.tagblock-polyline');
			const circles  = graphGroup.querySelectorAll('.tagblock-circle');
			const circletexts  = graphGroup.querySelectorAll('.tagblock-circle-text');
			if (!polyline) return;

			// check if definition exists for keyMeta (eg. 'weight') - else use default range 0 - 100
			const definition = definitions[keyMeta] ?? {unit: '', min: 0, max: 100 };

			// make array of coords
			const arrCoord = [];

			arrValueMeta.forEach(({ idxChapter, value }) => {
				const pxX = PX_MARGIN_LEFT_W + (idxChapter * PX_COL_WIDTH_SVG) + (PX_COL_WIDTH_SVG / 2);
				const pctValue = ((value - definition.min) / (definition.max - definition.min)) * 100;		// calculate percent value inside range definition
				const pxYBase = pxGraphHeight - (pxGraphHeight * (pctValue / 100));

				let pxY;
				if (CChart.idxView === VIEWA) {
					const pxGraphTop = CChart.pxHeightViewbox - (PX_HEADER_HEIGHT_SVG + PX_PADDING_NORMAL + pxGraphHeight);
					pxY = pxGraphTop + pxYBase;
				} else {
					pxY = pxYBase;
				}

				arrCoord.push({pxX, pxY});
			});

			polyline.setAttribute('points', arrCoord.map(pt => `${pt.pxX},${pt.pxY}`).join(' '));		// Set polyline points
			polyline.style.display = '';

			circles.forEach((circle, idx) => {			// Set circle positions
				const point = arrCoord[idx];
				circle.setAttribute('cx', point.pxX);
				circle.setAttribute('cy', point.pxY);
				circle.style.display = '';

				circletexts[idx].setAttribute('x', point.pxX);	// jk: could be 'safer' here?
				circletexts[idx].setAttribute('y', point.pxY);
			});			
		});

		if (LOGGING) console.groupEnd();
	},


	//:::	🔹 getStyleFromMetadata() 				- better placement?
	getStyleFromMetadata(obj) { 
		if (!obj) return "";

		//?if (LOGGING) console.log('%c CChart %c getStyleFromMetadata', LOG_GREY, LOG_BLUE);

		const arrAllowedKey = ['fill', 'text', 'bold', 'fontsize'];
		
		return Object.entries(obj)
			.filter(([, v]) => v !== null && v !== undefined && v !== "")
			.filter(([k, v]) => arrAllowedKey.includes(k)) 
			.map(([k, v]) => `--${k}: ${v};`)
			.join(" ");
	},


	//:::	🔹 splitString (*args*)
	splitString(text, pxWidthMax, fontForMeasuring) {
		const VIEWA_MAX_LINES = COUNT_LINES_SVG;
		const content = (text || '').trim();
		if (!content) return [''];
		const tokens = content.split(/\s+/);
		const lines = [];
		let index = 0;

		//?if (LOGGING) console.log('%c CChart %c splitString', LOG_GREY, LOG_BLUE);

		// :		(→ ☐ measurePartTextWidth)
		const measurePartTextWidth = (text) => {
			CTX_FOR_TEXT_MEASURE.font = fontForMeasuring;
			return CTX_FOR_TEXT_MEASURE.measureText(text).width;
		};

		// :		(→ ☐ splitTokenToFit)
		const splitTokenToFit = (token, pxWidthMax) => {
			if (!token) return { fit: '', rest: '' };
			if (pxWidthMax <= 0) return { fit: '', rest: token };
			let fit = '';
			for (let i = 0; i < token.length; i++) {
				const candidate = fit + token[i];
				if (measurePartTextWidth(candidate) <= pxWidthMax || fit === '') {
					fit = candidate;
				} else {
					break;
				}
			}
			if (!fit) fit = token[0] || '';
			const rest = token.slice(fit.length);
			return { fit, rest };
		};

		// :		(→ ☐ appendEllipsis)
		const appendEllipsis = (line, pxWidthMax) => {
			const ellipsis = '…';
			if (!line) return ellipsis;
			if (pxWidthMax <= 0) return ellipsis;
			let trimmed = line.replace(/\s+$/, '');
			while (trimmed && measurePartTextWidth(trimmed + ellipsis) > pxWidthMax) {
				trimmed = trimmed.slice(0, -1);
			}
			if (!trimmed) return ellipsis;
			return trimmed + ellipsis;
		};

		while (index < tokens.length && lines.length < VIEWA_MAX_LINES) {
			let line = '';
			while (index < tokens.length) {
				let token = tokens[index];
				const candidate = line ? `${line} ${token}` : token;
				if (measurePartTextWidth(candidate) <= pxWidthMax) {
					line = candidate;
					index += 1;
				} else {
					if (!line) {
						const { fit, rest } = splitTokenToFit(token, pxWidthMax);
						line = fit;
						if (rest) {
							tokens[index] = rest;
						} else {
							index += 1;
						}
					}
					break;
				}
			}
			if (!line && index < tokens.length) {
				line = tokens[index];
				index += 1;
			}
			lines.push(line || '');
		}

		if (index < tokens.length && lines.length) {
			lines[lines.length - 1] = appendEllipsis(lines[lines.length - 1], pxWidthMax);
		}

		return lines;
	},

	//:::	🔹 onHover(args)
	onHover: (args) => {
		if (LOGGING && DETAILS) console.group('%c CChart %c onHover %c [callback]', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		const elPartOrCircle = args.e.target.closest('[data-idxline]');
		const elTagblock = args.e.target.closest('.tagblock');

		if (elTagblock) {
			elTagblock.classList.toggle('is-hover', args.isOn);
			CToolbar.elParent.querySelector('.' + elTagblock.dataset.id).classList.toggle('is-hover', args.isOn);

			if (elPartOrCircle)
				elTagblock.querySelectorAll(`[data-idxline="${elPartOrCircle.dataset.idxline}"]`).forEach(el => el.classList.toggle('is-hover', args.isOn));
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onClick(args)
	onClick: (args) => {
		if (LOGGING) console.group('%c CChart %c onClick %c [callback]', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		const e = args.e;
		const isMac = navigator.platform.toUpperCase().includes('MAC');
		const isMetaKey = isMac ? e.metaKey : e.ctrlKey;
		const isAltKey = e.altKey;
		const isShiftKey = e.shiftKey;
		const isCtrlKey = e.ctrlKey;

		switch (args.src) {

			case 'section':
			case 'chapter':
			case 'part':
			case 'graph':

				//: 		→ App: dispatch: 				selectLine
				if (!isMetaKey && !isAltKey)
					App.dispatch({type: 'texteditor.line.select', idxLine: args.idxTextareaLine, isSelectWholeTextbloc: isShiftKey});
				break;

			case 'tagblock':

				//: 		→ App: dispatch:				model.tagblock.active.set
				if (isMetaKey || isAltKey)
					App.dispatch({type: 'model.tagblock.active.set', tagblock: args.tagblock, isActive: args.tagblock.isActive, isAltKey: isAltKey});
				break;
		}
		if (LOGGING) console.groupEnd();
	},
	
};

//:::📙 const CTexteditor
const CTexteditor = {
	elParent: null,
	elTextarea: null,
	value: '',

	//:::	🔹 init()
	init() {
		if (LOGGING) console.group('%c CTexteditor %c init', LOG_GREY, LOG_RED);

		this.elParent = document.querySelector("#sidebar-main");
		this.value = '';

		const elTextarea = document.createElement('textarea');
		elTextarea.id = 'texteditorDoc';
		elTextarea.value = '';
		elTextarea.className = ['texteditor', 'texteditor-doc'].join(' ');
		elTextarea.setAttribute('spellcheck', 'false');
		elTextarea.setAttribute('autocomplete', 'off');
		elTextarea.setAttribute('autocorrect', 'off');
		elTextarea.setAttribute('autocapitalize', 'off');
		elTextarea.setAttribute('wrap', 'off');

		this.onInputDebounced = this.debounce(() => this.onInput(), 400);

		elTextarea.addEventListener('input', this.onInputDebounced);
		elTextarea.addEventListener('keydown', e => this.onKeydown(e));

		this.elTextarea = elTextarea;
		this.elParent.appendChild(this.elTextarea);

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onKeydown(e)
	onKeydown(e) {
		if (LOGGING) console.group("%c CTexteditor %c event %c onKeydown %c '" + e.key + "'", LOG_GREY, LOG_RED, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		//:  		☐ getLineStartPos(text, pos)
		const getLineStartPos = (text, pos) => {
			let i = pos;
			while (i > 0 && text[i - 1] !== '\n') i--;
			return i;
		};

		//:  		☐ etSelection()
		const getSelection = () => {
			const ta = this.elTextarea;
			return { start: ta.selectionStart, end: ta.selectionEnd };
		};

		//:  		☐ setSelection(start, end)
		const setSelection = (start, end) => {
			const ta = this.elTextarea;
			ta.selectionStart = start;
			ta.selectionEnd = end;
		};

		//::  		☐ getLineEndPos(start, end)
		const getLineEndPos = (text, pos) => {
			let i = pos;
			while (i < text.length && text[i] !== '\n') i++;
			return i;
		};

		const ta = this.elTextarea;
		let { start, end } = getSelection();
		const value = ta.value;

		if (e.key === 'Tab') {
			e.preventDefault();
			const tab = '\t';

			// If selection ends at start of next line, don't include that next line
			if (end > start && value[end - 1] === '\n') end -= 1;

			const sel = value.slice(start, end);
			const isMultiLine = sel.includes('\n');

			if (!e.shiftKey) {
				if (isMultiLine) {
					const blockStart = getLineStartPos(value, start);
					const blockEnd   = getLineEndPos(value, end);

					const before = value.slice(0, blockStart);
					const srcBlock = value.slice(blockStart, blockEnd);
					const indentedBlock = srcBlock.replace(/^/gm, tab);
					const after = value.slice(blockEnd);

					ta.value = before + indentedBlock + after;
					setSelection(blockStart, blockStart + indentedBlock.length);
				}
				else {
					ta.value = value.slice(0, start) + tab + value.slice(end);
					const caret = start + tab.length;
					setSelection(caret, caret);
				}
			}
			else {
				if (isMultiLine) {
					const blockStart = getLineStartPos(value, start);
					const blockEnd   = getLineEndPos(value, end);

					const before = value.slice(0, blockStart);
					const srcBlock = value.slice(blockStart, blockEnd);
					const outdentedBlock = srcBlock.replace(/^(\t| {1,4})/gm, '');
					const after = value.slice(blockEnd);

					ta.value = before + outdentedBlock + after;
					setSelection(blockStart, blockStart + outdentedBlock.length);
				}
				else {
					const lineStartPos = getLineStartPos(value, start);
					const lineStartText = value.slice(lineStartPos, start);
					const m = lineStartText.match(/(\t| {1,4})$/);
					if (m) {
						const cut = m[0].length;
						ta.value = value.slice(0, start - cut) + value.slice(end);
						const caret = start - cut;
						setSelection(caret, caret);
					}
				}
			}

			this.onInputDebounced();
		}

		else if (e.key === 'Enter') {
			e.preventDefault();
			const lineStart = getLineStartPos(value, start);
			const currentIndent = (value.slice(lineStart).match(/^[\t ]+/) || [''])[0];
			const insert = '\n' + currentIndent;

			ta.value = value.slice(0, start) + insert + value.slice(end);
			const caret = start + insert.length;
			setSelection(caret, caret);

			this.onInputDebounced();
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 debounce(fn, ms = 150)
	debounce (fn, ms = 150) {
		// NB: Don't LOG here: will not be shown in console
		let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
	},

	//:::	🔹 setText(args)
	setText(args) {		// nb: can be filename or stuff later
		if (LOGGING) console.group('%c CTexteditor %c setText', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		this.value = args.txt;
		this.elTextarea.value = this.value;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 selectLine(args)
	selectLine(args) {
		if (LOGGING) console.group('%c CTexteditor %c selectLine', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		const ta = this.elTextarea;
		const text = ta.value;
		const lines = text.split('\n');
		const N = lines.length;
		if (args.idxLine < 0 || args.idxLine >= N) return;

		// Count leading tabs
		function leadingTabs(s) {
			let i = 0;
			while (i < s.length && s[i] === '\t') i++;
			return i;
		}

		// --- Determine start and end line of selection ---
		let startLine = args.idxLine;
		let endLine = args.idxLine;

		if (args.isSelectWholeTextbloc) {
			const baseTabs = leadingTabs(lines[args.idxLine]);

			// Select all following deeper-indented lines
			for (let i = args.idxLine + 1; i < N; i++) {
				if (leadingTabs(lines[i]) > baseTabs) {
					endLine = i;
				} else {
					break;
				}
			}
		}

		// --- Convert line numbers into text offsets ---
		let start = 0;
		for (let i = 0; i < startLine; i++)
			start += lines[i].length + 1; // +1 for '\n'

		let end = 0;
		for (let i = 0; i < endLine; i++)
			end += lines[i].length + 1;

		end += lines[endLine].length;

		// Include trailing newline if not last line
		if (endLine < N - 1) end += 1;

		// --- Apply selection ---
		ta.focus();
		ta.setSelectionRange(start, end);


		// scroll textarea so line is centered (vertically)
		const strTextareaheight = getComputedStyle(document.querySelector('#texteditorDoc')).getPropertyValue('height');
		const strLineheight = getComputedStyle(document.querySelector('#texteditorDoc')).getPropertyValue('line-height');
		const pxTextareaheight = parseInt(strTextareaheight);
		const pxLineheight = parseInt(strLineheight);

		ta.scrollTop = Math.max(0, (pxLineheight * args.idxLine) - (pxTextareaheight / 2));

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onInput()
	async onInput () {
		if (LOGGING) console.group('%c CTexteditor %c onInput', LOG_GREY, LOG_BLUE, LOG_GREEN);

		this.value = this.elTextarea.value;

		//:		→ App: dispatch				model.build.and.augment
		App.dispatch({type: 'model.build.and.augment', text: this.value});

		//:		→ App: dispatch				chart.render
		App.dispatch({type: 'chart.render', typeSvgUpdate: SVG_UPDATE_FULL_RENDER});

		//:		→ App: dispatch				toolbar.buttons.recreate
		App.dispatch({type: 'toolbar.buttons.recreate'});

		//:		→ App: dispatch				wrapper.save.file
		App.dispatch({type: 'wrapper.save.file', path: CModel.appstate.pathFileOpen, text: this.value});
		if (LOGGING) console.groupEnd();
	},
};

//:::📙 const CToolbar
const CToolbar = {
	elParent: null,
	elToolbar: null,
	draginfo: null,          // { el, startX, startY, pxOffset, wasDragging, pointerId }
	DRAG_THRESHOLD: 6,	

	//:::	🔹 init()
	init() {
		if (LOGGING) console.group('%c CToolbar %c init', LOG_GREY, LOG_RED);

		this.elParent = document.querySelector("#workspace-panel");

		const elDiv = document.createElement('div');
		elDiv.className = ['toolbar', 'toolbarTags'].join(' ');

		elDiv.addEventListener('pointerover', (e) => {this.onHover.bind(this)(e, true);});
		elDiv.addEventListener('pointerout',  (e) => {this.onHover.bind(this)(e, false);});
		elDiv.addEventListener('pointerdown', this.onPointerdown.bind(this), { passive: false });	// e.preventDefault allowed only if passive:false

		this.elToolbar = elDiv;

		//?if (args.arrButtons !== undefined)
		//?	this.createButtons(args.arrButtons);

		this.elParent.appendChild(this.elToolbar);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onPointerdown(e)
	onPointerdown(e) {
		if (LOGGING) console.group('%c CToolbar %c onPointerdown', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);
		console.log(this);

		const elBtn = e.target.closest('button.button-draggable');
		if (elBtn) {

			const pxX = Number(elBtn.dataset.pxx) || 0;		// record intent, but DO NOT start dragging yet

			CToolbar.draginfo = {
				elBtn: elBtn,
				pointerId: e.pointerId,
				startX: e.clientX,
				startY: e.clientY,
				pxOffset: e.clientX - pxX,
				wasDragging: false,
			};

			window.addEventListener('pointermove', CToolbar.onPointermove.bind(this), { passive: false });
			window.addEventListener('pointerup', CToolbar.onPointerup.bind(this), { passive: false });
			window.addEventListener('pointercancel', CToolbar.onPointerup.bind(this), { passive: false });
		}
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onPointermove(e)
	onPointermove(e) {
		if (!CToolbar.draginfo) return;
		if (e.pointerId !== CToolbar.draginfo.pointerId) return;

		const dx = e.clientX - CToolbar.draginfo.startX;
		const dy = e.clientY - CToolbar.draginfo.startY;

		// Only start "real drag" after threshold
		if (!CToolbar.draginfo.wasDragging) {
			if (Math.hypot(dx, dy) < this.DRAG_THRESHOLD) return;

			CToolbar.draginfo.wasDragging = true;

			CToolbar.draginfo.elBtn.style.setProperty('z-index', 10);

			// Optional but helps with losing pointer outside the window
			CToolbar.draginfo.elBtn.setPointerCapture?.(e.pointerId);
		}

		if (LOGGING) console.group('%c CToolbar %c onPointermove', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		// Now we are dragging -> prevent browser from turning this into selection/scroll
		e.preventDefault();

		// move the selected button
		const pxButtonDragNewX = e.clientX - CToolbar.draginfo.pxOffset;
		CToolbar.draginfo.elBtn.style.setProperty('--pxX', pxButtonDragNewX + 'px');

		// push relevant other buttons to give space
		const pxButtonDragWidth = CToolbar.draginfo.elBtn.offsetWidth; //? + PX_PADDING_SMALL;
		const pxButtonDragOrigX = Number(CToolbar.draginfo.elBtn.dataset.pxx) || 0;
		const arrElButtons = this.elToolbar.querySelectorAll('button.button-draggable');

		for (const elButton of arrElButtons) {
			const pxButtonOrigX = Number(elButton.dataset.pxx) || 0;
			const doPushRight = (pxButtonOrigX > pxButtonDragNewX - 30) && (pxButtonOrigX < pxButtonDragOrigX);
			const doPushLeft  = (pxButtonOrigX < pxButtonDragNewX + 30) && (pxButtonOrigX > pxButtonDragOrigX);
			const pxTemp = pxButtonOrigX + (doPushRight ? pxButtonDragWidth : doPushLeft ? -pxButtonDragWidth : 0);

			if (elButton !== CToolbar.draginfo.elBtn)
				elButton.style.setProperty('--pxX', pxTemp + 'px');
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onPointerup(e)
	onPointerup(e) {
		if (!CToolbar.draginfo) return;
		if (LOGGING) console.group('%c CToolbar %c onPointerup', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		window.removeEventListener('pointermove', this.onPointermove);
		window.removeEventListener('pointerup', this.onPointerup);
		window.removeEventListener('pointercancel', this.onPointerup);

		const wasDragging = CToolbar.draginfo.wasDragging;

		if (wasDragging && CToolbar.draginfo.elBtn) {
			// suppress any "click-after-drag" weirdness
			e.preventDefault();

			CToolbar.draginfo.elBtn.style.removeProperty('z-index');
			CToolbar.draginfo.elBtn.releasePointerCapture?.(CToolbar.draginfo.pointerId);
			CToolbar.draginfo.elBtn = null;

			// return array of dataset in new order, to let app react to this
			const arrDataset = Array.from(this.elToolbar.querySelectorAll('button.button-draggable'))
				.map(elBtn => ({
					id: elBtn.dataset.id,
					x: parseFloat(getComputedStyle(elBtn).getPropertyValue('--pxX')) || 0
				}))
				.sort((a, b) => a.x - b.x);

				this.onDragend(arrDataset);
		}

		// clear draginfo either way
		CToolbar.draginfo = null;

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 createButtons(arrButtons)
	createButtons(arrButtons) {
		if (LOGGING) console.group('%c CToolbar %c createButtons', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(arrButtons);

		let pxX = 0;

		const arrElButtonNew = arrButtons.map(btn => {
			const pxTextWidth = parseInt(CFramework.measurePartTextWidth2({fontForMeasuring: FONTS_SIZE_REF.toolbar, text: btn.label + '    '}));
			const elButton = document.createElement('button');

			elButton.textContent = btn.label;
			elButton.className = ['toolbar__button', ...btn.classes, (btn.draggable ? 'button-draggable' : '')].join(' ').trim();
			elButton.style.setProperty('--pxX', pxX + 'px');
			elButton.style.setProperty('width', pxTextWidth + 'px');
			elButton.dataset['pxx'] = pxX;
			if (btn.tooltip) elButton.title = btn.tooltip;
			if (btn.dataset) Object.entries(btn.dataset).forEach(([key, value]) => {elButton.dataset[key] = value;});
			if (btn.onClick) elButton.addEventListener('click', btn.onClick);

			pxX += pxTextWidth;

			return elButton;
		});

		this.elToolbar.replaceChildren(...arrElButtonNew);
		this.elToolbar.style.width = pxX + 'px';

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onHover()
	onHover(e, isOn) {
		if (LOGGING) console.group('%c CToolbar %c onHover %c [callback]', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		const elButton = e.target.closest('.toolbar__button');

		if (elButton) {
			const cssSelect = '.' + elButton.dataset.id;
			document.querySelectorAll(cssSelect).forEach(el => el.classList.toggle('is-hover', isOn));
		}

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onDragend
	onDragend(arrDataset) {
		if (LOGGING) console.group('%c CToolbar %c onDragend %c [callback]', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(arrDataset);

		const arrTagOrderNew = arrDataset.map(dataset => dataset.id);

		App.dispatch({type: 'model.tagblock.reorder', arrTagOrderNew: arrTagOrderNew});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 recreateButtons()
	recreateButtons() {
		if (LOGGING) console.group('%c CToolbar %c recreateButtons %c', LOG_GREY, LOG_BLUE, LOG_GREEN);

		const arrButtons = CModel.docdata.arrTagblock.map((tagblock, idx) => ({
			label: (idx+1).toString() + ': #' + tagblock.id,
			tooltip: `Set active/passive.\nHold Alt to solo / restore all.\nDrag to change order in Tags chart.\n${idx < 9 ? ('(⌘ ' + String(idx+1) + ' -> Activate / deactivate)\n(⌥ ' + String(idx+1) + ' -> Solo / restore all)') : '(No keyboard shortcut)'}`,
			classes: [tagblock.id, (tagblock.isActive ? 'button--active' : 'button--inactive')],
			draggable: true,
			dataset: {id: tagblock.id},		// can have several data fields
			//::		 ☐ onClick
			//:			→ App: dispatch:			model.tagblock.active.set
			onClick: (e) => {e.stopPropagation(); App.dispatch({type: 'model.tagblock.active.set', tagblock: tagblock, isActive: tagblock.isActive, isAltKey: e.altKey})}
		}));
		
		this.createButtons(arrButtons);

		if (LOGGING) console.groupEnd();
	},
};

	//:::	🔹 init()
	init() {
		if (LOGGING) console.group('%c CPopup %c init', LOG_GREY, LOG_RED);

		this.elParent = document.querySelector("#popup-mount");

		this.elParent.addEventListener("pointerdown", CPopup.onPointerDown);
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 renderPopup()
	renderPopup() {
		if (LOGGING) console.group('%c CPopup %c renderPopup', LOG_GREY, LOG_BLUE, LOG_GREEN);

		//--const elParent = document.getElementById("popup-mount");
		const popupOpen = CModel.appstate.isPopupOpen;
		const cssTabActive = popupOpen && CModel.appstate.idTab === "css";
		const editorAlive = !!CPopup.elTextarea;

		// If popup is closed, always render empty and destroy editor.
		if (!popupOpen) {
			this.destroyCssEditor();
			render(CPopup.elParent, html``);
			if (LOGGING) console.groupEnd();
			return;
		}

		// If CSS tab is active AND editor already exists, freeze DOM (don’t re-render).
		if (cssTabActive && editorAlive) {
			if (LOGGING) console.groupEnd();
			return;
		}

		// Otherwise, do declarative render (tab switches etc.)
		render(CPopup.elParent, this.Templates.Popup(CModel.appstate));

		// After render, wire up / tear down the editor island as needed.
		if (cssTabActive)
			this.ensureCssEditor();

		else
			this.destroyCssEditor();

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 	ensureCssEditor()
	ensureCssEditor() {
		if (LOGGING) console.group('%c CPopup %c ensureCssEditor', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (CPopup.elTextarea) return

		const elTextarea = document.getElementById('texteditorGlobalcss');
		if (!elTextarea) return;

		elTextarea.value = CModel.appstate.txtGlobalCss ?? '';

		elTextarea.setAttribute('spellcheck', 'false');
		elTextarea.setAttribute('autocomplete', 'off');
		elTextarea.setAttribute('autocorrect', 'off');
		elTextarea.setAttribute('autocapitalize', 'off');
		elTextarea.setAttribute('wrap', 'off');

		CPopup.onInputDebounced = CPopup.debounce(() => CPopup.onInput(), 400);		// jk: define on const?
		CPopup.onKeydownHandler = (e) => CPopup.onKeydown(e);

		elTextarea.addEventListener('input', 	CPopup.onInputDebounced);
		elTextarea.addEventListener('keydown', 	CPopup.onKeydownHandler);

		CPopup.elTextarea = elTextarea;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 	destroyCssEditor()
	destroyCssEditor() {
		if (LOGGING) console.group('%c CPopup %c destroyCssEditor', LOG_GREY, LOG_BLUE, LOG_GREEN);
		
		const el = CPopup.elTextarea;
		if (!el) return;

		el.removeEventListener('input', CPopup.onInputDebounced);
		el.removeEventListener('keydown', CPopup.onKeydownHandler);

		CPopup.elTextarea = null;
		CPopup.onInputDebounced = null;
		CPopup.onKeydownHandler = null;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onKeydown(e)
	onKeydown(e) {
		if (LOGGING) console.group("%c CPopup %c event %c onKeydown %c '" + e.key + "'", LOG_GREY, LOG_RED, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		//:  		☐ getLineStartPos(text, pos)
		const getLineStartPos = (text, pos) => {
			let i = pos;
			while (i > 0 && text[i - 1] !== '\n') i--;
			return i;
		};

		//:  		☐ etSelection()
		const getSelection = () => {
			const ta = this.elTextarea;
			return { start: ta.selectionStart, end: ta.selectionEnd };
		};

		//:  		☐ setSelection(start, end)
		const setSelection = (start, end) => {
			const ta = this.elTextarea;
			ta.selectionStart = start;
			ta.selectionEnd = end;
		};

		//::  		☐ getLineEndPos(start, end)
		const getLineEndPos = (text, pos) => {
			let i = pos;
			while (i < text.length && text[i] !== '\n') i++;
			return i;
		};

		const ta = this.elTextarea;
		let { start, end } = getSelection();
		const value = ta.value;

		if (e.key === 'Tab') {
			e.preventDefault();
			const tab = '\t';

			// If selection ends at start of next line, don't include that next line
			if (end > start && value[end - 1] === '\n') end -= 1;

			const sel = value.slice(start, end);
			const isMultiLine = sel.includes('\n');

			if (!e.shiftKey) {
				if (isMultiLine) {
					const blockStart = getLineStartPos(value, start);
					const blockEnd   = getLineEndPos(value, end);

					const before = value.slice(0, blockStart);
					const srcBlock = value.slice(blockStart, blockEnd);
					const indentedBlock = srcBlock.replace(/^/gm, tab);
					const after = value.slice(blockEnd);

					ta.value = before + indentedBlock + after;
					setSelection(blockStart, blockStart + indentedBlock.length);
				}
				else {
					ta.value = value.slice(0, start) + tab + value.slice(end);
					const caret = start + tab.length;
					setSelection(caret, caret);
				}
			}
			else {
				if (isMultiLine) {
					const blockStart = getLineStartPos(value, start);
					const blockEnd   = getLineEndPos(value, end);

					const before = value.slice(0, blockStart);
					const srcBlock = value.slice(blockStart, blockEnd);
					const outdentedBlock = srcBlock.replace(/^(\t| {1,4})/gm, '');
					const after = value.slice(blockEnd);

					ta.value = before + outdentedBlock + after;
					setSelection(blockStart, blockStart + outdentedBlock.length);
				}
				else {
					const lineStartPos = getLineStartPos(value, start);
					const lineStartText = value.slice(lineStartPos, start);
					const m = lineStartText.match(/(\t| {1,4})$/);
					if (m) {
						const cut = m[0].length;
						ta.value = value.slice(0, start - cut) + value.slice(end);
						const caret = start - cut;
						setSelection(caret, caret);
					}
				}
			}

			this.onInputDebounced();
		}

		else if (e.key === 'Enter') {
			e.preventDefault();
			const lineStart = getLineStartPos(value, start);
			const currentIndent = (value.slice(lineStart).match(/^[\t ]+/) || [''])[0];
			const insert = '\n' + currentIndent;

			ta.value = value.slice(0, start) + insert + value.slice(end);
			const caret = start + insert.length;
			setSelection(caret, caret);

			this.onInputDebounced();
		}
		if (LOGGING) console.groupEnd();
	},	

	//:::	🔹 debounce(fn, ms = 150)
	debounce (fn, ms = 150) {
		// NB: Don't LOG here: will not be shown in console
		let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
	},

	//:::	🔹 onInput()
	onInput () {
		if (LOGGING) console.group('%c CPopup %c onInput', LOG_GREY, LOG_BLUE, LOG_GREEN);
		//if (LOGARGS) console.log(CPopup.elTextarea.value);

		//:		→ App: dispatch				model.appstate.update: arrPathFilePinned
		App.dispatch({type: 'model.appstate.update', oUpdate: {txtGlobalCss: CPopup.elTextarea.value}});

		//:		→ App: dispatch				model.build.and.augment
		App.dispatch({type: 'model.build.and.augment', text: CTexteditor.value});

		//:		→ App: dispatch				chart.render
		App.dispatch({type: 'chart.render', typeSvgUpdate: SVG_UPDATE_FULL_RENDER});

		//:		→ App: dispatch				toolbar.buttons.recreate
		App.dispatch({type: 'toolbar.buttons.recreate'});
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onPointerDown()
	onPointerDown(e) {
		if (LOGGING) console.group('%c CPopup %c onPointerDown', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);
		const elBodyItem = e.target.closest(".body__item");
		const elDraggableList = e.target.closest(".draggable-list");
		const elUnpinBtn = e.target.closest(".unpin__btn");
		const isDragOk = 
			elBodyItem !== null &&
			elDraggableList !== null &&
			elUnpinBtn === null;

		if (!isDragOk) return;

		elBodyItem.setPointerCapture?.(e.pointerId);

		CPopup.draginfo = {
			pointerId: e.pointerId,
			elBodyItem,
			pxStartX: e.clientX,
			pxStartY: e.clientY,
			isStarted: false,
			elGhost: null,
			pxOffsetX: 0,
			pxOffsetY: 0,
			bounds: null,
		};

		window.addEventListener("pointermove", CPopup.onDragMove, { passive: false });
		window.addEventListener("pointerup", CPopup.onDragUp, { passive: false });
		window.addEventListener("pointercancel", CPopup.onDragUp, { passive: false });
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onDragMove(e)
	onDragMove(e) {
		if (LOGGING) console.group('%c CPopup %c onDragMove', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		const DRAG_THRESHOLD_PX = 8;

		if (!CPopup.draginfo || e.pointerId !== CPopup.draginfo.pointerId) {
			if (LOGGING) console.groupEnd();
			return;
		}

		const pxDeltaX = e.clientX - CPopup.draginfo.pxStartX;
		const pxDeltaY = e.clientY - CPopup.draginfo.pxStartY;
		
		if (!CPopup.draginfo.isStarted) {
			if (Math.hypot(pxDeltaX, pxDeltaY) < DRAG_THRESHOLD_PX) {
				if (LOGGING) console.groupEnd();
				return;
			}
			CPopup.startDrag(e);
		}
		
		e.preventDefault();
		CPopup.positionGhost(e.clientX, e.clientY);
		
		const list = CPopup.draginfo.elBodyItem.parentElement;
		const rows = Array.from(list.querySelectorAll(".body__item:not(.is-dragging)"));
		const y = e.clientY;
		
		let insertBefore = null;
		for (const r of rows) {
			const rect = r.getBoundingClientRect();
			const mid = rect.top + rect.height / 2;
			if (y < mid) {insertBefore = r; break; }
		}
		
		if (insertBefore)
			list.insertBefore(CPopup.draginfo.elBodyItem, insertBefore);

		else
			list.appendChild(CPopup.draginfo.elBodyItem);
		if (LOGGING) console.groupEnd();
	},
	
	//:::	🔹	startDrag(e)
	startDrag: (e) => {
		if (LOGGING) console.group('%c CPopup %c startDrag', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		CPopup.draginfo.isStarted = true;
		const list = CPopup.draginfo.elBodyItem.parentElement;
		list.classList.add("is-reordering");
		
		const rect = CPopup.draginfo.elBodyItem.getBoundingClientRect();
		const listRect = list.getBoundingClientRect();
		
		CPopup.draginfo.pxOffsetX = e.clientX - rect.left;
		CPopup.draginfo.pxOffsetY = e.clientY - rect.top;
		CPopup.draginfo.bounds = {
			left: listRect.left,
			right: listRect.right,
			top: listRect.top,
			bottom: listRect.bottom,
		};
		
		const elGhost = CPopup.draginfo.elBodyItem.cloneNode(true);
		elGhost.classList.add("ghost");
		elGhost.style.setProperty("--ghost-w", rect.width + "px");
		elGhost.querySelector(".item__right")?.remove();
		document.body.appendChild(elGhost);
		
		CPopup.draginfo.elGhost = elGhost;
		CPopup.draginfo.elBodyItem.classList.add("is-dragging");
		
		CPopup.positionGhost(e.clientX, e.clientY);
		if (LOGGING) console.groupEnd();
	},
	
	//:::	🔹 	positionGhost(x, y)
	positionGhost: (x, y) => {
		if (LOGGING) console.group('%c CPopup %c positionGhost', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(x, y);

		if (!CPopup.draginfo?.elGhost || !CPopup.draginfo.bounds) {
			if (LOGGING) console.groupEnd();
			return;
		}

		const {left, right, top, bottom} = CPopup.draginfo.bounds;
		const w = CPopup.draginfo.elGhost.offsetWidth;
		const h = CPopup.draginfo.elGhost.offsetHeight;
		
		const gx = CUtil.clamp(x - CPopup.draginfo.pxOffsetX, left, right - w);
		const gy = CUtil.clamp(y - CPopup.draginfo.pxOffsetY, top, bottom - h);
		
		CPopup.draginfo.elGhost.style.transform = `translate(${gx}px, ${gy}px)`;
		if (LOGGING) console.groupEnd();
	},
	
	//:::	🔹 onDragUp(e)
	onDragUp: (e) => {
		if (LOGGING) console.group('%c CPopup %c onDragUp', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(e);

		if (!CPopup.draginfo) {
			if (LOGGING) console.groupEnd();
			return;
		}

		if (e.type !== "pointercancel" && e.pointerId !== CPopup.draginfo.pointerId) {
			if (LOGGING) console.groupEnd();
			return;
		}

		if (!CPopup.draginfo.isStarted) {
			CPopup.cleanupDrag();
			if (LOGGING) console.groupEnd();
			return;
		}
		
		e.preventDefault();
		
		// Commit order by reading DOM order, then map to appstate.arrPathFilePinned
		const list = CPopup.draginfo.elBodyItem.parentElement;
		const arrPathFilePinnedNew = Array.from(list.querySelectorAll(".body__item")).map(el => el.dataset.path)
		
		//: 		→ CPopup: cleanupDrag
		CPopup.cleanupDrag();

		//: 		→ App: dispatch				model.appstate.update: arrPathFilePinned
		App.dispatch({type: 'model.appstate.update', oUpdate: {arrPathFilePinned: arrPathFilePinnedNew}});
		if (LOGGING) console.groupEnd();
	},
	
	//:::	🔹 cleanupDrag()
	cleanupDrag: () => {
		if (LOGGING) console.group('%c CPopup %c cleanupDrag', LOG_GREY, LOG_BLUE, LOG_GREEN);

		window.removeEventListener("pointermove", CPopup.onDragMove, {passive:false});
		window.removeEventListener("pointerup", CPopup.onDragUp, {passive:false});
		window.removeEventListener("pointercancel", CPopup.onDragUp, {passive:false});
		
		const list = CPopup.draginfo?.elBodyItem?.parentElement;
		list?.classList.remove("is-reordering");
		
		CPopup.draginfo?.elBodyItem?.classList.remove("is-dragging");
		CPopup.draginfo?.elGhost?.remove();
		CPopup.draginfo = null;
		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 onClick()
	onClick: (args) => {
		if (LOGGING) console.group('%c CPopup %c onClick %c [callback]', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (LOGARGS) console.log(args);

		switch (args.src) {

			//::		🔻 @click: btn.close.popup, @pointerdown: overlay
			case '@click: btn.close.popup': 
			case '@pointerdown: overlay':
				//:			→ App: dispatch:			popup.settings.close
				App.dispatch({type: 'popup.settings.close'});
				break;

			//::		🔻 @click: btn.tab.select
			case '@click: btn.tab.select':
				//:			→ App: dispatch:			popup.tab.select
				App.dispatch({type: 'popup.tab.select', idTab: args.idTab});
				break;

			//::		🔻 @click: btn.open.file
			case '@click: btn.open.file':
				//:			→ App: dispatch:			wrapper.dialog.open.show
				App.dispatch({type: 'wrapper.dialog.open.show'});
				break;

			//::		🔻 @click: item.open.pinned.file
			case '@click: item.open.pinned.file':
				//:			→ App: dispatch:			model.filepath.open
				App.dispatch({type: 'model.filepath.open', path: args.path, caller: '@click: item.open.pinned.file'});
				break;

			//::		🔻 @click: btn.pin.current.file
			case '@click: btn.pin.current.file':
				//:			→ App: dispatch:			model.filepath.pin
				App.dispatch({type: 'model.filepath.pin'});
				break;

			//::		🔻 @click: btn.unpin.file
			case '@click: btn.unpin.file':
				//:			→ App: dispatch:			model.filepath.unpin
				App.dispatch({type: 'model.filepath.unpin', path: args.path});
				break;					

			//::		🔻 @click: btn.view.chart
			case '@click: btn.view.chart':
				//:			→ App: dispatch:			chart.view.select
				App.dispatch({type: 'chart.view.select', idxView: args.idxView});
				break;

			//::		🔻 @click: btn.theme.set
			case '@click: btn.theme.set':
				//:			→ App: dispatch:			wrapper.theme.set
				App.dispatch({type: 'wrapper.theme.set', idTheme: args.idTheme});
				break;

			//::		🔻 @click: item.toggle.setting
			case '@click: item.toggle.setting':
				//:			→ App: dispatch:			args.argsDispatch
				App.dispatch(args.argsDispatch);
				break;


		}
		if (LOGGING) console.groupEnd();
	},	

};


//:::
//:::📙 const App
const App = {

	//:::	🔹 init ()
	init() {
		if (LOGGING) console.group('%c App.init', LOG_BLUE, LOG_GREY);

		//: 		→ CModel: init
		CModel.init();

		//: 		→ CWrapper: init
		CWrapper.init();

		//: 		→ CFramework: init
		CFramework.init();

		//: 		→ CChart: init
		CChart.init();

		//: 		→ CTexteditor: init
		CTexteditor.init();

		//: 		→ CToolbar: init
		CToolbar.init();

		//: 		→ CPopup: init
		CPopup.init();

		if (LOGGING) console.groupEnd();
	},

	//:::	🔹 dispatch ()
	async dispatch(args) {
		if (LOGGING) console.group('%c App %c dispatch %c [' + args.type + ']', LOG_GREY, LOG_BLUE, LOG_GREEN);
		if (!LOGARGS) console.log(args);

		switch (args.type) {

			//::		🔻 model.filepath.open
			case 'model.filepath.open':

				if (args.path === '') {
					if (LOGGING) console.log("args.path = '' (not loading a file)");
					if (LOGGING) console.groupEnd();
					return;
				}

				// save Docstate of current doc, before loading new doc
				if (CModel.docstate !== null) {
					//:			→ CModel: updateDocstate					[save Docstate for current doc, before loading new doc]
					CModel.updateDocstate({
						pxWorkspaceScrollLeft: document.querySelector('#workspace-main')?.scrollLeft ?? 0,
						pxTexteditorScrollTop: document.querySelector('#texteditorDoc')?.scrollTop ?? 0,
					});
				}

				//:			→ CWrapper: loadFileText
				const resLoadFileContent = await CWrapper.loadFileText({path: args.path});
				if (resLoadFileContent.err) {
					if (LOGGING) console.groupEnd();
					return;
				}

				//:				→ CTexteditor: setText
				CTexteditor.setText({txt: resLoadFileContent.text});

				//:			→ CModel: loadDocstate
				CModel.docstate = CModel.loadDocstate({path: args.path});
				delete CModel.docstate.stateUi;		// jk: TEMP!

				//:				→ CFramework: updateLookupConstants	[fZoom, pxColWidth, linecount]
				CFramework.updateLookupConstants({
					fZoom: CModel.docstate.fZoom,
					pxColWidth: CModel.docstate.pxColWidth,
					linecount: CModel.docstate.linecount,
				});

				//:				→ CModel: updateAppstate					[idxView, pathFileOpen]
				CModel.updateAppstate({
					idxView: CModel.docstate.idxView ?? VIEWA,
					pathFileOpen: args.path,
				});

				//:					→ CFramework: setAppUiClasses
				CFramework.setAppUiClasses({appstate: CModel.appstate});

				//:				→ App: dispatch:							model.build.and.augment
				App.dispatch({type: 'model.build.and.augment', text: resLoadFileContent.text});

				//:			→ CChart: renderSvg
				CChart.renderSvg({docdata: CModel.docdata, typeSvgUpdate: SVG_UPDATE_FULL_RENDER, idxView: CModel.appstate.idxView});

				//:			→ CToolbar: recreateButtons
				CToolbar.recreateButtons();

				//:		?	→ [UI updates: #workspace-main.scrollLeft), #texteditorDoc.scrollTop]
				document.querySelector('#workspace-main').scrollLeft = CModel.docstate.pxWorkspaceScrollLeft ?? 0;		// these 2 lines must be *after* renderSvg, and only here in model.filepath.open since it will not change on same doc edits
				document.querySelector('#texteditorDoc').scrollTop   = CModel.docstate.pxTexteditorScrollTop ?? 0;


				if (!STANDALONE) {
					//:			→ CWrapper: startWatchFile
					CWrapper.startWatchFile({path: CModel.appstate.pathFileOpen});

					//:			→ CWrapper: setWindowTitle
					CWrapper.setWindowTitle({path: CModel.appstate.pathFileOpen});
				}
				break;

			//::		🔻 model.filepath.pin
			case 'model.filepath.pin':

				const pathToPin = CModel.appstate.pathFileOpen;

				if (pathToPin === '' || CModel.appstate.arrPathFilePinned.includes(pathToPin))
					return;

				//:			→ CModel: updateAppstate:		arrPathFilePinned
				CModel.updateAppstate({arrPathFilePinned: [...CModel.appstate.arrPathFilePinned, pathToPin]});	// update array with copy plus added string 
				break;	

			//::		🔻 model.filepath.unpin
			case 'model.filepath.unpin':
			
				//:			→ CModel: updateAppstate:		arrPathFilePinned
				CModel.updateAppstate({arrPathFilePinned: CModel.appstate.arrPathFilePinned.filter(path => path !== args.path)});
				break;

			//::		🔻 model.build.and.augment
			case 'model.build.and.augment':

				//:			→ CModel: extractFirstCssBlockFromText
				const txtGlobalCss = CModel.appstate.txtGlobalCss;
				const txtDocumentCss = CModel.extractFirstCssBlockFromText(args);
				
				//:				→ CFramework: setCustomCss * 2			[txtGlobalCss, txtDocumentCss]
				CFramework.setCustomCss({txtCustomCss: txtGlobalCss,   idElStyle: 'style-from-settings'}, 	'(txtGlobalCss)');		// jk: not all the time - just here for testing logic and flow
				CFramework.setCustomCss({txtCustomCss: txtDocumentCss, idElStyle: 'style-from-doc'},			'(txtDocumentCss)');	// jk: maybe only if css part has changed?

				//:					→ (get css value '--lineheight' after css set) 	[fLineheightFromCss]
				const fLineheightFromCss = parseFloat( getComputedStyle(document.querySelector('#workspace-main')).getPropertyValue('--lineheight') );

				//:					→ CFramework: updateLookupConstants	[fLineheightFromCss]
				CFramework.updateLookupConstants({fLineheightFromCss});

				//:			→ CModel: buildDocdataFromText
				CModel.buildDocdataFromText(args);

				//:				→ CModel: setTagblockMetadataFromCss
				CModel.setTagblockMetadataFromCss({txtGlobalCss, txtDocumentCss});

				//:				→ CModel: setDocdataDefinitionsFromCss
				CModel.setDocdataDefinitionsFromCss({txtGlobalCss, txtDocumentCss});

				//:				→ CModel: reapplyDocstate
				CModel.reapplyDocstate();
				break;

			//::		🔻 model.appstate.update
			case 'model.appstate.update':
			
				//:			→ CModel: updateAppstate:			args.oUpdate
				CModel.updateAppstate(args.oUpdate);
				break;			

			//::		🔻 model.tagblock.active.set
			case 'model.tagblock.active.set':

				if (args.isAltKey) {

					// see if all other tagblocks have isActive == false 
					const activeCount = CModel.docdata.arrTagblock.filter(tb => tb.isActive).length;
					const isAlreadySolo = args.tagblock.isActive && activeCount === 1;

					for (const tagblock of CModel.docdata.arrTagblock) {
						tagblock.isActive = (tagblock === args.tagblock) || isAlreadySolo;
					}
				}

				else {

					args.tagblock.isActive = !args.tagblock.isActive;
				}

				//:			→ CModel: updateDocstate
				CModel.updateDocstate({oTagblockState: Object.fromEntries(CModel.docdata.arrTagblock.map(tagblock => [tagblock.id, {isActive: tagblock.isActive}]))});

				//:			→ CChart: renderSvg
				CChart.renderSvg({docdata: CModel.docdata, typeSvgUpdate: SVG_UPDATE_RESIZE_ONLY, idxView: CModel.appstate.idxView});

				//:			→ CToolbar: recreateButtons
				CToolbar.recreateButtons();
				break;

			//::		🔻 model.tagblock.reorder
			case 'model.tagblock.reorder':

				// reorder tagblocks in docdata and render svg
				CModel.docdata.arrTagblock.sort((a, b) => args.arrTagOrderNew.indexOf(a.id) - args.arrTagOrderNew.indexOf(b.id));

				//:			→ CChart: renderSvg
				CChart.renderSvg({docdata: CModel.docdata, typeSvgUpdate: SVG_UPDATE_FULL_RENDER, idxView: CModel.appstate.idxView});

				//:			→ CToolbar: recreateButtons
				CToolbar.recreateButtons();

				//:			→ CModel: updateDocstate				[arrTagOrder]
				CModel.updateDocstate({arrTagOrder: CModel.docdata.arrTagblock.map(tb => tb.id)});

				// jk: fix: CChart.onTagblockHover(strTagDragged, true);
				break;				

			//::		🔻 wrapper.dialog.open.show
			case 'wrapper.dialog.open.show':
				//:			→ CWrapper: selectFileUsingSystemDialog
				const resFileDialog = await CWrapper.selectFileUsingSystemDialog();
				//if (LOGGING) console.log('resSelectFile:', resFileDialog);

				if (resFileDialog.isCancelled)
					return;

				//:			→ App: dispatch: 		model.filepath.open
				App.dispatch({type: 'model.filepath.open', path: resFileDialog.path, caller: 'App.dispatch: wrapper.dialog.open.show'});
				break;

			//::		🔻 wrapper.file.save
			case 'wrapper.file.save':

				//:			→ CWrapper: saveFileText
				const resWriteFileContent = await CWrapper.saveFileText({path: args.path, text: args.text});

				if (resWriteFileContent.err)
					console.warn('ERROR: CWrapper: saveFileText:', resWriteFileContent.err);
				break;

			//::		🔻 wrapper.theme.set
			case 'wrapper.theme.set':

				//:			→ CModel: updateAppstate 
				CModel.updateAppstate({idTheme: args.idTheme});

				//:			→ CFramework: setTheme
				CFramework.setTheme({mode: args.idTheme}); 			//??? CModel.appstate.idTheme});

				//:			→ CWrapper: set_menu_checks
				CWrapper.set_menu_checks({
					arrUpdate: [
						['view.theme.system',	args.idTheme === 'system'],
						['view.theme.light',	args.idTheme === 'light'],
						['view.theme.dark',		args.idTheme === 'dark'],
					],
				});
				break;				

			//::		🔻 framework.sidebar.layout.set
			case 'framework.sidebar.layout.set':

				//:			→ CModel: updateAppstate
				CModel.updateAppstate({
					idSidebarPosition: args.idSidebarLayout,
					isSidebarVisible: true,
				});

				//:			→ CFramework: setAppUiClasses
				CFramework.setAppUiClasses({appstate: CModel.appstate});

				//:			→ CWrapper: set_menu_checks
				CWrapper.set_menu_checks({
					arrUpdate: [
						['view.sidebar.layout.left', 	args.idSidebarLayout === 'sidebar-layout-left'],
						['view.sidebar.layout.right',	args.idSidebarLayout === 'sidebar-layout-right'],
						['view.sidebar.layout.top', 	args.idSidebarLayout === 'sidebar-layout-top'],
						['view.sidebar.layout.bottom',	args.idSidebarLayout === 'sidebar-layout-bottom'],
					],
				});
				break;

			//::		🔻 framework.sidebar.visibility.set
			case 'framework.sidebar.visibility.set':

				//:			→ CModel: updateAppstate
				CModel.updateAppstate({isSidebarVisible: args.isSidebarVisible});

				//:			→ CFramework: setAppUiClasses
				CFramework.setAppUiClasses({appstate: CModel.appstate});

				//:			→ CWrapper: set_menu_checks
				CWrapper.set_menu_checks({
					arrUpdate: [
						['view.sidebar.toggle', args.isSidebarVisible],
					],
				});
				break;

			//::		🔻 framework.toolbar.visibility.set
			case 'framework.toolbar.visibility.set':

				//:			→ CModel: updateAppstate
				CModel.updateAppstate({isToolbarVisible: args.isToolbarVisible});

				//:			→ CFramework: setAppUiClasses
				CFramework.setAppUiClasses({appstate: CModel.appstate});

				//:			→ CWrapper: set_menu_checks
				CWrapper.set_menu_checks({
					arrUpdate: [
						['view.toolbar.toggle', args.isToolbarVisible],
					],
				});
				break;

			//::		🔻 chart.render
			case 'chart.render':
				//:			→ CChart: renderSvg:	typeSvgUpdate
				CChart.renderSvg({docdata: CModel.docdata, typeSvgUpdate: args.typeSvgUpdate, idxView: CModel.appstate.idxView});
				break;

			//::		🔻 chart.zoom
			case 'chart.zoom':

				const fZoomNew			= (args.typeZoom === ZOOM_ALL) ? (args.isIn ? (F_ZOOM_SVG * 1.1) : args.isOut ? (F_ZOOM_SVG * 0.9) : 1) : F_ZOOM_SVG;
				const pxColWidthNew		= (args.typeZoom === ZOOM_ALL || args.typeZoom === ZOOM_HORIZONTAL) ? (args.isIn ? (PX_COL_WIDTH_SVG * 1.1) : args.isOut ? (PX_COL_WIDTH_SVG * 0.9) : PX_COL_W_INITIAL) : PX_COL_WIDTH_SVG;
				const linecountNew		= (args.typeZoom === ZOOM_LINECOUNT) ? (args.isIn ? (COUNT_LINES_SVG + 1) : args.isOut ? (COUNT_LINES_SVG - 1) : COUNT_LINES_INITIAL) : COUNT_LINES_SVG;

				const oZoomValuesNew = {
					fZoom: 		CUtil.clamp(CUtil.roundN(fZoomNew, 2), 0.25, 4.5),
					pxColWidth:	CUtil.clamp(parseInt(pxColWidthNew), PX_COL_MIN_W, PX_COL_MAX_W), 
					linecount:	CUtil.clamp(linecountNew, 1, 20),
				};

				// calculate factor of zoom before setting PX_COL_WIDTH_SVG to new value (below)
				const zoomFactor 		= oZoomValuesNew.pxColWidth / PX_COL_WIDTH_SVG
				const pxWorldCenterXOld	= CChart.elParent.scrollLeft + (CChart.elParent.clientWidth / 2);
				const pxWorldCenterXNew	= pxWorldCenterXOld	* zoomFactor;

				//:			→ CModel: updateDocstate
				CModel.updateDocstate(oZoomValuesNew);

				//:			→ CFramework: updateLookupConstants
				CFramework.updateLookupConstants(oZoomValuesNew);

				//:			→ CChart: renderSvg
				CChart.renderSvg({docdata: CModel.docdata, typeSvgUpdate: SVG_UPDATE_FULL_RENDER, idxView: CChart.idxView});

				// update scrollLeft - must be after renderSvg!
				CChart.elParent.scrollLeft = pxWorldCenterXNew - (CChart.elParent.clientWidth / 2);
				break;
				
			//::		🔻 chart.view.select
			case 'chart.view.select':
				//:			→ CModel: updateAppstate
				CModel.updateAppstate({idxView: args.idxView});

				//:			→ CModel: updateDocstate
				CModel.updateDocstate({idxView: args.idxView});

				//:			→ CFramework: setAppUiClasses
				CFramework.setAppUiClasses({appstate: CModel.appstate});

				//:			→ CChart: renderSvg:		SVG_UPDATE_RESIZE_ONLY
				CChart.renderSvg({docdata: CModel.docdata, typeSvgUpdate: SVG_UPDATE_RESIZE_ONLY, idxView: CModel.appstate.idxView});

				//:			→ CWrapper: set_menu_checks
				CWrapper.set_menu_checks({
					arrUpdate: [
						['view.chart.viewa',	args.idxView === VIEWA],
						['view.chart.viewb',	args.idxView === VIEWB],
					],
				});
				break;

			//::		🔻 texteditor.line.select
			case 'texteditor.line.select':
				//:			→ CTexteditor: selectLine
				CTexteditor.selectLine({idxLine: args.idxLine, isSelectWholeTextbloc: args.isSelectWholeTextbloc});
				break;

			//::		🔻 toolbar.buttons.recreate
			case 'toolbar.buttons.recreate':
				//:			→ CToolbar: recreateButtons
				CToolbar.recreateButtons();	
				break;



			//::		🔻 popup.settings.open
			case 'popup.settings.open':
				
				//:			→ CModel: updateAppstate
				CModel.updateAppstate({isPopupOpen: true});		// maybe make function - also to avoid all the calls to renderPopup()
				break;
			
			//::		🔻 popup.settings.close
			case 'popup.settings.close':

				//:			→ CModel: cleanupDrag
				if (CPopup.draginfo)
					CPopup.cleanupDrag();

				//:			→ CModel: updateAppstate		isPopupOpen: false
				CModel.updateAppstate({isPopupOpen: false});

				//:			→ CPopup: renderPopup
				CPopup.renderPopup();
				break;

			//::		🔻 popup.tab.select
			case 'popup.tab.select':

				//:			→ CModel: updateAppstate:		idTab
				CModel.updateAppstate({idTab: args.idTab});
				break;				
				
		}

		//:
		//:		→ CPopup: renderPopup
		if (CModel.appstate.isPopupOpen)
			CPopup.renderPopup();

		if (LOGGING) console.groupEnd();
	},

};

	App.init();

	//:		→ App: dispatch:			model.filepath.open
	App.dispatch({type: 'model.filepath.open', path: CModel.appstate.pathFileOpen, caller: 'App start'});
	if (LOGGING) console.log(App);
})();
