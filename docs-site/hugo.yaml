baseURL: "http://localhost:1313/"
languageCode: "en-us"
title: "Owl"

theme: hextra

enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  navbar:
    displayTitle: true
    displayLogo: false

  theme:
    default: system

  css:
    - css/custom.css

menu:
  main:
    - name: "Docs"
      pageRef: "/docs"
      weight: 10

    - name: "Download"
      url: "https://github.com/aowagner/<your-repo>/releases/latest"
      weight: 20

    - name: "Discussions"
      url: "https://github.com/aowagner/<your-repo>/discussions"
      weight: 30

    - name: "GitHub"
      url: "https://github.com/aowagner/<your-repo>"
      weight: 40