baseURL: "https://aowagner.github.io/texttotile/"
languageCode: "en-us"
title: "TextToTile"
canonifyURLs: true
relativeURLs: false
  

cascade:
  params:
    breadcrumbs: false

theme: hextra

enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    noClasses: false
    guessSyntax: true



params:
  navbar:
    displayTitle: true
    displayLogo: true

  theme:
    default: system
    displayToggle: false

#  css:
#    - css/custom.css

  page:
    width: normal

  imageZoom:
    enable: true    

menu:
  main:
    - name: Home
      pageRef: "/"
      weight: 5
      params:
        icon: home

    - name: "Concept"
      url: "/docs/10-concept"
      weight: 10

    - name: "Showcase"
      url: "/docs/30-showcase"
      weight: 30

    - name: "Faq"
      url: "/docs/50-faq"
      weight: 50

    - name: "Download"
      url: "/docs/70-download"
      weight: 70

    - name: "Documentation"
      pageRef: "/docs"
      weight: 90

